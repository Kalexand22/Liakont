# ─────────────────────────────────────────────────────────────────────────────
# Environnement de DÉMO Bucodi — stack Liakont auto-portée, ISOLÉE et LOCALE.
#
#   Host (.NET 10, mode Development auto-seed) + PostgreSQL plateforme + Keycloak (IdP) + sa base.
#   PAS de Caddy/TLS/DNS : tout est exposé en http sur localhost (démo locale uniquement).
#
# Démarrage :   docker compose -p liakont-bucodi up -d --build
#   ou (recommandé) :   powershell -ExecutionPolicy Bypass -File demo.ps1 up
#
# Isolation : projet Compose dédié `liakont-bucodi` → conteneurs/volumes/réseau préfixés, ports
# distincts de l'env de dev (8080/5432/5433). Aucune collision avec une instance Liakont existante.
#
# AVERTISSEMENT : les identifiants ci-dessous sont des valeurs de DÉMO LOCALE jetables (admin/admin,
# mots de passe _demo_). Ne JAMAIS réutiliser cette stack en production (cf. deploy/docker/appliance/
# pour le déploiement réel : secrets .env obligatoires, Caddy/TLS, mode Production).
# ─────────────────────────────────────────────────────────────────────────────

name: liakont-bucodi

services:
  # ── Base PostgreSQL applicative (système + tenant de démo) ──
  postgres:
    image: postgres:16-alpine
    container_name: bucodi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liakont
      POSTGRES_USER: liakont
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liakont_demo_pwd}
    volumes:
      - bucodi-db-data:/var/lib/postgresql/data
    ports:
      # Exposé pour inspection SQL (port distinct du 5432 occupé par l'env de dev).
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liakont -d liakont"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bucodi-net

  # ── Base PostgreSQL dédiée à Keycloak (isolée de l'applicative) ──
  keycloak-db:
    image: postgres:16-alpine
    container_name: bucodi-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_demo_pwd}
    volumes:
      - bucodi-keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bucodi-net

  # ── Keycloak : IdP, realm `bucodi` importé au démarrage (5 comptes seedés + 2FA) ──
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bucodi-keycloak
    restart: unless-stopped
    # Mode `start` (comme l'appliance) avec issuer FIXE en façade et back-channel DYNAMIQUE :
    #   - KC_HOSTNAME = URL publique vue par le NAVIGATEUR (http://localhost:8081) → issuer stable
    #   - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true → le Host interroge keycloak:8080 en interne (token/JWKS)
    # C'est exactement le pattern OIDC de deploy/docker/appliance, transposé en localhost http.
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_demo_pwd}
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realm-bucodi.json:/opt/keycloak/data/import/realm-bucodi.json:ro
    ports:
      - "8081:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - bucodi-net

  # ── Host applicatif Liakont (.NET 10) — image construite depuis l'appliance, lancée en Development ──
  liakont:
    build:
      context: ../..
      dockerfile: deploy/docker/appliance/Dockerfile
    container_name: bucodi-host
    restart: unless-stopped
    environment:
      # Development : auto-migration de la base système + amorçage du super-admin (AdminSeed).
      # PAS d'auto-seed de tenant (RB2) — voir DevTenantSeed__TenantId ci-dessous.
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Base applicative (système + tenant default partagent la base `liakont` en V1).
      Database__ConnectionString: "Host=postgres;Port=5432;Database=liakont;Username=liakont;Password=${POSTGRES_PASSWORD:-liakont_demo_pwd}"
      TenantConnections__ConnectionStrings__default: "Host=postgres;Port=5432;Database=liakont;Username=liakont;Password=${POSTGRES_PASSWORD:-liakont_demo_pwd}"
      # OIDC : Authority = issuer PUBLIC (navigateur) ; MetadataAddress = découverte INTERNE (back-channel).
      Keycloak__Authority: "http://localhost:8081/realms/bucodi"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/bucodi/.well-known/openid-configuration"
      Keycloak__ClientId: liakont
      Keycloak__ClientSecret: bucodi-demo-secret
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__UseKeycloak: "true"
      Keycloak__RealmTenantMap__bucodi: default
      Keycloak__PrimaryRealmName: bucodi
      Keycloak__AppBaseUrl: "http://localhost:8090"
      # API Admin Keycloak (création d'utilisateurs de tenant via la console) — compte bootstrap du realm master.
      Keycloak__AdminBaseUrl: "http://keycloak:8080"
      Keycloak__AdminUsername: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      Keycloak__AdminPassword: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      # RB2 — base neuve = 0 TENANT. TenantId vide → le DevTenantSeeder est entièrement ignoré (ni
      # tenant `default`, ni tenant additionnel, ni profil fictif). Les tenants se créent PROPREMENT via
      # l'écran « Clients » (provisioning : CREATE DATABASE + migration + enregistrement + company_id).
      # Le super-admin (sysadmin) reste amorcé en base système (section AdminSeed) pour pouvoir se
      # connecter et provisionner les tenants.
      DevTenantSeed__TenantId: ""
      # ── Branding Bucodi (BRD01 « marque grise ») — couleurs réelles de la charte Bucodi ──
      Branding__CommercialName: Bucodi
      Branding__LogoUrl: /branding/bucodi-logo.svg
      Branding__FaviconUrl: /branding/bucodi-mark.svg
      Branding__PrimaryColor: "#1B1D20"
      Branding__AccentColor: "#FFE96E"
      Branding__PublicDomain: bucodi.com
      Branding__FooterText: "Bucodi — Bureau de Conseil et Développement Informatique"
      Branding__PoweredByLiakont: "true"
      # Données persistées (trousseau Data Protection, staging, PDF reçus, coffre WORM).
      DataProtection__KeyRingPath: /app/App_Data/dataprotection-keys
      Staging__Storage__FileSystem__RootPath: /app/App_Data/staging-store
      Ingestion__Storage__PdfRootPath: /app/App_Data/ingestion-pdf
      Archive__Storage__FileSystem__RootPath: /app/App_Data/archive-store
    volumes:
      - bucodi-app-data:/app/App_Data
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - bucodi-net

volumes:
  bucodi-db-data:
  bucodi-keycloak-db-data:
  bucodi-app-data:

networks:
  # Subnet auto-attribué par Docker (PAS de subnet fixe → aucune collision avec l'appliance 172.28.0.0/16).
  bucodi-net:
    driver: bridge
