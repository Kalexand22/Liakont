# Blueprint: wpf-screen-item
# Node graph for WPF console admin screens (Gateway.App)
# Equivalent of Stratum's page-item, adapted to WPF desktop:
#   - No Playwright E2E (desktop app) — instead: ViewModel unit tests + manual smoke checklist
#   - MVVM minimal pattern (INotifyPropertyChanged + RelayCommand, no Prism)
#   - All ViewModel logic MUST be testable without the WPF dispatcher

name: wpf-screen-item
description: WPF admin console screen work item

nodes:
  - id: hydrate_context
    type: deterministic
    action: build-agent-context
    description: "Assemble F10 spec (docs/conception/F10-Console-Admin-WPF.md), MVVM conventions, existing screens, Core services used by the screen."

  - id: plan
    type: agentic
    description: "Plan the screen: ViewModel state, commands, bindings, which Core services are called, French operator wording (zero technical jargon)"

  - id: implement
    type: agentic
    description: "Implement View (XAML) + ViewModel + bindings. ViewModel logic must be fully unit-testable: no code-behind logic beyond view wiring, all state and commands in the ViewModel."

  - id: viewmodel_tests
    type: agentic
    description: "Write unit tests for the ViewModel: state transitions, command CanExecute/Execute, formatting of French operator messages, error paths. Tests live in tests/Gateway.Core.Tests or tests/Gateway.App.Tests."

  - id: verify
    type: deterministic
    action: verify-fast
    retry: { max: 3, on_exhaust: fail }
    description: "Run verify-fast.ps1 (build + analyzers + unit tests including ViewModel tests)"

  - id: fix_verify
    type: agentic
    subagent: orch-fix-verify
    condition: "verify failed"
    loop_back_to: verify
    description: "Delegate to orch-fix-verify (sonnet) — fix verification failures, then re-run verify node"

  - id: commit_compose
    type: agentic
    subagent: orch-commit
    description: "Delegate to orch-commit (haiku) — write conventional commit message to .orch-commit-msg"

  - id: commit_apply
    type: deterministic
    action: git-commit-apply
    description: "git add -A + git commit -F .orch-commit-msg + rm .orch-commit-msg"

  - id: smoke_checklist
    type: agentic
    description: "Produce/update the manual smoke checklist for this screen in docs/architecture/smoke-checklists/<screen>.md: launch steps, data prerequisites (fixtures), expected states, French labels to verify. The checklist is the human-verifiable equivalent of E2E tests."

  - id: review
    type: deterministic
    action: codex-review
    retry: { max: 3, on_exhaust: blocked }
    description: "Run codex-review.ps1"

  - id: fix_review
    type: agentic
    subagent: orch-fix-review
    condition: "review has P1 or fixable P2 findings"
    loop_back_to: verify
    description: "Delegate to orch-fix-review (sonnet) — fix review findings, then loop back to verify → commit → review"

  - id: merge_back
    type: deterministic
    action: merge-back
    description: "Push sub-branch, pull segment branch, merge --no-ff, push. If non-trivial conflict, mark blocked."

  - id: finalize_compose_log
    type: agentic
    subagent: orch-finalize
    description: "Delegate to orch-finalize (haiku) — compose and write session log to $ORCH_REPO/session-log/"

  - id: finalize_publish
    type: deterministic
    action: finalize-publish
    description: "Append events.jsonl + commit $ORCH_REPO + release slot lease + EXIT 0"
