# Blueprint: blazor-page-item
# Node graph for Blazor web console pages (Liakont modules' Web projects)
# Replaces wpf-screen-item (v5). Key differences:
#   - bUnit component tests replace ViewModel unit tests
#   - Playwright E2E tests replace manual smoke checklists (now possible — web UI)
#   - Pages call MediatR handlers (never the database directly), follow Stratum UI patterns
#   - French operator wording, zero technical jargon (F10 functional content)

name: blazor-page-item
description: Blazor web console page work item

nodes:
  - id: hydrate_context
    type: deterministic
    action: build-agent-context
    description: "Assemble F10 spec (functional content: screens, states, French wording — the 2026-06-03 amendment rules for architecture), F12, Stratum UI patterns (Common.UI, Radzen, NavSectionProvider), existing pages, the MediatR handlers/endpoints used by the page. RULE: pages contain NO business logic — they call handlers; any direct database access is a P1."

  - id: plan
    type: agentic
    description: "Plan the page: layout (Radzen components), which handlers/endpoints are called, component state, French operator wording, permission-based element visibility, bUnit + Playwright test scenarios"

  - id: implement
    type: agentic
    description: "Implement the Blazor page + components in the module's Web project. All logic in MediatR handlers (Application layer) — the page is presentation only. Permission checks via the Identity module policies. French labels only."

  - id: component_tests
    type: agentic
    description: "Write bUnit tests for the page/components: rendering per state, French labels, permission-based visibility (elements hidden without the right permission), error display. Tests live in the platform test project."

  - id: e2e_tests
    type: agentic
    description: "Write/update Playwright E2E tests for the page's main user journey (login → navigate → act → verify outcome) in tests/Liakont.Tests.E2E (harness from SOL05: Testcontainers PostgreSQL + Keycloak + fixtures + Fake PA plug-in). E2E tests are Category=E2E — they are a SEPARATE suite run by tools/run-e2e.ps1 (decision D3 2026-06-03), never by run-tests or verify-fast. They MUST exist and pass (via the e2e_run node below) before the commit."

  - id: verify
    type: deterministic
    action: verify-fast
    retry: { max: 3, on_exhaust: fail }
    description: "Run verify-fast.ps1 (builds + analyzers + architecture tests + unit/bUnit tests)"

  - id: fix_verify
    type: agentic
    subagent: orch-fix-verify
    condition: "verify failed"
    loop_back_to: verify
    description: "Delegate to orch-fix-verify (sonnet) — fix verification failures, then re-run verify node"

  - id: integration_tests
    type: deterministic
    action: run-tests
    retry: { max: 2, on_exhaust: blocked }
    description: "Run the full test suite via tools/run-tests.ps1 (unit + integration; Category=E2E is EXCLUDED — E2E run in the dedicated e2e_run node). MUST pass before review. Writing tests without executing them is a false-green."

  - id: fix_tests
    type: agentic
    subagent: orch-fix-tests
    condition: "integration_tests failed"
    loop_back_to: verify
    description: "Delegate to orch-fix-tests (sonnet) — fix test failures, then loop back to verify"

  - id: e2e_run
    type: deterministic
    action: run-e2e
    retry: { max: 2, on_exhaust: blocked }
    description: "Run the Playwright E2E suite via tools/run-e2e.ps1 (SOL05 harness: starts PostgreSQL + Keycloak via Testcontainers, runs Category=E2E). MUST pass before review — an E2E test written but never executed is a false-green (decision D3 2026-06-03)."

  - id: fix_e2e
    type: agentic
    subagent: orch-fix-tests
    condition: "e2e_run failed"
    loop_back_to: verify
    description: "Delegate to orch-fix-tests (sonnet) — fix E2E failures, then loop back to verify"

  - id: commit_compose
    type: agentic
    subagent: orch-commit
    description: "Delegate to orch-commit (haiku) — write conventional commit message to .orch-commit-msg"

  - id: commit_apply
    type: deterministic
    action: git-commit-apply
    description: "git add -A + git commit -F .orch-commit-msg + rm .orch-commit-msg"

  - id: review
    type: deterministic
    action: codex-review
    retry: { max: 3, on_exhaust: blocked }
    description: "Run codex-review.ps1 -Base <segment-branch> (MANDATORY: this node runs after commit_apply, the tree is clean — without -Base nothing gets reviewed and the script exits 3). Reviews ALL sub-branch work: committed + uncommitted."

  - id: fix_review
    type: agentic
    subagent: orch-fix-review
    condition: "review exited 2 (has P1/P2 findings)"
    loop_back_to: verify
    description: "Delegate to orch-fix-review (sonnet) — fix review findings, then loop back to verify → commit → review (re-run with -Base <segment-branch> -Round N)"

  - id: merge_back
    type: deterministic
    action: merge-back
    description: "Push sub-branch, pull segment branch, merge --no-ff, push. If non-trivial conflict, mark blocked."

  - id: finalize_compose_log
    type: agentic
    subagent: orch-finalize
    description: "Delegate to orch-finalize (haiku) — compose and write session log to $ORCH_REPO/session-log/"

  - id: finalize_publish
    type: deterministic
    action: finalize-publish
    description: "Append events.jsonl + commit $ORCH_REPO + release slot lease + EXIT 0"
