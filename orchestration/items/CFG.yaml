# Lot CFG — Paramétrage : spec des 3 niveaux + profil tenant + secrets
# Specs : docs/conception/F12-Architecture-Plateforme-Agent.md §6 (les 3 niveaux de configuration)
# SEGMENT : core-foundation — le profil tenant et le chiffrement des secrets sont des fondations
# consommées par TVA (tables par tenant), Transmission (comptes PA), Ingestion (agents) et la console.
#
# Rappel des 3 niveaux (F12 §6.1) :
#   INSTANCE (appsettings/env Docker) — PostgreSQL, Keycloak, SMTP, branding
#   TENANT   (en base, édité par la console) — SIREN, table TVA, comptes PA, planification, seuils
#   AGENT    (fichier local + DPAPI chez le client) — URL plateforme, clé API, ODBC

items:
  CFG01:
    title: "Spec détaillée du paramétrage par tenant"
    description: |
      Compléter docs/conception/F12-Architecture-Plateforme-Agent.md §6 (ou créer une annexe
      F12-A-Parametrage-Tenant.md) avec le modèle DÉTAILLÉ du paramétrage de tenant :
      1. Profil du tenant : SIREN (clé fonctionnelle), raison sociale, adresse, contact
         (email d'alerte optionnel), statut (actif/suspendu).
      2. Paramétrage fiscal du tenant (consommé par PIP03 — les décisions appartiennent à
         l'expert-comptable du client) : vatOnDebits (bool?), operationCategory
         (LivraisonBiens/PrestationServices/Mixte/null). Null = décision en attente =
         transmissions concernées suspendues avec message explicite.
      3. Comptes PA du tenant : liste de (type de plug-in, environnement staging/production,
         identifiants de compte, clé API CHIFFRÉE, actif). Un tenant peut avoir plusieurs
         comptes (staging + production, ou multi-PA).
      4. Planification d'extraction du tenant : heures, catchUpOnStart — poussée vers
         l'agent via le heartbeat (AGT03).
      5. Seuils d'alerte du tenant (consommés par SUP01) : heures avant « agent muet »,
         jours avant « documents bloqués », activation de l'alerte au contact tenant.
      6. Qui édite quoi : niveaux de droits (lecture/actions/paramétrage — permissions du
         module Identity) par section de paramétrage. La table TVA a son propre workflow
         de validation (TVA05) — ce n'est pas le même niveau que le profil.
      7. Seed de déploiement : structure de deployments/<client>/ (profil + table TVA +
         comptes PA en placeholders + fixtures) et sémantique de l'import (provisioning OPS03).
      Sources : F12, F09 (paramètres fiscaux), blueprint §7, décisions 2026-06-02/03.
      Aucune décision inventée : tout est traçable ou marqué « à trancher ».
    acceptance:
      - "Spec du paramétrage tenant complète (profil, fiscal, comptes PA, planification, seuils, droits)"
      - "Structure deployments/<client>/ spécifiée avec sémantique d'import"
      - "Les paramètres fiscaux null = transmission suspendue, documenté"
      - "Aucune décision inventée : traçable vers F09/F12/décisions ou marqué « à trancher »"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  CFG02:
    title: "Profil tenant + chiffrement des secrets (module TenantSettings)"
    description: |
      Implémenter le paramétrage de tenant selon la spec CFG01 — soit comme module dédié
      src/Modules/TenantSettings/, soit comme partie du module Ingestion (décision d'implémentation
      à justifier dans le plan ; le critère : éviter une dépendance circulaire avec Ingestion) :
      1. Entités : TenantProfile (SIREN, raison sociale, contact, statut), FiscalSettings
         (vatOnDebits, operationCategory — nullable), PaAccount (type plug-in, environnement,
         identifiants, secret chiffré, actif), ExtractionSchedule, AlertThresholds.
      2. Chiffrement des secrets en base : les clés API des PA sont chiffrées via
         ASP.NET Core Data Protection (clés de protection persistées par instance —
         documentation du stockage des clés DP dans l'appliance OPS01). JAMAIS de secret
         en clair en base ni dans les logs ni dans les réponses d'API.
      3. Handlers MediatR : GetTenantProfile, UpdateTenantProfile, SetFiscalSettings,
         AddPaAccount, UpdatePaAccount, DeactivatePaAccount — toute mutation journalisée
         (module Audit du socle) avec l'identité de l'opérateur.
      4. Validation : SIREN Luhn (réutilise la règle VAL02 si déjà disponible, sinon
         duplication temporaire documentée), cohérence type de plug-in connu.
      5. Import de seed : ImportTenantSeed(dossier deployments/<client>/) — création/mise à
         jour du profil depuis les fichiers de seed (consommé par le provisioning OPS03).
      6. Tests d'intégration : CRUD profil, secrets jamais en clair (vérifié dans les
         réponses ET en base), paramètres fiscaux null, import de seed, journalisation.
    acceptance:
      - "Profil tenant + fiscal + comptes PA + planification + seuils implémentés"
      - "Secrets chiffrés (Data Protection), jamais en clair en base/logs/réponses (vérifié par test)"
      - "Toute mutation journalisée avec identité opérateur"
      - "Import de seed depuis deployments/<client>/ fonctionnel"
      - "Tests d'intégration PostgreSQL"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_CORE_FOUNDATION:
    type: gate
    executor: human
    title: "Gate : fondations Core validées"
    description: |
      Validation humaine du cœur de la plateforme : contrat pivot (DTOs + golden files),
      module Ingestion (réception, agents, heartbeat), moteur de mapping TVA (par tenant,
      sans aucune donnée client), contrôles qualité, machine à états documents, piste d'audit,
      coffre d'archivage 10 ans, paramétrage tenant.
      Cette gate débloque les segments pa-framework et agent.
      Points de vigilance : conformité aux specs F01-F09 + F12, AUCUNE donnée client dans le
      code, piste d'audit et coffre strictement append-only/WORM, isolation tenant vérifiée,
      hashes identiques entre net48 et .NET 10.
    acceptance:
      - "Tous les items PIV, TVA, VAL, TRK, CFG sont done"
      - "Aucune donnée client (SIREN, table TVA réelle, chaîne de connexion) dans le code ou les exemples"
      - "Les golden files du contrat passent sur les deux runtimes"
      - "PR du segment feat/core-foundation revue et mergée dans main"
