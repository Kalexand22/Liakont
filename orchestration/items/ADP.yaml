# Lot ADP — Adaptateur EncheresV6 (Magic XPA / Pervasive) — plug-in de l'AGENT
# Specs : docs/conception/F01-F02 (cas EncheresV6), F03 (régimes), F07 (avoirs), F09 (encaissements)
# Premier adaptateur du produit — il valide le contrat IExtractor sur un cas réel (CMP).
# L'extraction est en LECTURE SEULE STRICTE : aucune écriture, aucun verrou sur la base source.
# Projet : agent/src/Liakont.Agent.Adapters.EncheresV6/ (net48, x86 pour les drivers ODBC
# Pervasive 32-bit). L'adaptateur référence UNIQUEMENT Liakont.Agent.Core (+ Contracts).

items:
  ADP01:
    title: "Projet adaptateur + FixtureExtractor EncheresV6"
    description: |
      Initialiser agent/src/Liakont.Agent.Adapters.EncheresV6/ :
      1. EncheresV6FixtureExtractor : IExtractor (contrat AGT02) rejouant des fixtures JSON au
         format EncheresV6 (structure entete_ba / lignes_ba / Regime_tva) puis transformées en
         documents pivot (DTOs du contrat). C'est le mode dev sans licence Pervasive/Zen,
         démo hors site et tests.
      2. Jeu de fixtures réalistes dans agent/tests/fixtures/encheresv6/ :
         - bordereaux de vente (bordereau_ou_avoir='B') avec lignes type 4 (adjudication)
           et type 2 (frais), jointure régime TVA
         - avoirs (bordereau_ou_avoir='A') liés par no_ba_lettrage
         - règlements (type_ligne='3') avec date_reglement, mode, no_remise
         - cas marge (régime 6), cas assujetti normal (régime 5), acheteur avec societe renseignée
      3. La transformation fixture → pivot est LA même que celle qu'utilisera PervasiveExtractor
         (classe de mapping partagée EncheresV6RowMapper) — seule la source des lignes diffère.
      4. Cohérence avec les golden files de la plateforme (PIV03) : les documents produits par
         le FixtureExtractor sont sérialisables/hashables à l'identique (mêmes règles de
         canonicalisation).
    acceptance:
      - "EncheresV6FixtureExtractor implémente IExtractor"
      - "EncheresV6RowMapper séparé et réutilisable par le futur PervasiveExtractor"
      - "Fixtures couvrant bordereaux, avoirs, règlements, marge, normal, acheteur pro"
      - "Tests : extraction des fixtures → documents pivot valides (hash canonique stable)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  ADP02:
    title: "PervasiveExtractor : extraction ODBC des documents"
    description: |
      Implémenter l'extracteur réel selon F02 :
      1. PervasiveExtractor : IExtractor sur ODBC (System.Data.Odbc, net48) :
         - ExtractDocuments : SELECT entete_ba WHERE bordereau_ou_avoir='B'
           AND date_vente ∈ [from, to[ + lignes type 4/2 + jointure Regime_tva
         - CheckHealth : connexion + présence des tables attendues + comptage rapide
      2. LECTURE SEULE STRICTE : connection string en read-only si le driver le permet,
         aucune requête INSERT/UPDATE/DELETE, aucune transaction d'écriture, timeouts courts.
         PREUVE par les tests (pas une simple déclaration) : les tests unitaires interceptent
         TOUTES les commandes émises (IDbCommand mocké/espionné) et échouent si une commande
         non-SELECT, un BeginTransaction d'écriture ou un verrou explicite est émis.
      3. Le SIREN émetteur ne vient PAS de la base (absent du schéma EncheresV6) : il vient
         du paramétrage du TENANT côté plateforme — l'agent n'a pas à le connaître
         (le document pivot porte la référence source ; la plateforme complète/contrôle
         le SIREN au CHECK via le profil tenant — VAL02).
      4. Réutilise EncheresV6RowMapper (ADP01) pour produire le pivot.
      5. Builds x86 obligatoires : les drivers ODBC Pervasive sont souvent 32-bit.
      NOTE : sans licence Pervasive sur la machine de dev, les tests d'intégration ODBC réels
      sont une suite séparée (jamais en CI). Les tests unitaires mockent IDbConnection/IDataReader.
    acceptance:
      - "PervasiveExtractor implémente IExtractor en lecture seule stricte"
      - "Test-espion : toute commande non-SELECT, transaction d'écriture ou verrou fait échouer la suite"
      - "Requêtes conformes au schéma documenté dans F01-F02 (entete_ba, lignes_ba, Regime_tva)"
      - "Aucun SIREN/donnée client dans l'agent ni l'adaptateur"
      - "Tests unitaires avec data readers mockés ; suite ODBC réelle séparée et documentée"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  ADP03:
    title: "Extraction avoirs + encaissements EncheresV6"
    description: |
      Compléter PervasiveExtractor et EncheresV6RowMapper selon F07 et F09 :
      1. Avoirs : bordereau_ou_avoir='A', montants stockés en positif, lien no_ba_lettrage →
         CreditNoteRef (pivot). Modèle 2 lignes (adjudication + frais) applicable.
      2. Encaissements (ExtractPayments) : lignes_ba.type_ligne='3' → montant_ligne,
         date_reglement, mode de règlement, no_remise. Rattachement au bordereau via no_ba →
         PivotPaymentDto (l'AGRÉGATION jour×taux est faite par la plateforme — PIP03 ;
         l'agent transmet les paiements bruts).
      3. Les deux chemins (fixtures et ODBC) produisent le même pivot pour les mêmes données
         (test de parité sur un jeu commun).
    acceptance:
      - "Avoirs extraits avec lien vers la facture d'origine (no_ba_lettrage → CreditNoteRef)"
      - "Encaissements extraits en PivotPaymentDto bruts avec rattachement bordereau"
      - "Test de parité fixtures vs ODBC mocké sur le même jeu de données"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  ADP04:
    title: "ListSourceTaxRegimes + configuration adaptateur"
    description: |
      Compléter l'adaptateur :
      1. ListSourceTaxRegimes : SELECT des régimes TVA distincts de la base (table Regime_tva +
         occurrences dans lignes_ba) — transmis par l'agent dans les métadonnées de push
         (AGT02) pour alimenter la détection de couverture TVA03 côté plateforme.
      2. EncheresV6AdapterConfig : section de configuration de l'adaptateur dans agent.json —
         chaîne ODBC (chiffrée DPAPI), chemin fixtures (mode fixture), période par défaut.
      3. Sélection du mode (Pervasive vs Fixture) par configuration, jamais par compilation.
    acceptance:
      - "ListSourceTaxRegimes retourne les régimes réels avec occurrences"
      - "Configuration adaptateur typée et validée (chaîne ODBC OU chemin fixtures requis)"
      - "Le mode fixture/ODBC se choisit par config"
      - "Tests : config valide/invalide, listing des régimes sur fixtures"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  ADP05:
    title: "Extraction des bordereaux PDF EncheresV6 (pièces jointes)"
    description: |
      Implémenter les capacités PDF dans l'adaptateur EncheresV6 :
      1. Localiser les bordereaux PDF générés par EncheresV6 (CONFIRMÉ accessible par
         l'utilisateur : blob en base Pervasive OU dossier de fichiers sur le serveur —
         déterminer lequel sur la base réelle/fixtures, configurable dans EncheresV6AdapterConfig).
      2. Selon ce que la base réelle permet, déclarer la ou les bonnes capacités (contrat AGT02) :
         - lien explicite possible (blob lié au bordereau, ou nommage fiable contenant le no_ba)
           → ProvidesSourceDocuments + GetAttachments(sourceReference) : retrouver le(s) PDF
           du bordereau → poussés par l'agent via POST .../documents/{ref}/pdf
         - dossier de PDF SANS lien fiable → ProvidesUnlinkedDocumentPool + ListPoolDocuments
           → poussés via POST .../pdf-pool (le moteur de réconciliation TRK07 fera le
           rapprochement côté plateforme)
         Le mode se choisit dans EncheresV6AdapterConfig ; les deux peuvent coexister.
      3. Lecture seule stricte : aucun déplacement/modification des fichiers source.
      4. Cas limites : PDF introuvable (capacité déclarée mais document absent → liste vide +
         Warning journalisé, jamais d'échec du run), PDF multiple pour un même bordereau
         (toutes les versions poussées).
      5. Mode fixtures : les fixtures incluent des PDF factices pour les tests (mode lié ET mode pool).
    acceptance:
      - "Capacités déclarées selon la configuration (lien explicite et/ou pool)"
      - "Mode lié : GetAttachments retrouve le PDF d'un bordereau par sa référence"
      - "Mode pool : ListPoolDocuments expose les PDF du dossier configuré"
      - "Source des PDF (blob ou dossier) configurable dans la config adaptateur"
      - "PDF introuvable = liste vide + Warning, jamais d'échec"
      - "Tests : PDF présent, absent, multiple, mode pool, sur fixtures avec PDF factices"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_ADAPTER_ENCHERESV6:
    type: gate
    executor: human
    title: "Gate : adaptateur EncheresV6 validé"
    description: |
      Validation humaine du premier plug-in source. Démonstration attendue : un agent avec
      l'adaptateur EncheresV6 en mode fixtures extrait un jeu complet → push vers la plateforme
      de dev → pipeline → FakePaClient, et si possible une extraction ODBC réelle sur la base
      de test CMP (si accès disponible).
      Rappel généricité : l'adaptateur ne contient AUCUNE donnée client (le SIREN CMP, la chaîne
      ODBC réelle sont du paramétrage — lot CMP) ; il contient la connaissance du SCHÉMA EncheresV6.
    acceptance:
      - "Tous les items ADP sont done"
      - "Aucune donnée client dans le code de l'adaptateur (uniquement la connaissance du schéma)"
      - "Démonstration extraction fixtures → push → pipeline plateforme réussie"
      - "PR du segment feat/adapter-encheresv6 revue et mergée dans main"
