# Lot DOC — Documentation utilisateur du produit
# Documentation GÉNÉRIQUE du produit (le scénario de démo ISATECH, spécifique au déploiement
# CMP, est dans le lot CMP).

items:
  DOC01:
    title: "Guide utilisateur console + guide exploitant"
    description: |
      Rédiger la documentation produit :
      1. docs/guide-utilisateur.md : guide opérateur de la console WPF — connexion au serveur,
         chaque écran, chaque état, chaque action, les messages de blocage courants et comment
         les résoudre, le verdict B2C/B2B, l'export d'audit. Public : opérateur comptable non
         technique. Captures d'écran des écrans sur fixtures.
      2. docs/guide-exploitant.md : guide de l'exploitant du Service — installation,
         planification, supervision (/health, last-run-status.json, montre morte),
         sauvegardes (base + coffre d'archive), vérification d'intégrité de l'archive,
         lecture des logs, procédures d'incident.
      3. README.md du repo mis à jour : état du produit, comment builder, comment lancer
         en mode démo (fixtures + FakePaClient), liens vers toute la documentation.
    acceptance:
      - "Guide utilisateur couvrant tous les écrans et états, en français opérateur"
      - "Guide exploitant couvrant supervision, sauvegardes et incidents"
      - "README.md à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_TOOLKIT:
    type: gate
    executor: human
    title: "Gate : produit packagé et documenté"
    description: |
      Validation humaine du produit complet packagé : le zip s'installe sur une machine propre,
      le Service démarre, la console se connecte, la documentation permet à un intégrateur
      (partenaire Niveau 2) de déployer sans assistance.
      C'est la dernière gate du PRODUIT — tout ce qui suit (lot CMP) est du paramétrage.
    acceptance:
      - "Tous les items CFG et DOC sont done"
      - "Installation complète depuis le zip réussie sur machine propre"
      - "PR du segment feat/deploiement-toolkit revue et mergée dans main"
