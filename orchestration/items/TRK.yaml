# Lot TRK — Documents, piste d'audit & archivage fiscal 10 ans (F06 amendée 2026-06-03)
# Spec : docs/conception/F06-Tracking-Piste-Audit.md (+ amendement PostgreSQL)
# Modules concernés : Documents (états, audit), Payments (agrégats), Archive (WORM, ancrage),
# Reconciliation (PDF). Stockage : PostgreSQL, base du tenant (database-per-tenant du socle).
#
# CHANGEMENTS v6 vs v5 :
#   - PostgreSQL remplace SQLite/SQL Server (l'ex-TRK05 « provider SQL Server » est sans objet)
#   - Les contraintes net48 (RFC 3161, OpenTimestamps, parsing PDF) sont LEVÉES (.NET 10)
#   - Renumérotation : TRK05=Archive WORM, TRK06=Ancrage+export, TRK07=Réconciliation
# Règles inchangées : DocumentEvent append-only, coffre WORM, jamais de purge automatique.

items:
  TRK01:
    title: "Module Documents : schéma + Document/DocumentEvent append-only"
    description: |
      Implémenter src/Modules/Documents/ (pattern Stratum) selon F06 :
      1. Schéma PostgreSQL (migrations DbUp, base du tenant) :
         - Document : id, source_reference, document_number, document_type, issue_date,
           supplier_siren, customer_name, customer_is_company_hint, total_net, total_tax,
           total_gross, state, payload_hash, pa_document_id, mapping_version,
           first_seen_utc, last_update_utc
         - DocumentEvent (append-only) : id, document_id, timestamp_utc, event_type, detail,
           payload_snapshot (JSONB), pa_response_snapshot (JSONB), mapping_trace (JSONB),
           operator_identity (nullable — identité Keycloak pour les actions opérateur)
         - TaxReport : id, document_id, pa_tax_report_id, type, transport, state, xml_base64,
           retrieved_utc
         - ArchiveEntry : id, document_id, package_path, package_hash, chain_hash, archived_utc
      2. RÈGLE MONTANTS : toutes les colonnes monétaires en NUMERIC(18,2) — JAMAIS de type
         flottant. Round-trip base ↔ decimal sans perte (testé avec 0.1+0.2, 1162.80).
      3. DocumentEvent est append-only : aucune méthode d'update/delete dans le repository,
         contrainte renforcée côté base (REVOKE UPDATE/DELETE ou trigger de rejet — documenter
         le choix). Tentative d'update = exception (vérifié par test).
      4. Repository Dapper : Upsert document, GetByNumber, GetByState, GetById, requêtes
         paginées pour l'API — toutes tenant-scopées par construction (connexion = base du tenant).
      5. Le document est créé en état Detected par l'ingestion (PIV04 — le câblage IDocumentIntake
         se branche ici).
    acceptance:
      - "Schéma PostgreSQL avec migrations DbUp, colonnes monétaires en NUMERIC"
      - "DocumentEvent append-only : update/delete impossibles (repository ET base, vérifié par tests)"
      - "Round-trip decimal sans perte (testé avec des montants piégeux)"
      - "Repository complet, requêtes paginées pour l'API"
      - "Câblage IDocumentIntake (PIV04) : un push agent crée des documents Detected"
      - "Tests d'intégration PostgreSQL (Testcontainers) sur les 4 tables"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK02:
    title: "Machine à états + supersede + ManuallyHandled"
    description: |
      Implémenter la machine à états dans src/Modules/Documents/ :
      1. DocumentState enum : Detected, Blocked, ReadyToSend, Sending, Issued, RejectedByPa,
         TechnicalError, Superseded, ManuallyHandled.
      2. Transitions autorisées (machine à états explicite) :
         Detected → Blocked | ReadyToSend
         Blocked → ReadyToSend (après correction source + re-check)
         Blocked → ManuallyHandled (action opérateur : « traité manuellement hors passerelle »,
           MOTIF OBLIGATOIRE, journalisé — cas : avoir orphelin, document non transmissible)
         ReadyToSend → Sending → Issued | RejectedByPa | TechnicalError
         TechnicalError → ReadyToSend (re-tentable au prochain traitement)
         RejectedByPa → Superseded (remplacé par un nouveau document — voir point 4)
         RejectedByPa → ManuallyHandled (action opérateur, motif obligatoire)
         Toute transition hors de cette liste = exception.
         Superseded et ManuallyHandled sont TERMINAUX : un document n'en sort jamais
         (il reste visible et auditable, mais ne pollue plus les compteurs d'attente).
      3. TransitionTo : chaque transition écrit automatiquement un DocumentEvent
         (atomique : transition + événement dans la même transaction).
      4. Mécanique du remplacement après rejet (règle F06) : le logiciel SOURCE est le seul
         créateur de numéros — Conformat n'invente jamais un numéro. Le flux réel :
         l'opérateur corrige/recrée le document dans le logiciel source → l'agent extrait
         et pousse le nouveau document (nouveau numéro) → l'opérateur LIE les deux
         (action supersede API02) : l'ancien passe Superseded avec la référence du
         remplaçant dans le DocumentEvent.
         NOTE : cette mécanique REMPLACE le « suffixe -R1 » décrit par F05 §4.2 (un suffixe
         créé par la passerelle violerait la règle « la source est le seul créateur de
         numéros ») — amendement F05 du 2026-06-03.
    acceptance:
      - "Machine à états explicite, transitions illégales rejetées par exception"
      - "États terminaux ManuallyHandled (motif obligatoire) et Superseded (lien vers le remplaçant)"
      - "Chaque transition écrit automatiquement un DocumentEvent (atomique)"
      - "Tests : cycle nominal complet, transition illégale, reprise TechnicalError, traitement manuel avec motif, remplacement après rejet"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK03:
    title: "Anti-doublons + détection d'altération source"
    description: |
      Implémenter la logique anti-doublon dans src/Modules/Documents/ selon F06 :
      1. Avant envoi, chercher Document par (supplier_siren, document_number) dans le tenant :
         - trouvé en état Issued → NE PAS renvoyer (doublon)
         - trouvé en état RejectedByPa → renvoi autorisé sous NOUVEAU numéro, l'ancien passe Superseded
         - payload_hash identique déjà Issued → doublon strict, bloqué
         - sinon → envoi autorisé
      2. IIssuedDocumentLookup (interface utilisée par VAL03) implémentée sur le repository.
      3. Reprise sur timeout d'envoi : GetPotentiallySentDocuments() pour que le pipeline
         puisse vérifier côté PA avant de retenter (câblé dans PIP01 — un timeout réseau peut
         masquer un envoi qui a réussi côté PA : retenter sans vérifier = doublon).
      4. Détection d'altération source APRÈS émission (F06 : double usage du payload_hash) :
         l'ingestion (PIV04) publie un événement AlterationDetected quand une source_reference
         connue arrive avec un autre hash. Ce module le consomme : si le document est déjà
         Issued → DocumentEvent SOURCE_ALTERED_AFTER_ISSUE (append-only) + alerte (consommée
         par SUP01). JAMAIS de réémission silencieuse, jamais de mise à jour du document émis.
    acceptance:
      - "Les 4 règles anti-doublon de F06 implémentées et testées une par une"
      - "IIssuedDocumentLookup branché sur le repository"
      - "Altération après émission → événement + alerte, jamais de réémission (consomme l'événement d'ingestion PIV04)"
      - "Tests : doublon Issued, renvoi après rejet, doublon strict par hash, document nouveau, source altérée après émission"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK04:
    title: "Piste d'audit (snapshots) + module Payments (agrégats append-only)"
    description: |
      Implémenter la piste d'audit complète :
      1. Dans src/Modules/Documents/ — chaque document Issued archive 3 snapshots dans
         DocumentEvent : payload pivot envoyé (JSON), réponse PA brute, trace de mapping TVA.
      2. Chaque document RejectedByPa archive AUSSI ses snapshots (payload envoyé + réponse de
         rejet brute) : la tentative ratée fait partie de la piste d'audit (F06) — un contrôle
         fiscal peut exiger de prouver ce qui a été tenté, pas seulement ce qui a réussi.
      3. Dans src/Modules/Payments/ (nouveau module, pattern Stratum) :
         - PivotPaymentDto reçus de l'agent → persistés (Payment)
         - PaymentAggregate : agrégats jour×taux (le calcul d'agrégation arrive avec PIP03 —
           ici le modèle et la persistence)
         - PaymentAggregateEvent (append-only, même discipline que DocumentEvent) — chaque
           transmission d'agrégat journalise : payload envoyé, réponse PA, horodatage, état.
           Les agrégats transmis à la DGFiP ont la même valeur fiscale que les documents.
      4. Rétention : Document/DocumentEvent/TaxReport/Payment/PaymentAggregate/
         PaymentAggregateEvent/ArchiveEntry jamais purgés automatiquement (10 ans,
         art. L.123-22 Code de commerce). Aucun code de purge dans le produit V1.
         (Les sauvegardes sont au niveau instance — OPS01 ; le BackupService local v5 est
         sans objet.)
    acceptance:
      - "3 snapshots archivés pour chaque document émis ET pour chaque rejet"
      - "Module Payments créé : Payment, PaymentAggregate, PaymentAggregateEvent"
      - "PaymentAggregateEvent append-only (même vérification par test que DocumentEvent)"
      - "Aucun mécanisme de purge automatique des tables d'audit"
      - "Tests d'intégration PostgreSQL"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK05:
    title: "Module Archive : coffre WORM + chaîne de hashes + addenda chaînés"
    description: |
      Implémenter src/Modules/Archive/ selon F06 :
      1. IArchiveStore — 3ᵉ AXE DE GÉNÉRICITÉ ENFICHABLE (F12 §7 décision D9 du 2026-06-03 ;
         blueprint §2 règle 6) : le coffre est agnostique du stockage, choisi par l'éditeur au
         niveau INSTANCE. L'abstraction expose des CAPACITÉS déclarées (ArchiveStoreCapabilities :
         SupportsObjectLock, SupportsLegalHold) — le module n'écrit JAMAIS `if (store is S3)`.
         Implémentations V1 :
         - FileSystemArchiveStore (défaut, appliance self-hosted) : volume de l'instance,
           un répertoire par tenant (aucune capacité de verrou natif — l'intégrité repose
           sur la chaîne de hashes, cf. point 3)
         - S3ArchiveStore (S3-compatible, UN SEUL code pour Amazon S3, MinIO, OVH, Scaleway,
           Wasabi…) : Object Lock en mode compliance quand le backend déclare la capacité
           (vrai WORM matériel, utilisé EN PLUS de la chaîne de hashes). ADR : bibliothèque
           AWSSDK.S3 (dépendance) ; endpoint/credentials = configuration d'instance.
         FAST-FOLLOW (hors V1, à la demande d'un éditeur — mêmes capacités, nouveau plug-in,
         AUCUN changement du module) : AzureBlobArchiveStore (immutable blob + legal hold) et
         GcsArchiveStore (bucket lock / retention policy).
         Le choix est une configuration d'INSTANCE ; le comportement métier est identique.
         RÈGLE WORM : l'intégrité produit (points 3-5) ne dépend JAMAIS du verrou natif du
         backend ; le verrou matériel, quand la capacité est présente, est une protection
         supplémentaire (ceinture + bretelles).
      2. Pour chaque document Issued, créer un paquet d'archive
         <tenant>/<année>/<mois>/<numéro-document>/ contenant :
         - payload.json (ce qui a été transmis à la PA, exact)
         - reponse-pa.json (réponse PA + identifiants DGFiP — preuve de transmission)
         - tax-report.xml (le ledger DGFiP, ajouté quand récupéré)
         - facture-pa.pdf / facture-pa.xml (LA FACTURE LÉGALE générée par la PA — Factur-X/UBL,
           récupérée via IPaClient.GetGeneratedDocumentAsync quand la PA déclare
           SupportsDocumentRetrieval ; absente sinon, mentionné dans le manifest du paquet)
         - bordereau-source.pdf (le document émis par le logiciel source — poussé par l'agent
           quand l'adaptateur déclare ProvidesSourceDocuments ; absent sinon, mentionné)
         - document-lisible.html (rendu lisible autonome : en-tête, lignes, totaux, TVA —
           exigence de lisibilité art. 289 V CGI, doit rester lisible sans le logiciel)
         - manifest.json (hashes SHA-256 de chaque fichier + horodatage + trace mapping +
           chain_hash + liste des pièces présentes/absentes avec motif)
      3. Chaîne de hashes (intégrité tamper-evident, par tenant) :
         chain_hash(N) = SHA256(chain_hash(N-1) + package_hash(N))
         → toute altération a posteriori d'un paquet casse la chaîne à partir de ce point.
      4. WORM : le coffre est write-once — aucune méthode de modification/suppression d'un
         paquet existant. Les ajouts ultérieurs (tax-report récupéré après coup, PDF réconcilié)
         créent un fichier additionnel référencé dans un manifest-addendum, jamais une réécriture.
      5. CHAÎNAGE DES ADDENDA : chaque manifest-addendum porte son propre hash, chaîné sur la
         chaîne principale : chain_hash(N+1) = SHA256(chain_hash(N) + addendum_hash).
         Un addendum n'est JAMAIS hors chaîne.
      6. ArchiveEntry en base (TRK01) référence chaque paquet ET chaque addendum.
    acceptance:
      - "IArchiveStore = axe enfichable à capacités : FileSystemArchiveStore + S3ArchiveStore (Object Lock quand déclaré), choix par config d'instance ; aucun `if (store is ...)`"
      - "Extension fast-follow documentée (Azure Blob, GCS = nouveau plug-in sans toucher au module) ; intégrité produit indépendante du WORM natif du backend"
      - "Paquet d'archive complet créé pour chaque document émis"
      - "Facture PA et bordereau source intégrés quand les capacités le permettent, absence documentée sinon"
      - "Rendu HTML lisible autonome (ouvrable dans 10 ans sans le logiciel)"
      - "Chaîne de hashes par tenant, altération détectable"
      - "Les addenda sont chaînés : altérer une pièce ajoutée a posteriori casse la chaîne (testé)"
      - "Aucune méthode de modification/suppression de paquet (WORM vérifié par test)"
      - "Tests : création paquet, chaînage, addendum, altération, avec/sans pièces, les 2 stores"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK06:
    title: "Ancrage temporel (RFC 3161 / OpenTimestamps) + ArchiveVerifier + export contrôle fiscal"
    description: |
      Compléter le module Archive — NOTE v6 : les contraintes net48 du backlog v5 sont LEVÉES,
      les API .NET modernes existent :
      1. ArchiveVerifier : vérification complète de la chaîne d'archive d'un tenant (tous les
         hashes, tout le chaînage, les preuves d'ancrage) → rapport d'intégrité. Exposé via
         l'API à TROIS niveaux :
         - état d'intégrité dans le détail document (WEB03)
         - inclus dans l'export contrôle fiscal (API03)
         - action opérateur À LA DEMANDE « Vérifier l'intégrité de l'archive du tenant »
           (endpoint API03 + bouton WEB04) : exécute l'ArchiveVerifier sur TOUT le coffre du
           tenant et affiche le rapport — équivalent v6 de la commande verify-archive du
           backlog v5 ; l'export fiscal doit rester vérifiable par l'opérateur sans attendre
           un contrôle.
      2. Ancrage temporel de la tête de chaîne — abstraction ITimestampAnchor (même principe
         que les plug-ins PA : le scellement est une capacité paramétrable par instance) :
         - Rfc3161Anchor (recommandé par défaut en v6) : horodatage qualifié via une TSA
           configurable (Certigna/Universign, ~15-50 €/an par instance). Implémentation :
           **System.Security.Cryptography.Pkcs.Rfc3161TimestampRequest/Token — API NATIVES
           .NET** (le point dur net48 du backlog v5 n'existe plus). Aucune dépendance externe.
         - OpenTimestampsAnchor (option gratuite) : envoi quotidien du hash de tête (32 octets,
           aucune donnée confidentielle) aux serveurs calendar publics OpenTimestamps →
           ancrage blockchain Bitcoin. Le protocole .ots complet (sérialisation, upgrade,
           vérification Merkle) reste non trivial : SPIKE + ADR (bibliothèque .NET existante
           ou sous-ensemble maison). Si aucune option raisonnable : OpenTimestamps passe en
           V1.1, RFC 3161 reste l'ancrage par défaut — décision à l'ADR.
         - NoAnchor : instances sans accès internet sortant — la chaîne de hashes reste active.
         Les ancrages peuvent être actifs simultanément (ceinture-bretelles).
      3. Job d'ancrage quotidien — utilise la mécanique de jobs multi-tenant du socle
         (TenantJobRunner/ITenantJob de SOL06, jamais de boucle multi-tenant maison) :
         ancre la tête de chaîne de chaque tenant de l'instance, stocke les preuves
         (jetons RFC 3161 / fichiers .ots) dans le coffre, gère le cycle
         pending → complete d'OpenTimestamps.
      4. Export contrôle fiscal (consommé par API03) : pour un document ou une période,
         produire le dossier d'export — paquets d'archive + rapport d'intégrité + preuves
         d'ancrage + chronologie complète (DocumentEvents) + notice en français expliquant
         au vérificateur comment vérifier les preuves.
      5. Limite assumée et documentée : ce coffre n'est PAS un SAE certifié NF Z42-013.
         La doc commerciale ne doit jamais prétendre à la certification ; l'argument est
         « scellement qualifié eIDAS inclus, ancrage blockchain en option ».
    acceptance:
      - "ArchiveVerifier détecte toute altération et vérifie les preuves d'ancrage"
      - "Vérification d'intégrité de TOUT le coffre du tenant déclenchable à la demande par l'opérateur (API03/WEB04)"
      - "ITimestampAnchor : Rfc3161Anchor (API .NET natives, sans dépendance), OpenTimestamps (selon ADR/spike), NoAnchor"
      - "Job d'ancrage quotidien par tenant via TenantJobRunner (SOL06), preuves stockées dans le coffre"
      - "Export contrôle fiscal complet avec notice de vérification en français"
      - "La limite « pas de certification NF Z42-013 » est documentée"
      - "Tests : chaîne saine, chaîne altérée, preuve manquante, les modes d'ancrage, TSA mockée"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  TRK07:
    title: "Module Reconciliation : rapprochement PDF ↔ documents émis"
    description: |
      Implémenter src/Modules/Reconciliation/ — le rapprochement entre les PDF du pool non lié
      (poussés par l'agent via /pdf-pool quand l'adaptateur déclare ProvidesUnlinkedDocumentPool)
      et les documents émis. Contexte : certains logiciels source déposent tous leurs PDF au
      même endroit, sans lien explicite avec le document.
      1. ReconciliationEngine : pour chaque PDF du pool non encore rattaché, proposer une
         correspondance avec un document du tenant :
         - stratégie 1 (confiance HAUTE) : numéro de document trouvé dans le nom de fichier
         - stratégie 2 (confiance HAUTE) : numéro de document trouvé dans le texte du PDF.
           NOTE v6 : la contrainte de licence net48 est levée — extraction de texte via une
           bibliothèque .NET moderne (PdfPig Apache-2.0 recommandé ; nouveau package = ADR,
           règle blueprint §5). Pas d'OCR en V1.
         - stratégie 3 (confiance MOYENNE) : correspondance date + montant TTC, candidat UNIQUE
         - ambiguïté (plusieurs candidats) ou aucune correspondance → NON RÉCONCILIÉ
      2. Décision 2026-06-02 (auto + confirmation manuelle) :
         - confiance HAUTE → lien automatique, journalisé (DocumentEvent RECONCILED_AUTO)
         - confiance MOYENNE → proposition en file d'attente, confirmation opérateur requise
         - non réconcilié → file d'attente manuelle
         Un rapprochement erroné archivé en WORM serait incorrigible → JAMAIS d'automatique
         en dessous de la confiance haute.
      3. ReconciliationQueue persistée (base du tenant) : propositions en attente, PDF orphelins,
         documents émis sans PDF. Consommée par API04 et WEB08.
      4. Un PDF réconcilié rejoint le paquet d'archive du document en ADDENDUM
         (cohérent avec le WORM de TRK05 : ajout référencé, jamais de réécriture).
      5. La réconciliation manuelle (opérateur) est journalisée avec l'identité de l'opérateur
         (DocumentEvent RECONCILED_MANUAL).
      6. Le moteur tourne en job (module Job) après chaque réception de PDF pool + à la demande.
    acceptance:
      - "Les 3 stratégies de matching implémentées avec leurs niveaux de confiance"
      - "Confiance haute = lien auto journalisé ; moyenne = file d'attente, jamais de lien auto"
      - "Ambiguïté (2 candidats ou plus) = jamais de rapprochement automatique"
      - "PDF réconcilié ajouté au paquet d'archive en addendum (WORM respecté)"
      - "ReconciliationQueue persistée : propositions, orphelins, documents sans PDF"
      - "ADR rédigé pour la bibliothèque d'extraction de texte PDF"
      - "Tests : matching par nom, par contenu, par date+montant, ambiguïté, orphelin, réconciliation manuelle"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
