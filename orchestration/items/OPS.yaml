# Lot OPS — Opérations multi-instances : appliance, provisioning, flotte, réversibilité
# Specs : docs/conception/F12-Architecture-Plateforme-Agent.md §6, blueprint.md §3.3 (topologies)
# Réfs décisions 2026-06-03 : 3 topologies (self-hosted éditeur / dédiée hébergée / mutualisée),
# marque grise = une instance par éditeur, réversibilité = item de V1 (pas une option).
# Absorbe l'ex-lot PKG (packaging) du manifest v5.
# Réf décision 2026-06-10 (engagement Isatech, serveur SaaS mutualisé type AZMUT : N bases
# clientes sur une même machine) : MULTI-INSTANCES de l'agent = un service Windows par base.
# Exigence portée par OPS05 (script d'installation + prérequis code agent), OPS08a (champ
# instanceName du moteur de profil) et OPS08b (wizard : détection/installation par instance).

items:
  # OPS01 re-découpé en OPS01a/b/c (2026-06-07, v15) : appliance build+run / sauvegarde-restauration-PRA / ADR topologie IdP — un livrable atomique par sous-item.
  OPS01a:
    title: "Appliance Docker : build + run (Host + PostgreSQL + Keycloak + Caddy)"
    description: |
      Créer le livrable de lancement d'une instance dans deploy/docker/ (F12 §6.2). dépend de [].
      1. Dockerfile multi-stage pour Liakont.Host (.NET 10, image runtime aspnet).
      2. docker-compose.yml complet : liakont (Host) + postgres (volumes persistants) + keycloak
         (realm Liakont importé au démarrage : realm-liakont.json) + Caddy (reverse proxy, TLS
         automatique pour le self-hosted).
      3. Configuration par variables d'environnement : connexion PostgreSQL, Keycloak, SMTP,
         branding (BRD01), URL publique. Fichier .env.example documenté — AUCUN secret par défaut
         (génération obligatoire à l'installation).
      4. Clés Data Protection (CFG02) persistées dans un volume : les secrets tenant chiffrés
         survivent au redéploiement du conteneur (sinon les clés API PA deviennent illisibles).
      5. README d'installation deploy/docker/README.md : prérequis (Docker, RAM), installation pas
         à pas pour un éditeur self-hosted, mise à jour (pull + up).
      6. Test : l'appliance démarre sur une machine propre (docker compose up), le Host répond,
         un tenant de test se crée, le login Keycloak fonctionne.
    acceptance:
      - "docker compose up démarre l'instance complète (Host + postgres + keycloak + Caddy) sur machine propre"
      - "Aucun secret par défaut, .env.example documenté"
      - "Clés Data Protection et données persistées en volumes (survivent au redéploiement)"
      - "Login Keycloak fonctionnel après démarrage (realm Liakont importé)"
      - "README d'installation exécutable par un éditeur self-hosted"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS01b:
    title: "Appliance : sauvegarde / restauration bout-en-bout + PRA"
    description: |
      Outiller la sauvegarde et PROUVER la restauration de l'appliance (F12 §6.2 — une sauvegarde
      jamais restaurée est un faux vert classique, et l'opérateur héberge des archives fiscales de
      tiers conservées 10 ans). dépend de [OPS01a].
      1. Script deploy/docker/backup.ps1|sh : pg_dump PAR base (base système + une par tenant, pour
         permettre la restauration sélective exigée par la réversibilité OPS06) + volumes d'archive,
         rotation documentée. La procédure fait partie du livrable.
      2. RESTAURATION DE BOUT EN BOUT TESTÉE : restore d'un dump dans une instance VIERGE → données +
         coffre WORM intègres → ArchiveVerifier (TRK06) VERT post-restauration. Ce test fait partie
         de l'acceptance (pas une simple capture d'écran).
      3. PRA documenté : RTO/RPO cibles (une panne d'instance = tous les tenants bloqués simultanément
         à l'approche d'une échéance déclarative), procédure de reprise testée, lien avec la
         méta-supervision OPS04 (alerte sauvegarde en échec).
    acceptance:
      - "Sauvegardes par base (système + chaque tenant) + volumes d'archive, rotation documentée"
      - "Restauration bout-en-bout testée sur instance vierge : restore → ArchiveVerifier (TRK06) vert"
      - "PRA documenté : RTO/RPO cibles + procédure de reprise testée"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS01c:
    title: "ADR topologie IdP (empreinte mesurée)"
    description: |
      Rédiger l'ADR de la TOPOLOGIE de déploiement de l'IdP retenu (F12 §6.2 pt 9, F12 §7 n°1, D10).
      dépend de [OPS01a].
      1. La DIRECTION (Keycloak vs alternative in-process type OpenIddict) est tranchée EN AMONT :
         l'auth est derrière l'abstraction IIdentityProviderAuthenticator dès SOL01 (D10) + spike
         d'empreinte ADR-0002. Cet ADR ne décide donc QUE la topologie de déploiement du fournisseur
         retenu (par instance vs mutualisé) et son empreinte réelle heap-bornée (qui conditionne le
         pricing des instances hébergées).
      2. EMPREINTE MESURÉE : la valeur d'empreinte vient d'une MESURE (spike, docker stats sur la
         stack appliance OPS01a), à ACTER dans l'ADR — jamais devinée. Ré-mesure en charge
         (sessions, multi-realms) avant d'arrêter la topologie.
      3. Le Keycloak de dev de SOL01 (realm liakont-dev) reste l'implémentation par défaut tant que
         le spike n'a pas justifié une bascule ; le seam D10 rend la bascule possible sans remettre
         en cause les fondations (même mécanique de rôles, même mapping tenant).
    acceptance:
      - "ADR topologie IdP rédigé (par instance vs mutualisé)"
      - "Empreinte mémoire MESURÉE (spike) actée dans l'ADR — aucune valeur devinée"
      - "Direction Keycloak/alternative confirmée déjà tranchée par le seam D10 + spike ADR-0002 (non rouverte ici)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS02:
    title: "Provisioning d'instance (créer une instance éditeur = 1 commande)"
    description: |
      Outiller la création d'instances dans deploy/provisioning/ (F12 §6.3) :
      1. new-instance.ps1 : crée une nouvelle instance — répertoire/stack Docker dédié,
         génération des secrets (PostgreSQL, Keycloak admin, clés DP), realm Keycloak,
         paramètres de branding (nom éditeur, logo, couleurs, domaine — branding PAR DÉFAUT
         Liakont tant que BRD01 n'est pas livré ; le branding complet est appliqué/enrichi
         par BRD01), .env complet.
      2. Modes : self-hosted (génère le bundle à remettre à l'éditeur) et hébergé
         (déploie sur l'infra IT Innovations — le script est le même, la cible diffère).
      3. Registre des instances : deploy/provisioning/instances.yaml — liste des instances
         opérées par IT Innovations (nom, éditeur, URL, version, hébergement). Les instances
         self-hosted n'y figurent que si l'éditeur a souscrit la méta-supervision (OPS04).
      4. update-instance.ps1 : mise à jour d'une instance —
         - pull de la nouvelle image
         - MIGRATION MULTI-BASES : avec database-per-tenant, une montée de version migre la
           base SYSTÈME + TOUTES les bases tenant (boucle DbUp). Comportement sur échec
           partiel défini : si la migration du tenant N échoue, les tenants déjà migrés
           restent migrés, les suivants ne sont pas tentés, l'instance reste arrêtée et
           l'état mixte est rapporté (jamais de démarrage avec des bases à des versions
           différentes). Sauvegarde pré-migration obligatoire (granularité par base — OPS01).
         - Les push d'agents sont bloqués (503 explicite) pendant la migration.
         - vérification de santé post-update, rollback documenté (restore des bases depuis
           la sauvegarde pré-migration).
      5. Test : provisionner une instance de test de bout en bout (2 tenants), la mettre à
         jour (migration des 3 bases vérifiée), simuler un échec de migration sur un tenant
         (état mixte rapporté, pas de démarrage), la détruire proprement.
    acceptance:
      - "new-instance.ps1 produit une instance fonctionnelle (testé de bout en bout)"
      - "Secrets générés, jamais de valeurs par défaut partagées entre instances"
      - "update-instance.ps1 : migration multi-bases (système + tous les tenants), échec partiel = arrêt + rapport, jamais d'état mixte en marche"
      - "Push agents bloqués pendant la migration (503 explicite)"
      - "Sauvegarde pré-migration obligatoire + rollback documenté"
      - "Registre des instances tenu à jour par les scripts"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS03:
    title: "Provisioning de tenant (écran opérateur d'instance)"
    description: |
      Implémenter la création de tenants depuis la console (permission liakont.supervision —
      c'est l'opérateur de l'instance qui crée ses clients) :
      1. Écran « Clients » (liste des tenants de l'instance) : nom, SIREN, statut, agents,
         date de création + bouton [Nouveau client].
      2. Assistant de création de tenant :
         - étape 1 : profil (SIREN avec validation Luhn, raison sociale, contact)
         - étape 2 : import de seed optionnel (dossier deployments/<client>/ → CFG02 ImportTenantSeed)
         - étape 3 : création du premier utilisateur — compte Keycloak + rôle (rôles standard
           du seed SOL01) + MAPPING utilisateur→tenant (l'utilisateur ne voit que son tenant)
           — invitation email
         - étape 4 : enregistrement du premier agent (PIV05) → clé API affichée une fois +
           lien de téléchargement du package d'installation agent (OPS05) pré-configuré
           (la gestion ULTÉRIEURE du parc d'agents — 2e agent, révocation, rotation —
           est l'écran WEB09 / les endpoints API05)
      3. GESTION CONTINUE des utilisateurs et rôles du tenant : ajouter un 2e utilisateur,
         changer un rôle, désactiver un compte — passe par les écrans du module Identity
         du socle vendored (pas de réimplémentation) ; cet item vérifie que ces écrans
         fonctionnent pour des utilisateurs tenant-scopés et les référence dans la navigation.
      4. Suspension/réactivation d'un tenant (statut — un tenant suspendu n'accepte plus
         de push d'agent et ses utilisateurs ne peuvent plus se connecter ; ses données
         restent intactes).
      5. Création de la base du tenant (database-per-tenant du socle) automatique à la création.
      6. Tests d'intégration : création complète, import de seed, suspension/réactivation,
         isolation (le nouveau tenant ne voit rien des autres). E2E Playwright : assistant
         complet + parcours « ajout d'un 2e utilisateur + retrait de droit ».
    acceptance:
      - "Assistant de création de tenant complet (profil → seed → utilisateur+mapping tenant → agent)"
      - "Base du tenant créée automatiquement (database-per-tenant)"
      - "Clé API agent affichée une seule fois + package pré-configuré téléchargeable"
      - "Gestion continue utilisateurs/rôles via les écrans Identity du socle, vérifiée par E2E (2e utilisateur + retrait de droit)"
      - "Suspension/réactivation fonctionnelles"
      - "Tests d'intégration + E2E Playwright (assistant complet)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS04:
    title: "Méta-supervision de flotte (instances + mises à jour)"
    description: |
      Outiller la supervision des INSTANCES par IT Innovations (le niveau au-dessus de SUP01,
      qui supervise les tenants d'une instance) :
      1. Heartbeat d'instance : chaque instance opérée (ou self-hosted avec souscription)
         envoie périodiquement à un endpoint central IT Innovations : version, santé
         (Host/PostgreSQL/Keycloak), nombre de tenants (PAS leurs noms ni leurs données —
         respect du cloisonnement éditeur), espace disque, dernière sauvegarde réussie.
         Implémentation minimale V1 : un endpoint sur l'instance mutualisée IT Innovations
         + un job d'envoi dans chaque instance.
      2. Dashboard de flotte (sur l'instance mutualisée, permission dédiée IT Innovations) :
         état de toutes les instances, versions, alertes (instance muette, sauvegarde en échec,
         version obsolète).
      3. Notification de mise à jour : quand une nouvelle version de la plateforme est publiée,
         les instances en retard sont signalées ; pour les self-hosted, l'éditeur reçoit un
         email « nouvelle version disponible » (avec notes de version).
      4. RESPECT DU CLOISONNEMENT : la méta-supervision ne transporte JAMAIS de données métier
         d'un éditeur (pas de noms de tenants, pas de SIREN, pas de compteurs de documents) —
         uniquement de la télémétrie technique. Vérifié en review et par test.
      5. Tests : heartbeat d'instance, dashboard, alerte instance muette, cloisonnement
         (aucune donnée métier dans les payloads — testé).
    acceptance:
      - "Heartbeat d'instance + dashboard de flotte opérationnels"
      - "Alertes : instance muette, sauvegarde en échec, version obsolète"
      - "AUCUNE donnée métier éditeur dans la télémétrie (vérifié par test sur le payload)"
      - "Notification de nouvelle version aux instances en retard"
      - "Tests complets"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS05:
    title: "Installeur de l'agent (package x86/x64 pré-configurable)"
    description: |
      Créer le packaging de l'agent dans deploy/agent-installer/ (ex-PKG01 adapté) :
      1. tools/package-agent.ps1 : build Release x86 + x64 de la solution agent, assemblage
         d'un package d'installation (zip auto-suffisant OU MSI — choix documenté par ADR ;
         critère : installation silencieuse possible par un intégrateur).
         RÈGLE DE CHOIX x86/x64 (documentée dans installation-agent.md) : x86 par DÉFAUT dès
         qu'un adaptateur ODBC 32-bit est requis (le driver Pervasive d'EncheresV6 est 32-bit :
         un service x64 ne peut pas le charger) ; x64 seulement si TOUS les adaptateurs du
         client sont 64-bit. Le service et ses adaptateurs partagent le même bitness — jamais
         de mélange.
      2. Le package contient : Liakont.Agent + Agent.Cli + adaptateurs (EncheresV6 + futurs),
         dépendances natives par plateforme (SQLite.Interop.dll x86 dans le package x86,
         x64 dans le x64 — vérifié par test d'extraction), script d'installation
         (création du service, du dossier ProgramData avec les ACL requises par AGT01
         — écriture pour le service ET le CLI intégrateur, agent.json modèle).
      3. PRÉ-CONFIGURATION : le package peut être généré pré-configuré pour un tenant
         (OPS03 étape 4) — agent.json pré-rempli avec platformUrl + clé API chiffrée à
         l'installation (la clé transite dans le package de façon sécurisée : chiffrement
         par mot de passe à usage unique communiqué séparément, documenté par ADR).
         NOTE : la génération d'un installateur GUI *par profil intégrateur* (un .exe par
         intégrateur — branding + visibilité d'écrans/options) est portée par OPS08 (conception
         F13), qui réutilise ce packaging. OPS05 ne porte pas cette dimension — évite une
         dépendance circulaire OPS05<->OPS08.
      4. docs/installation-agent.md : prérequis (Windows 7 SP1+, .NET Framework 4.8, driver
         ODBC source), installation pas à pas, configuration, vérification (CLI check-config /
         test-odbc / test-api), dépannage des erreurs courantes. Public : intégrateur/éditeur.
      5. MULTI-INSTANCES (décision 2026-06-10, engagement Isatech — serveur SaaS mutualisé type
         AZMUT : N bases clientes sur une même machine = N agents, un service par base) :
         le script d'installation accepte un NOM D'INSTANCE (défaut « Default ») et dérive TOUT
         de ce nom : service Windows « LiakontAgent$<instance> », dossier d'installation des
         binaires par instance, ProgramData par instance (C:\ProgramData\Liakont\<instance>\ —
         mêmes ACL qu'AGT01), buffer SQLite et logs par instance.
         PRÉREQUIS CODE AGENT porté par cet item (petite reprise du lot AGT, déjà mergé) :
         rendre paramétrables par instance —
         - le ServiceName en dur (AgentService.cs, AgentServiceInstaller.cs, Program.cs --install) ;
         - le mutex inter-processus Global\LiakontAgentRun (InterProcessRunLock.cs) : DOIT être
           suffixé par le nom d'instance, sinon deux instances partagent le même verrou de run ;
         - les chemins ProgramData (config, buffer, logs, marqueur heartbeat) ;
         - l'updater (AGT04/Updater) cible le service et les binaires de SON instance uniquement.
         L'instance « Default » garde un comportement identique à l'existant (compat installations
         mono-instance déjà déployées : mêmes noms, mêmes chemins).
      6. Test : le package x86 ET x64 s'installe sur machine propre, le service démarre,
         le CLI check-config passe. PUIS coexistence : une DEUXIÈME instance s'installe sur la
         même machine (nom distinct) — deux services distincts, configs/buffers/logs distincts,
         runs simultanés sans interférence (verrous indépendants), désinstallation de l'une
         sans impact sur l'autre.
    acceptance:
      - "package-agent.ps1 produit les packages x86 et x64"
      - "Règle de choix x86/x64 documentée (x86 par défaut si adaptateur ODBC 32-bit ; même bitness service/adaptateurs)"
      - "SQLite.Interop.dll de la bonne plateforme dans chaque package (testé sur les deux)"
      - "ACL ProgramData posées par l'installeur (service + CLI — exigence AGT01)"
      - "Pré-configuration par tenant fonctionnelle (clé jamais en clair dans le package)"
      - "Multi-instances : nom d'instance paramétrable dérivant service + ProgramData + mutex de run + logs (ServiceName et mutex en dur repris dans le code agent ; instance Default = comportement identique à l'existant)"
      - "Coexistence de 2 instances sur la même machine testée (services, configs, runs indépendants ; désinstallation sélective)"
      - "Installation testée sur machine propre (service démarre, check-config passe)"
      - "docs/installation-agent.md exécutable par un intégrateur (section multi-instances incluse)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # OPS06 re-découpé en OPS06a/b/c (2026-06-07, v15) : outillage export tenant / migration d'instance / fin de vie tenant D7 — la réversibilité décomposée en trois livrables testables.
  OPS06a:
    title: "Export tenant (outil opérateur)"
    description: |
      Outiller l'export complet d'un tenant côté OPÉRATEUR (l'endpoint API03 /tenant-export existe
      déjà — ici c'est l'outillage de la console). dépend de [OPS03].
      1. Bouton [Exporter ce client] sur l'écran Clients (OPS03) → s'appuie sur /tenant-export (API03)
         → bundle complet : tracking (dump SQL + export JSON lisible), coffre d'archive (paquets WORM +
         preuves d'ancrage), paramétrage (profil + table TVA + changelog).
      2. Notice de restitution en français : que contient l'export, comment le lire, comment VÉRIFIER
         l'intégrité de l'archive HORS PLATEFORME (outil/procédure autonome).
      3. Tests : export complet d'un tenant de test (contenu vérifié + intégrité de l'archive
         vérifiable hors plateforme).
    acceptance:
      - "Bouton d'export sur l'écran Clients → bundle complet (tracking + coffre WORM + preuves d'ancrage + paramétrage)"
      - "Notice de restitution en français (contenu, lecture, vérification d'intégrité)"
      - "Intégrité de l'archive exportée vérifiable hors plateforme (notice + outil/procédure)"
      - "Tests d'export (contenu du bundle vérifié)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS06b:
    title: "Migration d'instance (dédiée hébergée → self-hosted)"
    description: |
      Outiller la migration d'une instance d'une cible vers une autre (F12 §6.3, réversibilité de V1).
      dépend de [OPS06a, OPS01b].
      1. deploy/provisioning/migrate-instance.ps1 : pg_dump de TOUTES les bases (système + tenants) +
         copie des volumes (coffre d'archive, clés Data Protection) + génération du bundle d'installation
         pour la nouvelle cible + contrôle de santé post-migration + bascule DNS documentée.
      2. Réutilise la granularité par base d'OPS01b (d'où la dépendance) : la migration s'appuie sur la
         même mécanique de dump/restore par base déjà testée.
      3. Test : migration d'une instance de test de bout en bout (toutes bases + volumes), contrôle de
         santé vert sur la cible, données et coffre WORM intègres après bascule.
    acceptance:
      - "migrate-instance.ps1 : pg_dump toutes bases + copie volumes (archive + clés DP) + bundle cible + contrôle de santé + bascule DNS"
      - "Migration d'instance testée de bout en bout (santé verte sur la cible, données + coffre WORM intègres)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS06c:
    title: "Fin de vie d'un tenant (séquence D7)"
    description: |
      Implémenter la séquence stricte de fin de vie d'un tenant (décision D7 du 2026-06-03 : concilie
      résiliation/RGPD avec le coffre WORM et la conservation fiscale 10 ans). dépend de [OPS06a].
      1. DÉSACTIVATION logique immédiate (statut OPS03 : plus de push, plus de connexion, données
         intactes) — état normal d'un tenant résilié.
      2. EXPORT complet produit ET VÉRIFIÉ : l'ArchiveVerifier (TRK06) doit être VERT sur le bundle
         exporté (preuve que le client récupère une archive intègre).
      3. Transfert de responsabilité documenté : la notice mentionne explicitement que les obligations
         de conservation fiscale (10 ans) passent au client avec l'export ; l'opérateur conserve la
         confirmation (référence d'export, date, destinataire).
      4. SUPPRESSION effective seulement après les étapes ci-dessus : double confirmation + saisie du
         nom du tenant. Journalisée de façon IRRÉVERSIBLE dans l'audit de l'INSTANCE (hors base tenant —
         qui, quand, référence de l'export vérifié) ; cet enregistrement SURVIT à la suppression de la
         base du tenant.
      5. REFUS si l'export n'est pas intègre (ArchiveVerifier rouge) : suppression impossible — testé.
         Le chemin « désactivé pour toujours » (étape 1 seule) reste légitime et permanent si le client
         ne demande pas l'effacement.
      6. Tests : suppression refusée sans export vérifié, suppression refusée sur export non intègre,
         audit d'instance conservé après suppression de la base tenant.
    acceptance:
      - "Séquence D7 : désactivation → export VÉRIFIÉ (ArchiveVerifier vert) → transfert documenté → suppression"
      - "Suppression : double confirmation + saisie du nom du tenant ; impossible sans export vérifié"
      - "Suppression refusée si l'export n'est pas intègre (testé)"
      - "Audit niveau instance (hors base tenant) survivant à la suppression de la base"
      - "Tests complets (y compris refus sur export non intègre)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS07:
    title: "Publication de versions agent + politique de mise à jour de flotte"
    description: |
      Implémenter le CÔTÉ PLATEFORME de l'auto-update des agents (F12 §4, blueprint §3.1
      « Auto-update (flotte) ») — sans cet item, AGT04 (client) et PIV05 (heartbeat) n'ont
      aucune source de données : la flotte ne peut jamais se mettre à jour.
      1. Registre des versions d'agent (base système de l'instance) : version, date de
         publication, canal (stable/test), package x86/x64 (produits par OPS05), hash SHA-256,
         MANIFESTE DE VERSION SIGNÉ (décision D6 : signature par la clé applicative dédiée,
         générée sur le poste de release — la clé privée n'est JAMAIS sur la plateforme).
      2. Publication : tools/publish-agent-version.ps1 — prend les packages OPS05 + la clé de
         signature (poste de release), produit le manifeste signé, le téléverse vers
         l'instance (stockage des packages : volume/object storage de l'instance).
      3. Endpoint de téléchargement : GET /api/agent/v1/update/package?version=&platform=
         (servi par le module Ingestion, authentifié par clé API agent) — c'est l'updateUrl
         que PIV05 renvoie dans le heartbeat.
      4. Politique de mise à jour de flotte (écran opérateur d'instance, permission
         liakont.supervision) : définir la version cible (latestAgentVersion) et le mode
         (updateRequired : obligatoire = les agents se mettent à jour au prochain heartbeat ;
         optionnel = signalé mais pas forcé) — par instance, avec possibilité d'exclure des
         tenants (déploiement progressif).
      5. Câblage PIV05 : la réponse heartbeat est alimentée par ce registre (latestAgentVersion,
         updateRequired, updateUrl, manifeste signé).
      6. Tests d'intégration : publication → heartbeat retourne la version cible → téléchargement
         du package + manifeste → (avec AGT04) cycle complet heartbeat → 426/updateRequired →
         download → vérification de signature. Test du déploiement progressif (tenant exclu).
    acceptance:
      - "Registre de versions + publication outillée (manifeste signé hors plateforme — clé jamais sur l'instance)"
      - "Endpoint de téléchargement authentifié opérationnel"
      - "Politique de flotte réglable par l'opérateur (version cible, obligatoire/optionnel, exclusions)"
      - "La réponse heartbeat PIV05 est alimentée par le registre (testé de bout en bout)"
      - "Cycle complet update testé : publication → heartbeat → download → vérification signature (avec AGT04)"
      - "Tests d'intégration incluant le déploiement progressif"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # OPS08 re-découpé en OPS08a/b/c (2026-06-07, v15) : projet + moteur de profil / wizard GUI / packaging multi-profils — l'installateur agent F13 en trois livrables.
  OPS08a:
    title: "Installeur agent : projet + moteur de profil intégrateur"
    description: |
      Créer le projet de l'installateur et son moteur de profil déclaratif (F13 §3/§5, ADR-0005).
      AUCUNE logique métier (blueprint §6). dépend de [OPS05].
      1. Nouveau projet Liakont.Agent.Installer (WinForms net48) dans la solution agent, réutilisant
         Liakont.Agent.Core + commandes AGT05 (test-odbc / test-api / encrypt) — aucune logique
         dupliquée.
      2. Moteur de profil intégrateur DÉCLARATIF (F13 §5) : profil = branding + par champ un état
         affiché|verrouillé|masqué + valeur par défaut. Le moteur ITÈRE sur les champs déclarés
         (liste NON figée : ajouter une option = ajouter une clé, sans toucher au moteur). DÉFAUT
         OUVERT (champ non déclaré = affiché + éditable). AUCUN if(integrateur) dans le code — piloté
         par les données du profil (même principe que PaCapabilities, blueprint §2).
      3. Validation du schéma de profil (réutilisée par le packaging OPS08c) : clé inconnue, masquage
         sans valeur, ou champ requis non résolu = ERREUR. platformUrl/apiKey toujours requis ; apiKey
         JAMAIS imposée par le profil (secret).
      4. Garde-fous : apiKey jamais imposée ; secrets destinés à agent.json chiffrés DPAPI (machine
         scope, SecretProtector AGT01).
      5. MULTI-INSTANCES (décision 2026-06-10, cas AZMUT — voir OPS05 pt 5) : « instanceName » est
         un champ DÉCLARÉ du moteur de profil comme les autres (3 états + valeur par défaut
         « Default ») — un profil intégrateur « hébergeur SaaS » peut ainsi l'afficher en premier,
         un profil mono-site peut le masquer (avec sa valeur par défaut). La validation de schéma
         rejette un instanceName vide ou contenant des caractères invalides pour un nom de
         service Windows.
      6. Tests unitaires du moteur : profil pilotant la visibilité (3 états + défaut ouvert), masquage
         sans valeur rejeté, apiKey non imposable, champ requis résolu, instanceName validé (format).
    acceptance:
      - "Projet Liakont.Agent.Installer (WinForms net48) réutilisant Agent.Core + commandes AGT05 (aucune logique dupliquée)"
      - "Moteur de profil déclaratif : 3 états (affiché/verrouillé/masqué) + valeur par défaut, défaut ouvert, itération data-driven"
      - "Validation de schéma : clé inconnue / masqué sans valeur / requis non résolu = erreur"
      - "Champ instanceName déclaré dans le moteur (3 états + défaut « Default »), format de nom de service validé"
      - "Garde-fous testés : apiKey jamais imposée par le profil ; aucun if(integrateur) (review)"
      - "Tests unitaires du moteur de profil"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS08b:
    title: "Installeur agent : wizard GUI"
    description: |
      Implémenter les écrans guidés du bootstrapper GUI (F13 §3/§4). Messages 100 % français orientés
      intégrateur. dépend de [OPS08a].
      1. Écran source : choix de l'adaptateur + paramètres ODBC + bouton « Tester » = CheckHealth,
         LECTURE SEULE stricte (aucune écriture, aucun verrou — règle 5). Identifiants chiffrés DPAPI
         avant écriture.
      2. Écran serveur central : URL plateforme + clé API + bouton « Tester » = heartbeat à blanc
         (diagnostique URL injoignable / clé invalide / clé révoquée / OK).
      3. Pose des binaires + création du service Windows (self-install AGT01), ACL ProgramData (OPS05),
         puis écriture de agent.json avec secrets chiffrés DPAPI (SecretProtector AGT01) ; check-config
         final affiché en clair.
      4. Mode silencieux (fichier de réponses) partageant le MÊME moteur de configuration que le wizard.
      5. MULTI-INSTANCES (décision 2026-06-10, cas AZMUT — voir OPS05 pt 5) : le wizard DÉTECTE les
         instances Liakont déjà installées sur la machine (services LiakontAgent$*), les affiche,
         propose le nom de la nouvelle instance (champ instanceName du profil OPS08a, unicité
         vérifiée) et installe service + config + binaires DE CETTE INSTANCE sans toucher aux
         autres. La désinstallation cible une instance précise. Cas nominal du serveur SaaS
         éditeur : enchaîner N installations sur la même machine, une par base cliente.
      6. Test du wizard (Liakont.Agent.Core mocké) : déroulé complet, tests source/serveur, mode
         silencieux, agent.json écrit avec secrets chiffrés DPAPI, détection d'instances existantes
         + refus d'un nom déjà pris.
    acceptance:
      - "Wizard : écran source (CheckHealth lecture seule) + écran serveur central (heartbeat à blanc) avec tests"
      - "Écriture agent.json avec secrets chiffrés DPAPI (clé API + ODBC) — vérifié"
      - "Mode silencieux partageant le moteur de configuration du wizard"
      - "Multi-instances : détection des instances existantes, unicité du nom, installation d'une nouvelle instance sans impact sur les autres, désinstallation sélective"
      - "Test du wizard (Core mocké) : déroulé complet + tests source/serveur + détection/refus de doublon d'instance"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  OPS08c:
    title: "Installeur agent : packaging multi-profils"
    description: |
      Produire un installateur par profil intégrateur à partir du même binaire (F13 §7), en réutilisant
      le packaging OPS05. dépend de [OPS08b, OPS05].
      1. À partir du MÊME binaire produit + N profils intégrateur, générer N installateurs (profil
         embarqué en ressource + branding), en réutilisant tools/package-agent.ps1 (OPS05). « Générique
         par intégrateur ».
      2. Profil invalide = ÉCHEC du build (réutilise la validation de schéma d'OPS08a) — jamais de
         masquage silencieux d'un profil cassé (anti-faux-vert).
      3. Profil d'EXEMPLE FICTIF dans config/exemples/ (branding + visibilité only, aucun secret, AUCUNE
         donnée client — règles 7/10).
      4. Installation testée sur machine propre d'au moins un profil : service démarre, check-config
         passe.
    acceptance:
      - "Packaging de N installateurs par profil (même binaire, profil embarqué) en réutilisant OPS05"
      - "Profil invalide = échec du build (testé) ; aucun masquage silencieux"
      - "Profil d'exemple FICTIF dans config/exemples/ (aucune donnée client, aucun secret)"
      - "Installation testée sur machine propre (service démarre, check-config passe)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
