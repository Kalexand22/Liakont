# Lot FX — Génération Factur-X (PDF/A-3 + CII) côté plateforme + PA générique (niveau « Essentiel »).
# Décision produit interactive (Karl, 2026-06-15). Spec : docs/conception/F16-FacturX-Generation.md (FX01, DONE).
# Décision d'archi : docs/adr/ADR-0023-generation-facturx-pdfa3-cii.md (FX00 = spike + ADR, Accepté).
# PLANIFIÉ (manifest v25) : segment `facturx` (branche feat/facturx) + gate humaine GATE_FACTURX.
# APRÈS merge de la PR du segment, seeder `pending` FX02→FX07 + FXG + GATE_FACTURX dans
# $ORCH_REPO/state.yaml (gate comprise, sinon « done » par défaut → recette jamais ouverte).
# Aucune session active requise (slots null) — transaction RLF-style.
# Règles non négociables (CLAUDE.md) : montants decimal ; AUCUNE règle fiscale inventée (frontière
# recopie/dérivation BG-23 + BR-CO-17, F16 §3 / ADR INV-FX-2/7) ; DocumentEvent append-only (la trace de
# support est un store SÉPARÉ purgeable, tenant-scopée n°9) ; secrets PA chiffrés par tenant ; indépendance
# PA (génération sans plug-in concret) ; le plug-in ne référence que Transmission.Contracts.

items:
  FX02:
    title: "Module plateforme FacturX + port IFacturXBuilder"
    description: |
      Créer le module `Liakont.Modules.FacturX` (Contracts/Domain/Application/Infrastructure) + le port
      `IFacturXBuilder` (couche Application). Aucune référence à un plug-in PA. La lib PDF (QuestPDF, déjà
      au repo, ADR-0023 §1) est confinée à `FacturX.Infrastructure`. Bump QuestPDF 2024.12.3 → ≥ 2025.7.4
      (Directory.Packages.props centralisé) — correctif Mustang (ADR-0023 §1) ; mettre à jour le commentaire
      QuestPDF de Directory.Packages.props au passage. Tests de frontière livrés par le module (modèle
      TransmissionBoundaryTests) : FacturX ne dépend pas de Transmission.Contracts ni d'un module métier et
      ne consulte aucune PaCapabilities (ADR-0023 INV-FX-1/4/7).
    acceptance:
      - "Module FacturX créé (4 couches) + port IFacturXBuilder ; QuestPDF confinée à Infrastructure"
      - "QuestPDF bumpée ≥ 2025.7.4 (Directory.Packages.props) + commentaire QuestPDF mis à jour"
      - "NetArchTest : QuestPDF référencée UNIQUEMENT par FacturX.Infrastructure (INV-FX-1)"
      - "BoundaryTests : FacturX ne référence aucun plug-in PA ni Transmission.Contracts, ne lit aucune PaCapabilities (INV-FX-4)"
      - "verify-fast passes ; codex-review clean or only accepted P2s"
  FX03:
    title: "Sérialiseur EN 16931 → CII XML (maison) : recopie qualitative + dérivation BG-23/BR-CO-17"
    description: |
      Sérialiseur PUR (FacturX.Domain/Application) pivot → CrossIndustryInvoice (profil EN 16931 COMFORT),
      jamais via le convert d'une PA (blueprint §6). RECOPIE stricte des valeurs qualitatives portées par le
      pivot au niveau ligne (catégorie BT-151, taux BT-152, VATEX) + BT-5 devise (recopié du pivot, défaut EUR
      F01-F02) ; BT-24 = constante de profil. BT-146 (PU ligne, obligatoire BR-26) recopié ; absent (UnitPriceNet null) → blocage, jamais dérivé de BT-131/BT-129. DÉRIVATION arithmétique déterministe des agrégats non portés :
      BT-106 (Σ BT-131), BG-23 BT-116 (Σ nets/groupe par catégorie,taux,VATEX), BT-117 = arrondi(BT-116×BT-119/100)
      (BR-CO-17), BT-115 = BT-112 − BT-113 (BR-CO-16). RÉCONCILIATION avec les totaux portés (BR-CO-14 :
      Σ BT-117 = BT-110 ; BR-CO-15 : BT-109+BT-110 = BT-112) ; tout écart non réconciliable → BLOCAGE (jamais
      un CII non conforme, aucun rattrapage). Montants decimal, arrondi PivotRounding half-up. F16 §3 ; ADR §2 + INV-FX-2/7.
    acceptance:
      - "pivot → CII EN 16931 COMFORT, code maison, jamais le convert d'une PA"
      - "Agrégats BG-23/BT-106/BT-115 dérivés par arithmétique normative (decimal) ; aucune valeur fiscale qualitative inventée"
      - "BR-CO-17 produit + réconciliation BR-CO-14/15 ; écart non réconciliable → blocage tracé"
      - "Golden files couvrant la matrice V1 : mono-taux, multi-taux, exonéré (VATEX), autoliquidation, criée mono-Seller"
      - "Validation XSD CII + Schematron CEN/TC 434 (BR-CO-15 fatale) sur chaque golden file"
      - "verify-fast passes ; codex-review clean or only accepted P2s"
  FX04:
    title: "Scellement PDF/A-3 (QuestPDF) + couche visuelle + validation veraPDF/Mustang"
    description: |
      Rendu visuel PDF depuis le pivot (réutiliser ArchiveReadableDocument, F16 §5) puis scellement PDF/A-3
      via QuestPDF (PDFA_3B + AddAttachment relation `Alternative` + ExtendMetadata XMP `fx:`, URI
      urn:factur-x:pdfa:CrossIndustryDocument:invoice:1p0#, fx:ConformanceLevel=EN 16931 ; fx:Version = version
      majeure Factur-X figée au moment de coder, ADR-0023 §3). Embarque le factur-x.xml (FX03). Validation :
      assertions structurelles en CI rapide + veraPDF + Mustangproject (conteneur Docker) au tier intégration,
      BLOQUANT (ADR-0023 §4, INV-FX-5). Test de cohérence visuel↔XML (ni veraPDF ni Mustang ne le couvrent).
    acceptance:
      - "Factur-X PDF/A-3 généré : factur-x.xml embarqué (AFRelationship=Alternative) + XMP fx: correct"
      - "Validation veraPDF + Mustangproject en conteneur (tier intégration) — bloquante, pas de faux vert"
      - "Test de cohérence visuel↔XML (le PDF lisible et le CII portent les mêmes montants)"
      - "Lib QuestPDF confinée à FacturX.Infrastructure"
      - "verify-fast passes ; codex-review clean or only accepted P2s"
  FXG:
    title: "Plug-in PA générique : transmet le Factur-X par email / dépôt de fichier (niveau Essentiel)"
    description: |
      Plug-in `Liakont.PaClients.Generique` (IPaClient) — ne référence que Transmission.Contracts (+ Common),
      JAMAIS Notification/FacturX/MailKit ni un autre plug-in. Déclare `SupportsFacturXTransmission = true`
      (Super PDP/B2Brouter = false) — À AJOUTER au record PaCapabilities ET à l'enum miroir PaCapability
      (capacité typée/journalisable, comme les 8 valeurs existantes). PAS de récupération de statut ni de cycle
      de vie (= Essentiel). Reçoit le Factur-X PRÉ-CONSTRUIT via le contrat IPaClient étendu (FX07) ; ne
      régénère JAMAIS (artefact absent → blocage). Canaux via une nouvelle abstraction `IDocumentDeliveryChannel`
      définie dans Transmission.Contracts, implémentée au Host :
        - email : l'impl. Host COMPOSE un MIME AVEC PIÈCE JOINTE (MimeKit/MailKit, Host-only) — IEmailTransport
          du socle (SendAsync recipient/subject/body) ne porte PAS de pièce jointe → NON réutilisé, socle NON
          modifié (n°11/20) ; réutilise la config/connexion SMTP d'ADR-0018. Destinataire = boîte PA du tenant ;
        - dépôt de fichier : V1 = dossier/montage par tenant ; SFTP = fast-follow + ADR (SSH.NET).
      Secrets (SMTP/SFTP) chiffrés par tenant, jamais en clair (n°10/18). Tests de frontière (modèle
      SuperPdpBoundaryTests). Détail F16 §6.
    acceptance:
      - "Plug-in Generique implémente IPaClient ; BoundaryTests : ne référence que Transmission.Contracts (ni MailKit ni Notification ni FacturX)"
      - "SupportsFacturXTransmission ajoutée au record PaCapabilities ET à l'enum miroir PaCapability"
      - "IDocumentDeliveryChannel dans Transmission.Contracts (impl. Host) ; email = MIME avec pièce jointe (MimeKit Host-only), socle IEmailTransport non modifié"
      - "Canal dépôt fichier ; secrets chiffrés par tenant, jamais versionnés ; reçoit l'artefact pré-construit, ne régénère jamais"
      - "verify-fast passes ; codex-review clean or only accepted P2s"
  FX06:
    title: "Journalisation de l'envoi PA (F06 append-only) + trace de support du Factur-X transmis"
    description: |
      Étendre la piste d'audit F06 (document_events, APPEND-ONLY) : compte/plug-in PA, horodatages
      requête/réponse, hash de l'artefact transmis, réponse PA, clé d'idempotence recherchable. ⚠️ Extension =
      ADD COLUMN nullable (nouvelle migration, modèle V009), AUCUN backfill UPDATE (sinon piège du trigger append-only qui
      rejette tout UPDATE). AUCUN chemin update/delete (n°4). Trace de SUPPORT (store SÉPARÉ, rétention courte
      ~90j configurable, purge planifiée AUTORISÉE car NON-audit) : copie du Factur-X transmis, TENANT-SCOPÉE
      (n°9), données fiscales protégées au repos ; distincte de la piste d'audit WORM et de l'archive probante
      (Pilotage). Détail F16 §7.
    acceptance:
      - "document_events étendu par ADD COLUMN nullable (nouvelle migration, modèle V009, sans backfill UPDATE) : compte/plug-in PA + hash artefact + horodatages + réponse"
      - "Aucun chemin update/delete sur document_events (trigger append-only intact)"
      - "Trace de support tenant-scopée (n°9), store dédié, rétention configurable, purgeable SANS toucher document_events ni l'archive probante"
      - "Tests : append-only préservé ; purge de la trace de support n'altère pas l'audit"
      - "verify-fast passes ; codex-review clean or only accepted P2s"
  FX07:
    title: "Intégration pipeline : génération Factur-X à l'étape Sending (avant transmission), pilotée par capacité"
    description: |
      Câbler la génération à l'étape Sending (SendReadyAsync, JUSTE AVANT l'appel de transmission au plug-in),
      derrière IFacturXBuilder, déclenchée par la capacité SupportsFacturXTransmission de la PA active (JAMAIS
      if (pa is Generique), n°8). ⚠️ PAS dans FinalizeIssuedAsync : cette méthode s'exécute en AVAL, après le
      retour Issued (archive WORM + MarkIssued + purge) et ne reçoit même pas l'IPaClient — y générer le
      Factur-X le produirait APRÈS la transmission (artefact jamais transmis = faux-vert). Étendre le contrat
      IPaClient (Transmission.Contracts) pour porter l'artefact pré-construit (p. ex. PaSendContext optionnel) :
      les PA existantes l'IGNORENT (elles construisent leur payload), la PA générique l'EXIGE (absent → blocage,
      jamais régénéré dans le plug-in). FinalizeIssuedAsync ne garde que la journalisation FX06. Les PA
      existantes suivent leur chemin INCHANGÉ. Détail F16 §6.1/§7.
    acceptance:
      - "Génération à l'étape Sending (avant SendDocumentAsync), PAS dans FinalizeIssuedAsync ; pilotée par SupportsFacturXTransmission ; aucun if (pa is X)"
      - "Contrat IPaClient étendu (Transmission.Contracts) : artefact pré-construit passé au plug-in ; absent → blocage (jamais régénéré)"
      - "Test bout-en-bout : facture B2C → Factur-X généré (AVANT transmission) → transmis (canal générique) → journalisé + trace support"
      - "Super PDP/B2Brouter inchangés (chemin Pilotage) ; verify-fast passes ; codex-review clean or only accepted P2s"

  GATE_FACTURX:
    type: gate
    executor: human
    title: "Gate (humaine) : recette de la génération Factur-X + PA générique (lot FX)"
    description: |
      Recette humaine du lot FX. Vérifie EN RÉEL :
        - un Factur-X PDF/A-3 conforme est généré (veraPDF + Mustangproject verts) avec factur-x.xml embarqué ;
        - cohérence visuel↔XML : le PDF lisible et le CII portent les MÊMES montants (ni veraPDF ni Mustang ne
          le couvrent — contrôle humain/test dédié) ;
        - matrice d'échantillons exercée (pas un seul happy-path mono-taux) : mono-taux, multi-taux, exonéré
          (VATEX), autoliquidation, criée mono-Seller — prouve la recopie/blocage VATEX et l'autoliquidation ;
        - le sérialiseur CII maison dérive BG-23/BR-CO-17 sans rien inventer et bloque tout doc non réconciliable ;
        - la PA générique transmet le Factur-X par email (pièce jointe) / dépôt de fichier (secrets chiffrés) ;
        - l'envoi est journalisé (F06 append-only + trace de support séparée, tenant-scopée) ;
        - les PA existantes (Super PDP, B2Brouter) restent inchangées.
    acceptance:
      - "FX02→FX07 + FXG done et prouvés (tests + recette du Factur-X réel : veraPDF/Mustang verts)"
      - "Cohérence visuel↔XML vérifiée + matrice d'échantillons (mono/multi-taux, VATEX, autoliquidation, criée mono-Seller) exercée"
      - "PR ouverte, CI verte (verify + tests), merge humain"
