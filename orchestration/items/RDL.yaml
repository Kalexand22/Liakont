    description: |
      Recette humaine du lot RDL (findings confirmés de la revue critique du 2026-06-19). Vérifie que les
      13 items sont livrés ET prouvés, et VALIDE les 2 arbitrages humains (décisions tracées) :
        - P1 : RDL01 (enum gardé/rejet + binding strict) ; RDL06 (4 fan-out Pipeline dispatchables — SYNC/
          AGGREGATE/RECTIFY ne sont plus des jobs morts).
        - Hash & contrat (ADR-0007) : RDL02 (boucle wire-STJ↔writer + lecteur prod acté), RDL03 (complétude/
          ordre/cas limites), RDL04 (sens N+1→N tranché), RDL05 (ARBITRAGE : décision NFC tracée).
        - Jobs multi-tenant (ADR-0006) : RDL07 (ARBITRAGE : run partiel + observabilité), RDL08 (reprise/
          anti-recouvrement/budget temps), RDL09 (provenance baseline cohérente).
        - Dépôt agent (ADR-0005) : RDL10 (ADR à jour + plan de bascule), RDL11 (gardes déclaratives de pureté),
          RDL12 (PivotReconciliation hors du contrat publiable).
        - Doc : RDL13 (collision ADR-0023 + statut ADR-0016).
      Les 2 décisions d'arbitrage (RDL05 NFC ; RDL07 sémantique run partiel) doivent être tranchées et
      TRACÉES (aucune règle fiscale inventée — règle n°2). Les 12 findings réfutés ne sont pas dans le
      périmètre (voir tasks/redline-adr-005-006-007.md).
    acceptance:
