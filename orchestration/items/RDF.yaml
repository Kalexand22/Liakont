  RDF14:
    source: "RL-UPD-1 (P3, ADR-0013/0019 — auto-update)"
    title: "Durcir la signature d'auto-update : imposer RSA >= 2048/3072 (vérificateur + provisioning) + planifier Authenticode"
    description: |
      La chaîne d'auto-update est conforme (manifeste signé RSA/SHA-256 fail-closed, anti-downgrade, rollback).
      Deux réserves : (1) `RsaManifestSignatureVerifier` ne contrôle AUCUNE taille de clé (une clé 1024 bits
      passerait) ; (2) Authenticode est toujours « fast-follow » → les binaires ne sont pas signés au niveau OS
      (frottement SmartScreen/EDR ; un binaire posé hors-canal n'est pas rejeté par l'OS).
      Fix : (1) imposer RSA >= 2048 (idéalement 3072) dans le vérificateur ET au provisionnement de la clé
      (`install-agent.ps1` copie aujourd'hui sans valider) ; (2) sortir Authenticode du « fast-follow » :
      planifier l'acquisition du certificat avant tout déploiement de flotte large, et mettre à jour
      ADR-0013/0019 en conséquence. Secrets/clés jamais versionnés (règle 10/18).
    acceptance:
      - "RsaManifestSignatureVerifier rejette une clé < 2048 bits ; install-agent.ps1 valide la taille au provisioning"
      - "Test prouvant le rejet d'une clé trop courte (fail-closed)"
      - "Authenticode planifié (ADR-0013/0019 mis à jour : prérequis avant flotte large)"
      - "Aucune clé/secret versionné"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
  RDF15:
    source: "RL-PKG-2 + RL-SER-2 (P3, ADR-0003 — Newtonsoft + fil v1)"
    title: "Bump Newtonsoft 13.0.4 (rôle = transport, pas pivot) + documenter le fil v1 PascalCase non négociable + test négatif d'insensibilité de casse"
    description: |
      Deux petites dettes du contrat agent :
        - Newtonsoft.Json 13.0.3 (un patch en retard) ne sert qu'aux ENVELOPPES de transport non hashées (le
          hash d'intégrité passe par un writer canonique manuel, sans Newtonsoft) ; le libellé d'ADR-0003
          (« sérialisation du PIVOT ») est TROMPEUR. Fix : bump 13.0.4 + corriger le libellé en « transport ».
        - Le fil v1 n'a pas de négociation de format : l'agent envoie du PascalCase, lié UNIQUEMENT grâce à
          `PropertyNameCaseInsensitive=true` (défaut Web), non documenté. Un durcissement futur (camelCase
          strict) casserait la liaison SILENCIEUSEMENT (champs null, NRE sur `Documents.Count`). Fix : documenter
          que le fil v1 EST le canonique PascalCase (non négociable) + ajouter un contrôle NÉGATIF (avec
          `PropertyNameCaseInsensitive=false`, la liaison doit échouer proprement, pas produire un DTO vide).
    acceptance:
      - "Newtonsoft.Json bumpé en 13.0.4 (avenant ADR-0003) ; libellé du rôle corrigé (transport, pas pivot)"
      - "Doc : le fil v1 EST le canonique PascalCase non négociable (contrat-agent-v1.md ou F12)"
      - "Test négatif : PropertyNameCaseInsensitive=false => la liaison échoue (pas de DTO silencieusement vide)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
  RDF16:
    source: "RL-SOCLE-2 / RL-AGT-6 / RL-SOCLE-1 (doc + gouvernance, ADR-0001) ; voir DEC-4"
    title: "Documenter : plafond tenants/topologie + verrous de lecture implicites + mesure de dérive socle cumulée + backport sécurité Stratum"
    description: |
      Trois dettes documentaires/gouvernance autour d'ADR-0001 :
        - Plafond multi-tenant : le boot est O(N) (migration DbUp par base, en série, fail-closed assumé).
          Documenter un ORDRE DE GRANDEUR de tenants/instance PAR TOPOLOGIE + coût de boot + seuil de sharding.
          NE PAS proposer de migration paresseuse (contredit l'invariant fail-closed documenté).
        - Verrous de lecture implicites : la lecture seule interdit déjà verrous explicites + transactions
          d'écriture (prouvé). Documenter que la suppression des verrous PARTAGÉS IMPLICITES du moteur
          (READ COMMITTED) relève du paramétrage tenant (`ApplicationIntent=ReadOnly`/snapshot selon moteur),
          avec un EXEMPLE par moteur dans `config/exemples/` (comme prévu par la XML-doc du connection factory).
        - Dérive socle : `socle-provenance-check.ps1` ne mesure que la dérive post-régénération, jamais vs le
          commit source `1454c7f`. Publier une mesure de dérive CUMULÉE vs `1454c7f` + acter une politique de
          BACKPORT des correctifs de sécurité Stratum amont (ADR-0001 reconnaît l'absence de descente auto sans
          trancher) + requalifier l'option D (« non planifiée / à réévaluer » ou critère + budget).
        - Préfixe de base (DEC-4) : documenter le défaut `stratum_` assumé + l'option de surcharge (`liakont_`) ;
          ne pas basculer (arbitrage Karl avec RLF01).
    acceptance:
      - "Doc : plafond tenants/instance par topologie + coût de boot + seuil de sharding (pas de migration paresseuse)"
      - "Doc + exemple par moteur (config/exemples/) : verrous de lecture implicites via paramétrage tenant"
      - "Mesure de dérive socle cumulée vs 1454c7f publiée ; politique de backport sécurité Stratum actée ; option D requalifiée"
      - "Défaut de préfixe de base documenté (stratum_ assumé + option de surcharge) ; aucune bascule unilatérale"
      - "verify-fast passes"
  RDF17:
    source: "RL-TR-1 (P2, transverse — FluentAssertions) ; voir DEC-2"
    title: "Décision-prep FluentAssertions : ADR comparatif (7.x / licence Xceed / migration AwesomeAssertions) + recommandation (exécution = item ultérieur post-Karl)"
    description: |
      FluentAssertions 8.x est devenu une dépendance COMMERCIALE (licence Xceed 14,95-130 $/dev/an depuis
      janv. 2025) ; la 7.x reste gratuite. Il est épinglé `8.2.0` dans 3 catalogues (plateforme, agent,
      OnSiteSignature), exempté par ADR-0003:27 sur une prémisse devenue fausse. >250 fichiers de test → coût de
      downgrade croissant. P2 (et non P1) : paquet de test BUILD-TIME, jamais livré, n'affecte ni le runtime ni
      la correction fiscale.
      Fix (autonome, prépare la décision DEC-2) : produire un ADR (Liakont) comparant 3 options — (a) downgrade
      7.x, (b) acheter la licence Xceed, (c) migrer vers AwesomeAssertions/Shouldly — avec coût, blast radius
      (compte de fichiers/catalogues impactés), risque, et une RECOMMANDATION. NE PAS exécuter la migration :
      l'EXÉCUTION est un item ultérieur APRÈS arbitrage Karl. Mettre à jour l'exemption d'ADR-0003 (prémisse
      caduque actée).
    acceptance:
      - "ADR Liakont comparant 7.x / licence / migration (coût, blast radius >250 fichiers + 3 catalogues, risque) + recommandation"
      - "ADR-0003 corrigé : l'exemption FluentAssertions repose sur une prémisse devenue fausse (actée)"
      - "AUCUNE migration exécutée dans cet item (l'exécution attend la décision Karl)"
      - "verify-fast passes"
  RDF18:
    source: "RL-TR-6 (P2, transverse — QuestPDF) ; voir DEC-3 ; HORS gate (couplé GATE_FACTURX)"
    title: "QuestPDF : rendre LicenseType configurable par topologie + check au déploiement (licensee = paramétrage, jamais codé en dur)"
    description: |
      QuestPDF est en `LicenseType.Community` CODÉ EN DUR (`CommonUIServiceExtensions.cs:91`,
      `FacturXModuleRegistration.cs:26`), sans config par topologie. La licence Community est gratuite sous
      1 M$ de CA, mais s'applique au SCELLEMENT PDF/A-3 (INV-FX-1) sur le chemin d'émission FISCALE, et le
      « licensee » est ambigu en marque grise.
      Fix (code autonome) : rendre `LicenseType` CONFIGURABLE par topologie/instance (pas de licence en dur) +
      un check au déploiement qui exige une valeur explicite de `LicenseType` (pas une « clé »). La DÉCLARATION
      du licensee par topologie reste un geste de paramétrage/déploiement (DEC-3, Karl) — jamais une donnée
      client dans le code (règle 7). Mentionner le plan B documenté (ZUGFeRD.PDF-csharp) sans le coder.
      ⚠️ Couplé à FacturX : depends_on GATE_FACTURX (ne pas durcir la licence avant que la recette FacturX soit
      intégrée). HORS gate GATE_REDLINE_FONDATEURS (fast-follow, comme PIP03b/API01d/SUP01c).
    acceptance:
      - "QuestPDF LicenseType configurable par topologie/instance (plus de licence codée en dur)"
      - "Check au déploiement : LicenseType explicite requis (échec si absent) ; aucune donnée client dans le code"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

