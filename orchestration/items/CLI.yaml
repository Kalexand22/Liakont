# Lot CLI — Gateway.Cli : utilitaire de mise en service et de secours
# Spec : docs/conception/F11-CLI-Mode-Automatique.md (rôle réduit par l'architecture Service/API)
# Décision 2026-06-02 : le mode nominal de production est le Service. Le CLI devient un
# utilitaire pour la mise en service, le diagnostic et les opérations de secours.

items:
  CLI01:
    title: "Gateway.Cli : utilitaire de mise en service et de secours"
    description: |
      Implémenter l'exécutable CLI dans src/Gateway.Cli/ :
      1. Commandes de mise en service :
         - check-config --config <chemin> : valide la config complète (connexion source ODBC,
           clé API PA + capacités, table TVA chargée, provider de stockage, droits API,
           tax_report_setting actif côté PA pour le SIREN configuré — diagnostic F04 §3.1 :
           « Transport not available » détecté AVANT le premier envoi) sans rien traiter.
           Sortie lisible point par point.
         - encrypt-secret : chiffre une valeur (DPAPI) pour collage dans le fichier de config.
      2. Commandes de secours (quand le Service est ARRÊTÉ — protégé par le mutex global) :
         - run --config <chemin> [--from --to --dry-run --max] : exécution manuelle du pipeline
           complet, codes retour 0/1/2/3 (contrat F11)
         - backup : sauvegarde horodatée de la base + du coffre d'archive
         - verify-archive : vérification d'intégrité de la chaîne d'archive (TRK07)
         - audit-export --from <date> --to <date> [--document <numéro>] : export contrôle fiscal
           par période ou par document (TRK07) — le même export que l'API, disponible sans le
           Service (cas : contrôle fiscal après désinstallation, machine de secours)
      3. Si le Service tourne (mutex occupé) : les commandes de secours refusent avec le
         message « Le service Conformat est actif — utilisez la console ou arrêtez le service »
         (code retour 3). check-config et encrypt-secret restent toujours disponibles.
      4. Le CLI est une coquille mince : il appelle les services du Core, aucune logique métier.
    acceptance:
      - "check-config valide tous les points de la config avec sortie lisible"
      - "encrypt-secret fonctionnel (round-trip DPAPI)"
      - "run/backup/verify-archive/audit-export refusent proprement quand le Service tourne (code 3)"
      - "audit-export produit un export par période et par document"
      - "Codes retour 0/1/2/3 conformes à F11"
      - "Tests : parsing arguments, mutex occupé → code 3, dry-run sans écriture PA, audit-export"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_SERVICE_API:
    type: gate
    executor: human
    title: "Gate : Service + API + CLI validés"
    description: |
      Validation humaine de l'hôte d'exécution complet. Démonstration attendue :
      le Service installé tourne, un run planifié s'exécute sur fixtures (FixtureExtractor +
      FakePaClient), l'API répond avec auth Windows, et le CLI check-config/run de secours
      fonctionnent.
    acceptance:
      - "Tous les items SVC, API, CLI sont done"
      - "PR du segment feat/service-api revue et mergée dans main"
      - "Un run de bout en bout sur fixtures via le Service planifié a été démontré"
      - "L'API a été appelée avec succès depuis une autre machine du réseau (auth Windows)"
