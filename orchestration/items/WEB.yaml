# Lot WEB — Console web (pages Blazor des modules Liakont)
# Specs : docs/conception/F10-Console-Admin-WPF.md (CONTENU FONCTIONNEL : écrans, états,
#         vocabulaire opérateur — l'amendement 2026-06-03 fait foi pour l'architecture),
#         docs/conception/F12 (architecture)
# Architecture : pages Blazor Server dans les projets Web des modules. Les pages appellent les
# handlers MediatR (jamais la base directement). Navigation via INavSectionProvider.
# Tests : bUnit (composants) + Playwright (E2E parcours complets).
# Philosophie F10 : simple, lisible, zéro jargon technique, 100 % français.
#
# =============================================================================================
# ARCHITECTURE UI — RÈGLE NON NÉGOCIABLE (directive opérateur 2026-06-07)
# =============================================================================================
# La console Liakont est bâtie SUR le design-system Stratum (projet Stratum.Common.UI) et doit
# conserver l'INTÉGRALITÉ de ses capacités. Une page qui réimplémente une grille/table « maison »
# et perd ces capacités est un P1 (régression produit, coûteuse à corriger après coup).
#
# GABARIT CANONIQUE pour TOUTE page de liste (à copier, ne pas réinventer) :
#   src/Modules/Identity/Web/Pages/AdminAgents.razor  +  Registries/AgentColumnRegistry.cs
#   => <DeclaredListPage TItem="…">  (src/Common/UI/Components/DeclaredListPage.razor)
#      alimenté par un ColumnRegistry héritant de ColumnRegistryBase<TDto>
#      (src/Common/UI/Services/ColumnRegistryBase.cs).
#   Pages de détail/formulaire : DeclaredFormPage + composants Stratum* (StratumButton, …) ;
#   badges StatusBadge / CategoryBadge (src/Common/UI/Components/).
#
# SHELL — fourni clé en main, NE PAS reconstruire : ErpShellLayout + ErpNav (nav déclarée via
#   INavSectionProvider) + TabBar (ouvrir les fiches en ONGLET, ITabManagerService) +
#   CommandPalette (recherche globale Ctrl+K).
#
# CAPACITÉS À PRÉSERVER sur chaque liste — toutes fournies par DeclaredListPage, JAMAIS perdues :
#   • recherche par liste, raccourci « / »              (param SearchPlaceholder)
#   • filtres avancés AND/OR + filtres enregistrés      (StratumFilterBuilder, piloté par le registry)
#   • colonnes configurables/réordonnables + persistance (StratumColumnChooser + param GridKey)
#   • export CSV/Excel/PDF                               (AllowExport=true, ExportFileName)
#   • tri par colonne, pagination serveur
#   • multi-sélection + actions groupées                (param BulkActions: BulkActionConfig<T>)
#   • actions de ligne (menu ⋮ + quick-actions)         (param RowActions: GridRowAction<T>)
#   • badges statut/rôle                                (StatusBadge / CategoryBadge via ColumnTemplates)
#   • recherche globale Ctrl+K + onglets multi-documents (shell)
#
# INTERDIT (P1) : RadzenDataGrid brut, <table> maison, ou toute page court-circuitant
#   DeclaredListPage et régressant la parité fonctionnelle avec le gabarit ci-dessus.
# THEMING : tokens du design-system (src/Common/UI/wwwroot/css/tokens.css) — aucun style divergent.
#   Réf. socle : docs/adr/socle/ADR-0003-radzen-ui.md.
# Tout NOUVEAU composant générique réutilisable se loge dans Stratum.Common.UI, pas dans un module
#   (et toute modif du socle vendored Stratum.* se consigne dans la provenance — CLAUDE.md n°11).
#
# CRITÈRE D'ACCEPTATION TRANSVERSE — s'ajoute à CHAQUE item WEB (et SUP02) :
#   - « Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor),
#      AUCUNE grille maison »
#   - « Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes
#      configurables, export, multi-sélection + actions, actions de ligne, badges »
# =============================================================================================

items:
  WEB01:
    title: "Navigation Liakont + tableau de bord d'accueil"
    description: |
      Implémenter la structure de la console web :
      1. LiakontNavSectionProvider(s) : sections de navigation — Documents, Encaissements,
         Traitements, Réconciliation (visible UNIQUEMENT si l'agent du tenant déclare la
         capacité pool de PDF — lue via GET /settings), Paramétrage, Supervision (visible
         selon le rôle). Pattern INavSectionProvider du socle Stratum.
      2. Page d'accueil / tableau de bord du tenant : compteurs par état (à envoyer, bloqués,
         émis, rejetés), état de l'agent (dernier heartbeat, version), état de la table TVA
         (alerte si NON VALIDÉE), prochaine échéance de période déclarative — affichée
         UNIQUEMENT si reportingFrequency (CFG02, décision D4) est renseigné ; sinon, bandeau
         « Fréquence déclarative non renseignée — consultez votre expert-comptable »
         (jamais d'échéance calculée sur une cadence devinée).
      3. États et vocabulaire opérateur de F10 §2.2 repris à l'identique :
         ⏳ À envoyer / 🛑 Bloqué / ⏫ En cours / ✅ Émis / ❌ Rejeté / ⚠️ Erreur technique /
         ↪ Remplacé / ✋ Traité manuellement — composant partagé DocumentStateBadge.
      4. Langue : français uniquement. Aucun texte anglais visible par l'opérateur.
      5. Tests bUnit : badge d'état (tous les états), compteurs, navigation conditionnelle
         (réconciliation masquée sans capacité). Test E2E Playwright : login → dashboard →
         navigation vers chaque section.
    acceptance:
      - "Navigation avec sections conditionnelles (capacités, rôles)"
      - "Tableau de bord avec compteurs, état agent, état table TVA"
      - "Échéance déclarative affichée seulement si reportingFrequency est renseigné (testé : null = bandeau explicite, jamais de calcul)"
      - "DocumentStateBadge couvre tous les états avec le vocabulaire français de F10"
      - "Tests bUnit + E2E Playwright (login → dashboard → navigation)"
      - "Tous les libellés en français"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB02:
    title: "Page Documents (vue centrale)"
    description: |
      Implémenter la page principale selon F10 §2.1, alimentée par GET /documents :
      1. Liste des documents via <DeclaredListPage TItem="..."> (gabarit AdminAgents.razor, voir
         l'en-tête du lot) : colonnes n°, date, acheteur, montant, type (bordereau/avoir), état
         (DocumentStateBadge via ColumnTemplates). PAS de grille maison.
      2. Filtres : période (défaut mois courant), état, type, texte libre (n°, acheteur).
      3. Compteurs permanents : synthèse par état au-dessus de la liste.
      4. Sélection multiple + boutons [Voir] (détail — WEB03), [▶ Envoyer la sélection],
         [▶▶ Tout envoyer] (actions branchées en WEB05 — ici présents mais désactivés
         avec tooltip explicatif).
      5. Pagination serveur (les tenants peuvent avoir des milliers de documents).
      6. Tests bUnit : filtres, compteurs, formatage français, état vide. E2E Playwright :
         chargement, filtrage, navigation vers le détail.
    acceptance:
      - "Liste avec colonnes et états français de F10, pagination serveur"
      - "Bâtie sur DeclaredListPage + ColumnRegistry (gabarit AdminAgents.razor) — AUCUNE grille maison"
      - "Parité fonctionnelle testée : recherche /, filtres avancés, colonnes configurables, export, multi-sélection, actions de ligne, badges"
      - "Filtres période/état/type/texte fonctionnels"
      - "Compteurs par état synchronisés avec les filtres"
      - "Tests bUnit + E2E Playwright"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # WEB03 re-découpé en WEB03a/b/c (2026-06-07, v14) : page détail (4 onglets + 5 actions) trop
  # large pour un seul item — WEB03a pose la page lecture, WEB03b les actions garde-fou/recheck,
  # WEB03c les actions de résolution terminale (chacune dépend d'un endpoint API distinct).
  WEB03a:
    title: "Page détail document : 4 onglets (lecture) + export audit"
    description: |
      Implémenter la page détail document en LECTURE selon F10 §2.3, alimentée par
      GET /documents/{id}. C'est la coquille sur laquelle WEB03b et WEB03c brancheront les
      actions. Sur DeclaredFormPage (gabarit de l'en-tête du lot), AUCUNE grille maison.
      dépend de [WEB02, API01a].
      1. Onglet Contenu : en-tête (n°, date, acheteur, totaux) + lignes (libellé, montants,
         régime TVA source → catégorie/VATEX résultante). Ce qui a déclenché un blocage est
         mis en évidence.
      2. Onglet Contrôles : liste des contrôles passés/échoués (F04) — ✅/🛑/⚠️ par contrôle,
         avec le message opérateur et l'action corrective (lecture seule à ce stade ; les
         boutons de verdict/recheck arrivent en WEB03b).
      3. Onglet Historique : chronologie complète (réception agent, validations, envoi, réponse
         PA, tax report, changements d'état successifs avec auteur). C'est la vue piste d'audit.
      4. Onglet Archive : référence du paquet, état d'intégrité de la chaîne, bouton
         [Exporter pour contrôle fiscal] → GET audit-export (téléchargement navigateur).
      5. Tests bUnit : les 4 onglets, contenu/contrôles affichés, export déclenchable.
         E2E Playwright : ouverture du détail → parcours des 4 onglets → export.
    acceptance:
      - "4 onglets Contenu / Contrôles / Historique / Archive en lecture, conformes au contenu fonctionnel F10"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Export audit téléchargeable depuis l'onglet Archive (GET audit-export)"
      - "Tests bUnit + E2E Playwright (ouverture détail → 4 onglets → export)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB03b:
    title: "Détail document : actions garde-fou + re-vérification"
    description: |
      Sur la page détail document (WEB03a), brancher les actions garde-fou de l'onglet
      Contrôles, alimentées par les endpoints de verdict/recheck. Boutons d'action masqués
      sans la permission actions. dépend de [WEB03a, API02b].
      1. Verdict B2C/B2B pour un contrôle BUYER_LOOKS_PROFESSIONAL : boutons
         « Confirmer particulier (B2C) » / « Traiter manuellement (B2B) » → POST verdict ;
         le verdict (avec auteur) apparaît immédiatement dans l'onglet Historique.
      2. [Revérifier maintenant] → POST recheck → résultat des contrôles affiché
         immédiatement (onglet Contrôles rafraîchi sans rechargement de page).
      3. Permissions : ces boutons sont masqués si l'utilisateur n'a que liakont.read
         (la page reste consultable en lecture, conforme à WEB03a).
      4. Erreurs d'action : messages français exploitables avec le numéro de document.
      5. Tests bUnit : verdict B2C/B2B, recheck (résultat immédiat), boutons masqués en
         lecture seule. E2E Playwright : parcours blocage → verdict → recheck.
    acceptance:
      - "Verdict B2C/B2B (BUYER_LOOKS_PROFESSIONAL) branché, reflété immédiatement dans l'historique"
      - "[Revérifier maintenant] (recheck) avec résultat affiché immédiatement"
      - "Boutons d'action masqués sans la permission actions"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Tests bUnit + E2E Playwright (parcours blocage → verdict → recheck)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB03c:
    title: "Détail document : actions de résolution terminale"
    description: |
      Sur la page détail document (WEB03a), brancher les actions de résolution terminale,
      alimentées par les endpoints supersede/resolve-manually. Boutons masqués sans la
      permission actions. dépend de [WEB03a, API02c].
      1. [Traiter manuellement hors passerelle...] → saisie du motif OBLIGATOIRE (envoi
         impossible sans motif) → POST resolve-manually ; la résolution avec son motif et son
         auteur apparaît dans l'onglet Historique.
      2. [Lier au document de remplacement...] (document rejeté) → sélecteur du nouveau
         document (avec recherche) → POST supersede → affichage du lien ancien ⇄ nouveau sur
         les deux fiches.
      3. Permissions : ces boutons sont masqués si l'utilisateur n'a que liakont.read.
      4. Erreurs d'action : messages français exploitables avec le numéro de document.
      5. Tests bUnit : motif obligatoire (blocage si vide), supersede (lien affiché des deux
         côtés), boutons masqués en lecture seule. E2E Playwright : parcours rejet → liaison
         au document de remplacement.
    acceptance:
      - "Traitement manuel hors passerelle avec motif obligatoire (résolution journalisée dans l'historique)"
      - "Liaison au document de remplacement (supersede) avec lien ancien ⇄ nouveau affiché des deux côtés"
      - "Boutons d'action masqués sans la permission actions"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Tests bUnit + E2E Playwright (parcours rejet → document de remplacement)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # WEB04 re-découpé en WEB04a/b (2026-06-07, v14) : journal et paramétrage lecture sont deux
  # pages distinctes alimentées par des endpoints différents — WEB04a le journal des traitements,
  # WEB04b le paramétrage du tenant en lecture (+ vérification d'intégrité de l'archive).
  WEB04a:
    title: "Page Traitements (journal)"
    description: |
      Implémenter la page Traitements (journal des runs du tenant) selon F10 §2.6, alimentée
      par GET /runs. Sur DeclaredListPage (gabarit de l'en-tête du lot), AUCUNE grille maison.
      dépend de [WEB01, API01b].
      1. Liste des traitements : date, durée, déclencheur (planifié / manuel / ingestion),
         compteurs (reçus / validés / bloqués / envoyés / rejetés).
      2. Objectif opérateur : répondre d'un coup d'œil à « est-ce que ça a tourné cette
         nuit ? ». Tri par date décroissante par défaut, pagination serveur.
      3. États vides : message explicite si aucun traitement sur la période.
      4. Tests bUnit : colonnes, déclencheurs, compteurs, état vide, formatage français.
         E2E Playwright : chargement et affichage du journal.
    acceptance:
      - "Journal des traitements avec date, durée, déclencheur et compteurs (reçus/validés/bloqués/envoyés/rejetés)"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Tests bUnit + E2E Playwright"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB04b:
    title: "Page Paramétrage du tenant (lecture)"
    description: |
      Implémenter la page Paramétrage du tenant en LECTURE selon F10 §2.5, alimentée par
      GET /settings (l'édition de la table TVA arrive en WEB07). Sur DeclaredFormPage (gabarit
      de l'en-tête du lot), AUCUNE grille maison. dépend de [WEB01, API01c, API03].
      1. Profil : SIREN, raison sociale, contact.
      2. Paramètres fiscaux (vatOnDebits, operationCategory, reportingFrequency) avec alerte
         « décision en attente » si null — jamais de valeur devinée.
      3. Agent(s) : dernier heartbeat, version, état (la GESTION du parc — enregistrement,
         révocation, rotation de clé — est l'écran dédié WEB09).
      4. Compte(s) PA : nom, environnement, capacités déclarées (B2C ✅, Paiements ⏳,
         B2B ⬜ phase 2...) — l'opérateur voit ce que sa plateforme sait faire.
      5. Table TVA : résumé (version, validateur, état de validation) + lien vers WEB07.
      6. Secrets TOUJOURS masqués (jamais de clé/chaîne ODBC affichée en clair).
      7. Bouton [Vérifier l'intégrité de l'archive] → POST /archive/verify (API03) →
         affichage du rapport d'intégrité du coffre complet du tenant.
      8. Tests bUnit : paramétrage affiché, alerte fiscale si null, secrets masqués, capacités
         PA, vérification d'intégrité (rapport affiché). E2E Playwright : navigation et affichage.
    acceptance:
      - "Paramétrage affiché en lecture (profil, paramètres fiscaux, agents, comptes PA, table TVA), secrets masqués"
      - "Alerte « décision fiscale en attente » quand un paramètre fiscal est null (jamais de valeur devinée)"
      - "Capacités déclarées des comptes PA visibles ; résumé table TVA avec lien vers WEB07"
      - "Vérification d'intégrité de l'archive déclenchable (POST /archive/verify) et rapport affiché"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Tests bUnit + E2E Playwright"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB05:
    title: "Actions d'envoi (sélection, tout envoyer, traitement manuel)"
    description: |
      Brancher les actions d'envoi selon F10 :
      1. [▶ Envoyer la sélection] : POST /documents/{id}/send pour chaque document sélectionné,
         avec retour visuel par document.
      2. [▶▶ Tout envoyer] : appel confirm=false → dialogue de confirmation (nombre de
         documents + montant total + mention « action irréversible ») → POST confirm=true.
      3. Bouton « Lancer un traitement maintenant » → POST /runs/trigger (démo, rattrapages).
      4. Permissions : boutons masqués si l'utilisateur n'a que liakont.read.
      5. Erreurs d'action : messages français exploitables (« Le document n° 2019 n'a pas pu
         être envoyé : ... »).
      6. Tests bUnit : confirmation, permissions, erreurs. E2E Playwright : parcours
         envoi avec confirmation (sur fixtures + plug-in Fake).
    acceptance:
      - "Envoi sélection et tout-envoyer avec confirmation (récapitulatif affiché avant)"
      - "Traitement manuel déclenchable"
      - "Permissions respectées (boutons masqués en lecture seule)"
      - "Tests bUnit + E2E Playwright (parcours d'envoi complet sur fixtures) — E2E opérateur 7/7 : un rôle operateur NON super-admin voit et déclenche les actions d'envoi (la projection rôle→permission d'IDN01, dont WEB05 dépend, étant en place)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB06:
    title: "Page Encaissements (e-reporting paiement)"
    description: |
      Implémenter la page Encaissements selon F10 §2.4, alimentée par GET /payments :
      1. Agrégats jour×taux (PaymentAggregate) avec leur état de transmission.
      2. L'affichage dépend de la capacité du PA configuré ET des paramètres fiscaux :
         - PA avec capacité paiements : états réels (transmis/en attente/rejeté)
         - PA sans capacité : bandeau « En attente : la plateforme <nom> ne supporte pas encore
           la transmission des paiements — les agrégats sont prêts et partiront automatiquement
           dès l'activation » (argument démo : notre produit est prêt avant la PA)
         - Paramètres fiscaux en attente : bandeau « Décision fiscale en attente (TVA sur les
           débits / catégorie d'opération) — consultez votre expert-comptable »
      3. Tests bUnit : les 3 états d'affichage. E2E Playwright : affichage sur fixtures.
    acceptance:
      - "Agrégats jour×taux affichés avec état de transmission"
      - "Affichage adapté à la capacité du PA et aux paramètres fiscaux (les 3 états testés)"
      - "Tests bUnit + E2E Playwright"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # WEB07 re-découpé en WEB07a/b (2026-06-07, v14) : la vue/validation de la table TVA et son
  # édition (listes fermées + couverture) sont deux étapes distinctes — WEB07a affiche et valide,
  # WEB07b édite les règles (toute modif invalide la validation de WEB07a).
  WEB07a:
    title: "Paramétrage comptable : table TVA (vue + validation)"
    description: |
      Implémenter la vue et la validation de la table de mapping TVA du tenant selon F10
      (amendé) et la décision 2026-06-02, alimentée par les endpoints /settings/tva-mapping
      (API04). Sur DeclaredListPage/DeclaredFormPage (gabarit de l'en-tête du lot), AUCUNE
      grille maison. dépend de [WEB04b, API04].
      1. Vue de la table de mapping TVA : règles (code régime source, libellé, part, catégorie,
         taux, VATEX), affichage lecture.
      2. État de validation permanent et bien visible : ✅ Validée par X le Y / ⚠️ NON VALIDÉE,
         avec bandeau permanent quand la table est NON VALIDÉE (« Les envois sont suspendus
         jusqu'à validation par l'expert-comptable »).
      3. Historique des modifications (changelog) affiché : qui, quand, quoi.
      4. Bouton [Marquer comme validée] (permission liakont.settings) → confirmation avec
         saisie du nom du validateur → POST validation.
      5. Tests bUnit : vue de la table, état de validation (les 2 états), bandeau NON VALIDÉE,
         changelog, validation (saisie validateur obligatoire), permission. E2E Playwright :
         affichage table NON VALIDÉE → validation → bandeau levé.
    acceptance:
      - "Table TVA affichée (régime/libellé/part/catégorie/taux/VATEX) avec état de validation permanent (✅/⚠️)"
      - "Bandeau NON VALIDÉE visible tant que la table n'est pas validée ; changelog affiché"
      - "[Marquer comme validée] avec confirmation et saisie du validateur (permission liakont.settings)"
      - "Bâtie sur DeclaredListPage/DeclaredFormPage + ColumnRegistry (gabarit AdminAgents.razor), AUCUNE grille maison"
      - "Parité fonctionnelle testée (bUnit/Playwright) : recherche /, filtres avancés, colonnes configurables, export, multi-sélection + actions, actions de ligne, badges"
      - "Tests bUnit + E2E Playwright (affichage NON VALIDÉE → validation)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WEB07b:
    title: "Paramétrage comptable : édition des règles TVA"
    description: |
      Sur la page table TVA (WEB07a), implémenter l'édition des règles de mapping (permission
      liakont.settings — éléments masqués sinon), via les endpoints /settings/tva-mapping
      (API04). dépend de [WEB07a].
      NOTE : les listes FERMÉES (catégories UNCL5305, codes VATEX) viennent des contrats TVA05
      existants — à CONSOMMER tel quel, ne rien inventer (aucune valeur fiscale en dur).
      1. Ajouter / modifier / supprimer une règle : formulaire avec listes FERMÉES des
         catégories UNCL5305 et des codes VATEX autorisés — JAMAIS de saisie libre sur ces
         champs (les valeurs proviennent des contrats TVA05).
      2. Intégration du rapport de couverture (TVA03) : les régimes source détectés non mappés
         apparaissent en haut « À compléter » avec bouton [Créer la règle] pré-rempli.
      3. Toute modification invalide la validation : bandeau permanent « Table modifiée — NON
         VALIDÉE. Les envois sont suspendus jusqu'à validation par l'expert-comptable. »
         (l'état de validation et le changelog sont ceux de WEB07a, qui repassent à NON VALIDÉE).
      4. Tests bUnit : ajout/modif/suppression, listes fermées (aucune saisie libre), régimes
         « À compléter » avec pré-remplissage, invalidation de la validation après modif,
         permission (édition masquée sinon). E2E Playwright : parcours « régime non mappé →
