  # NB (Karl, 2026-06-15) : PAS de gate de décision. Stade build = on prend des DÉFAUTS DÉFENDABLES
  # (sourcés, paramétrables tenant) ; le client final tranche fiscal/RGPD avec SON EC/DPO au déploiement.
  # Liakont ne sollicite/paie aucun EC à l'instant T. Le lot s'auto-propulse jusqu'à GATE_SIGNATURE (recette).
  # On ne bloque QUE là où aucun défaut défendable n'existe ET où un mauvais défaut transmettrait du faux.

  # Gate de segment HUMAINE : recette de bout en bout de la signature/validation.
  # depends_on (SIG05, SIG06, SIG07, SIG08, SIG09, SIG10) porté par le manifest.
  GATE_SIGNATURE:
    type: gate
    executor: human
    title: "Gate : workflow de validation/signature de document — recette de bout en bout"
    description: |
      Recette humaine sur instance de dev : un document (auto-facture 389 et/ou mandat) suit un purpose de
      validation ; selon le niveau requis du tenant, l'acceptation passe par Recorded (enregistrée),
      Yousign (à distance) ou Wacom (sur place) ; la preuve est rapatriée en WORM ; le gate n'ouvre que
      selon la Règle §4 (état + niveau ≥ exigence + forme EC pour self-billing) ; un webhook rejoué/un crash
      ne corrompt rien (inbox durable, idempotence) ; le client sur place distingue déposant et signataire ;
      aucun secret en clair, aucune URL libre, frontières NetArchTest vertes, tenant-scoping prouvé.
    acceptance:
      - "Tous les items SIG (SIG01..SIG10) sont done"
      - "Recette de bout en bout : Recorded + Yousign (à distance) + Wacom (sur place) exercés selon le niveau tenant ; preuve en WORM ; gate ouvre selon la Règle §4 et reste fermé sinon"
      - "Robustesse webhook (rejeu/crash) et anti-usurpation (déposant≠signataire) vérifiés à la recette"
      - "Défauts défendables pris (sourcés, paramétrables tenant) ; aucune règle fiscale/RGPD inventée ; les affinages (eIDAS/forme d'acceptation/RGPD) relèvent du client avec son EC/DPO au déploiement, pas d'un blocage en build"
      - "PR du segment feat/signature revue et mergée dans main"
