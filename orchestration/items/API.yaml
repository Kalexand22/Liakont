# Lot API — Endpoints de la console (minimal APIs, permissions Keycloak/Identity)
# Specs : docs/conception/F10 (contenu fonctionnel), F12 (architecture), F06/F07 (actions documents)
# Architecture : les endpoints vivent dans le projet Web de chaque module (pattern Stratum,
# MapGroup /api/v1/), protégés par les permissions du module Identity (3 niveaux :
# liakont.read / liakont.actions / liakont.settings). Les pages Blazor (lot WEB)
# consomment les MÊMES handlers MediatR — les endpoints REST servent l'intégration
# et les clients externes.
#
# RÈGLE : toute requête est tenant-scopée (CLAUDE.md règle 9). Toute action est journalisée
# avec l'identité de l'opérateur (module Audit).

items:
  # API01 re-découpé en API01a/b/c (2026-06-07, manifest v13) : le bootstrap (harness HTTP + 3 projets
  # Web en une session) était trop gros → bloqué « mal dimensionné » par le runner. Découpé par projet
  # Web sur un harness partagé établi par API01a.
  API01a:
    title: "Harness HTTP de la console + endpoints de lecture Documents"
    description: |
      Bootstrap de la couche HTTP de la console (réutilisée par TOUS les autres endpoints API et pages
      WEB) + les endpoints de lecture du module Documents :
      1. Harness partagé (MapGroup /api/v1) : policies de permission liakont.read/actions/settings
         (via Identity), résolution du tenant depuis le contexte utilisateur, enveloppe d'erreur
         uniforme, helper de pagination, helper de masquage des secrets. C'est l'infrastructure que
         API01b/API01c/API02-05 RÉUTILISENT — ne pas la dupliquer.
      2. Documents.Web (lecture) :
         - GET /api/v1/documents?from=&to=&state=&type=&search= → liste paginée (DTO résumé) +
           compteurs par état pour le bandeau de synthèse.
         - GET /api/v1/documents/{id} → détail complet : contenu pivot, contrôles (ValidationIssues),
           historique (DocumentEvents), référence d'archive + état d'intégrité.
      3. Tests d'intégration in-process (WebApplicationFactory + Testcontainers) : harness (permission
         liakont.read → 403 sans elle, isolation tenant A≠B, pagination), les 2 endpoints documents, filtres.
    acceptance:
      - "Harness /api/v1 partagé (policies de permission, résolution tenant, erreurs uniformes, pagination, masquage secrets) réutilisable par API01b/c et API02-05"
      - "GET /documents (liste paginée + compteurs) et GET /documents/{id} (détail) opérationnels"
      - "Permission liakont.read appliquée (403 sans elle), isolation tenant vérifiée par test"
      - "Tests d'intégration in-process (WebApplicationFactory + Testcontainers)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API01b:
    title: "Endpoints de lecture : Traitements + Encaissements"
    description: |
      Sur le harness HTTP d'API01a, ajouter les lectures Pipeline/Job + Payments :
      1. GET /api/v1/runs?from=&to= → journal des traitements (jobs d'ingestion/pipeline du tenant :
         déclencheur, durée, compteurs).
      2. GET /api/v1/payments?period= → agrégats d'encaissements (PaymentAggregate) + état de
         transmission + état des paramètres fiscaux (décision en attente le cas échéant).
      3. RÉUTILISE le harness d'API01a (permissions, tenant, pagination, erreurs) — ne rien redupliquer.
      4. Tests d'intégration : les 2 endpoints, isolation tenant, état des paramètres fiscaux exposé.
    acceptance:
      - "GET /runs et GET /payments opérationnels sur le harness API01a (rien redupliqué)"
      - "Permission liakont.read appliquée, isolation tenant vérifiée par test"
      - "GET /payments expose l'état des paramètres fiscaux (décision en attente le cas échéant)"
      - "Tests d'intégration in-process"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API01c:
    title: "Endpoint de lecture : Paramétrage du tenant"
    description: |
      Sur le harness HTTP d'API01a, ajouter la lecture du paramétrage (TenantSettings.Web) :
      1. GET /api/v1/settings → paramétrage du tenant visible (secrets TOUJOURS masqués), table TVA
         (version, validateur, état de validation), capacités du/des PA configurés, capacités de
         l'agent/adaptateur (la console en a besoin pour afficher ou masquer l'écran Réconciliation).
      2. RÉUTILISE le harness d'API01a — ne rien redupliquer.
      3. Tests d'intégration : endpoint, secrets masqués, isolation tenant, capacités exposées.
    acceptance:
      - "GET /settings opérationnel sur le harness API01a, secrets TOUJOURS masqués"
      - "Table TVA (état de validation) et capacités PA + agent/adaptateur exposées"
      - "Permission liakont.read appliquée, isolation tenant vérifiée par test"
      - "Tests d'intégration in-process"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API02:
    title: "Endpoints d'action sur les documents"
    description: |
      Implémenter les actions (permission liakont.actions) dans Documents.Web / Pipeline :
      1. POST /api/v1/documents/{id}/send → envoi d'un document ReadyToSend.
      2. POST /api/v1/documents/send-all → envoi de tous les ReadyToSend du tenant.
         Avec ?confirm=false : retourne le récapitulatif (nombre + montant total) SANS exécuter ;
         l'exécution exige confirm=true (mécanisme de confirmation pour la console).
      3. POST /api/v1/documents/{id}/verdict → verdict B2C/B2B du garde-fou (VAL05) :
         « confirmer particulier » / « traiter manuellement » — journalisé avec l'identité
         de l'opérateur (DocumentEvent).
      4. POST /api/v1/documents/{id}/resolve-manually → marquer un document bloqué/rejeté
         « traité manuellement hors passerelle », MOTIF OBLIGATOIRE (400 sans motif),
         transition vers l'état terminal ManuallyHandled (TRK02), journalisé.
      5. POST /api/v1/documents/{id}/supersede → lier un document RejectedByPa à son REMPLAÇANT
         (corps : id du nouveau document, déjà reçu via l'agent — le logiciel source est le
         seul créateur de numéros). L'ancien passe Superseded avec lien. Refusé si le
         remplaçant n'existe pas dans le tenant. Journalisé.
      6. POST /api/v1/documents/{id}/recheck → re-valider UN document Blocked après correction
         (table TVA complétée, verdict posé) sans attendre le prochain traitement : repasse
         par le ValidationPipeline → ReadyToSend ou Blocked avec les nouveaux motifs.
      7. POST /api/v1/runs/trigger → déclencher le pipeline du tenant manuellement
         (job à la demande via le module Job).
      8. Toute action est journalisée (module Audit + DocumentEvent) avec l'identité Keycloak
         de l'opérateur. Tests d'intégration : chaque action, droits (lecture seule → 403),
         motif obligatoire, supersede vers un document inexistant (refus), isolation tenant.
    acceptance:
      - "Toutes les actions opérationnelles avec permission liakont.actions"
      - "send-all : récapitulatif avant exécution (confirm=false/true)"
      - "resolve-manually : motif obligatoire, transition ManuallyHandled, journalisé"
      - "supersede : remplaçant existant requis, ancien document Superseded avec lien"
      - "recheck : re-validation d'un seul document"
      - "Toute action journalisée avec l'identité de l'opérateur"
      - "Tests d'intégration : actions, droits, isolation tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API03:
    title: "Export d'audit / contrôle fiscal"
    description: |
      Implémenter les exports (module Archive — TRK05/06) :
      1. GET /api/v1/documents/{id}/audit-export → dossier d'export contrôle fiscal d'un
         document (zip streamé) : paquet d'archive + rapport d'intégrité + preuves d'ancrage
         + chronologie complète (DocumentEvents) + notice de vérification en français.
      2. GET /api/v1/audit-export?from=&to= → export PAR PÉRIODE : tous les paquets de la
         période + rapport d'intégrité global + chronologie. Streaming (les exports peuvent
         être volumineux), pas de matérialisation complète en mémoire.
      3. GET /api/v1/tenant-export → RÉVERSIBILITÉ (F12 §6.3, décision 2026-06-03) :
         export COMPLET du tenant — tracking + archive + paramétrage + journal — le dossier
         que le client emporte s'il quitte la plateforme. Permission liakont.settings.
         (L'outillage opérateur de cette réversibilité est OPS06 ; ici c'est l'endpoint.)
      4. POST /api/v1/archive/verify → vérification d'intégrité À LA DEMANDE de TOUT le coffre
         du tenant (ArchiveVerifier TRK06) : exécute la vérification complète (hashes, chaînage,
         preuves d'ancrage) et retourne le rapport. Permission liakont.read. Exposé par le
         bouton « Vérifier l'intégrité de l'archive » de WEB04. Équivalent v6 de la commande
         verify-archive du backlog v5.
      5. Permission : audit-export = liakont.read (consulter ses propres preuves) ;
         tenant-export = liakont.settings.
      6. Tests d'intégration : export document, export période, export tenant complet,
         vérification d'archive complète (chaîne saine + chaîne altérée), contenu du zip
         vérifié (manifest, notice), isolation tenant, streaming (pas d'OOM sur un gros
         volume simulé).
    acceptance:
      - "Export par document et par période opérationnels (zip streamé)"
      - "Export de réversibilité tenant complet (tracking + archive + paramétrage)"
      - "Vérification d'intégrité du coffre complet à la demande (rapport exploitable, retour non-OK si altération)"
      - "Notice de vérification en français incluse dans chaque export"
      - "Permissions correctes (read pour audit, settings pour réversibilité)"
      - "Tests d'intégration incluant le contenu des zips et l'isolation tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API04:
    title: "Endpoints paramétrage comptable (table TVA) + réconciliation PDF"
    description: |
      Implémenter les endpoints de paramétrage et de réconciliation :
      1. Paramétrage comptable (table de mapping TVA — s'appuie sur TVA05) :
         - GET /api/v1/settings/tva-mapping → table du tenant + état de validation + changelog
         - POST /api/v1/settings/tva-mapping/rules → ajouter une règle
         - PUT /api/v1/settings/tva-mapping/rules/{id} → modifier une règle
         - DELETE /api/v1/settings/tva-mapping/rules/{id} → supprimer une règle
         - POST /api/v1/settings/tva-mapping/validate → marquer la table validée (validatedBy)
         Toute mutation passe par le moteur d'édition TVA05 : invalidation automatique de la
         validation, changelog append-only, identité de l'opérateur journalisée.
         Permission : liakont.settings (un utilisateur « actions » ne peut pas éditer).
      2. Réconciliation PDF (s'appuie sur TRK07) :
         - GET /api/v1/reconciliation → file d'attente (propositions à confirmer, PDF orphelins,
           documents émis sans PDF)
         - GET /api/v1/reconciliation/{proposalId}/pdf → contenu du PDF (affichage navigateur)
         - POST /api/v1/reconciliation/{proposalId}/confirm | /reject
         - POST /api/v1/reconciliation/link → lien manuel PDF ↔ document
         Permission : liakont.actions.
      3. Tests d'intégration : édition autorisée/refusée (403 selon permission), invalidation
         après mutation, changelog, confirmation/rejet/lien réconciliation, isolation tenant.
    acceptance:
      - "Endpoints tva-mapping opérationnels, mutations via le moteur TVA05 uniquement"
      - "Permission liakont.settings requise pour la table TVA (testé : actions → 403)"
      - "Endpoints réconciliation opérationnels (file, PDF, confirmation, rejet, lien manuel)"
      - "Toute mutation journalisée avec l'identité de l'opérateur"
      - "Tests d'intégration complets, isolation tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  API05:
    title: "Endpoints de gestion des agents (cycle de vie post-provisioning)"
    description: |
      Exposer la gestion du parc d'agents du tenant (F10 amendée : écran « Gestion des agents » ;
      F12 §4.2) — les handlers existent (PIV05 : RegisterAgent/RevokeAgent/RotateKey), mais sans
      endpoints, impossible d'enregistrer un 2e agent, de révoquer une clé compromise ou de la
      faire tourner après la création du tenant (opérations de sécurité de routine) :
      1. GET /api/v1/agents → liste des agents du tenant : nom, état (actif/révoqué), dernière
         version vue, dernier heartbeat, date de création/révocation.
      2. POST /api/v1/agents → enregistrer un nouvel agent (RegisterAgent PIV05) : la clé API
         est retournée UNE SEULE FOIS dans la réponse, jamais récupérable ensuite.
      3. POST /api/v1/agents/{id}/revoke → révoquer la clé d'un agent (compromission, retrait).
      4. POST /api/v1/agents/{id}/rotate-key → rotation de clé : nouvelle clé retournée une
         seule fois, l'ancienne reste valide pendant une fenêtre de recouvrement configurable
         (le temps de reconfigurer l'agent), puis est invalidée.
      5. Permission : liakont.settings (gestion de secrets). Toute opération journalisée
         (module Audit) avec l'identité de l'opérateur.
      6. Tests d'intégration : liste, enregistrement (clé une seule fois), révocation (l'agent
         révoqué reçoit 401 au push suivant), rotation (recouvrement puis invalidation),
         permissions, isolation tenant.
    acceptance:
      - "Liste / enregistrement / révocation / rotation opérationnels via les handlers PIV05"
      - "La clé API n'est JAMAIS récupérable après sa première restitution"
      - "Révocation effective : la clé révoquée est rejetée à l'ingestion (testé de bout en bout)"
      - "Rotation avec fenêtre de recouvrement testée"
      - "Permission liakont.settings + journalisation de chaque opération"
      - "Tests d'intégration : tout le cycle de vie, permissions, isolation tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
