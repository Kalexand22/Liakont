# Lot CMP — Déploiement CMP / Crédit Municipal de Paris (PARAMÉTRAGE, pas du code)
# Réfs : docs/conception/F03-Mapping-TVA.md (régimes EncheresV6), docs/market/ (contexte CMP)
# PRINCIPE : ce segment ne produit AUCUNE ligne de code produit. Il produit le paramétrage
# du premier déploiement réel (deployments/cmp/), la démo ISATECH et la mise en production CMP.
# C'est la preuve que le produit se déploie sans toucher au code.

items:
  CMP01:
    title: "Paramétrage TVA CMP (table cmp-v1.json)"
    description: |
      Créer le paramétrage TVA du déploiement CMP dans deployments/cmp/ :
      1. cmp-v1.json : table de mapping TVA des régimes EncheresV6 du CMP, à partir de
         docs/conception/F03-Mapping-TVA.md :
         - régime 5 (assujetti 20%) → S / 20% / pas de VATEX
         - régime 6 (non assujetti) → E / 0% / VATEX-EU-J avec note
           « À VALIDER : marge (EU-J) ou hors champ ? — décision expert-comptable CMP »
         - tous les autres régimes documentés dans F03
      2. validatedBy = "EN ATTENTE — Expert-comptable CMP", validatedDate = null :
         la table N'EST PAS validée tant que l'expert-comptable n'a pas tranché.
         La mise en production (GATE_PROD_CMP) est conditionnée à cette validation.
      3. Document deployments/cmp/DECISIONS-FISCALES.md : la liste des 4 questions fiscales
         ouvertes (régime 6, TVA sur débits, OperationCategory, volume acheteurs pros),
         leur impact, et l'espace pour consigner les réponses de l'expert-comptable.
      IMPORTANT : ce fichier vit dans deployments/cmp/, JAMAIS dans src/ ni config/exemples/.
      L'agent ne tranche AUCUNE question fiscale — il matérialise l'état des connaissances de F03.
    acceptance:
      - "cmp-v1.json dans deployments/cmp/ avec tous les régimes documentés dans F03"
      - "validatedBy indique explicitement que la validation expert-comptable est en attente"
      - "DECISIONS-FISCALES.md liste les 4 questions ouvertes avec leur impact"
      - "Aucun fichier créé/modifié dans src/"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  CMP02:
    title: "Configuration déploiement CMP + fixtures de démo"
    description: |
      Créer la configuration du déploiement dans deployments/cmp/ :
      1. config-cmp.json : configuration complète du déploiement CMP —
         identité émetteur (SIREN CMP, raison sociale), adaptateur EncheresV6 (mode Pervasive
         avec chaîne ODBC à compléter + mode fixtures pour la démo), PA B2Brouter
         (compte staging pour la démo, place pour le compte production), table TVA cmp-v1.json,
         provider de stockage, planification (03:00), notifications.
         Les secrets sont des placeholders « À CHIFFRER avec encrypt-secret ».
      2. Fixtures de démo ISATECH dans deployments/cmp/fixtures-demo/ : jeu réaliste de
         bordereaux EncheresV6 (à partir des fixtures ADP01) couvrant le scénario de démo —
         ventes normales, régime de la marge, avoir, acheteur professionnel bloqué,
         encaissements.
      3. Test de cohérence : Gateway.Cli check-config --config deployments/cmp/config-cmp.json
         passe (en mode fixtures).
    acceptance:
      - "config-cmp.json complet, secrets en placeholders explicites"
      - "Fixtures de démo couvrant tous les cas du scénario ISATECH"
      - "check-config passe sur la config en mode fixtures"
      - "Aucun fichier créé/modifié dans src/"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  CMP03:
    title: "Scénario de démo ISATECH"
    description: |
      Rédiger deployments/cmp/SCENARIO-DEMO-ISATECH.md :
      1. Scénario de démo pas à pas (15-20 min) : installation depuis le zip (toolkit),
         chargement de la config CMP en mode fixtures, run du pipeline, parcours de la console
         multi-postes (liste des bordereaux, détail d'un blocage TVA expliqué en français,
         verdict B2B, export d'audit, coffre d'archive).
      2. Points de valeur à montrer : extraction sans toucher au logiciel source, blocages
         expliqués en français, piste d'audit + archivage 10 ans indépendant de la PA,
         multi-postes (deux consoles ouvertes en même temps), généricité multi-PA :
         capacités comparées entre les plug-ins DISPONIBLES à la date de la démo
         (B2Brouter vs plug-in Fake au minimum ; vs Super PDP si GATE_PA_SUPERPDP est passée —
         la démo ne dépend JAMAIS de la disponibilité d'un PA tiers).
      3. Objections probables d'ISATECH et réponses (à partir de docs/market/Offre-Editeur-Passerelle.md
         et DR12-Intelligence-ISATECH.md).
      4. Déroulé de répétition : la démo doit avoir été exécutée de bout en bout sur une
         machine propre à partir du zip de packaging avant la gate.
    acceptance:
      - "Scénario complet, minuté, exécutable par une personne qui n'a pas développé le produit"
      - "Les points de valeur différenciants sont scénarisés"
      - "Objections/réponses préparées à partir des docs marché"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_DEMO_ISATECH:
    type: gate
    executor: human
    title: "Gate : démo ISATECH prête"
    description: |
      Validation humaine : le scénario de démo (CMP03) a été déroulé de bout en bout sur une
      machine propre, à partir du zip de packaging, en mode fixtures. Chaque écran est
      présentable, chaque point de valeur est démontrable.
    acceptance:
      - "CMP01, CMP02, CMP03 sont done"
      - "La démo a été déroulée avec succès sur machine propre par un humain"
      - "PR du segment feat/deploiement-cmp (partie démo) revue et mergée"

  CMP04:
    title: "Checklist et bascule mise en production CMP"
    description: |
      Rédiger et exécuter deployments/cmp/MISE-EN-PRODUCTION.md :
      1. Checklist des prérequis de production :
         - ✅/⬜ Table TVA cmp-v1.json VALIDÉE par l'expert-comptable CMP (validatedBy + date renseignés)
         - ✅/⬜ Réponses aux 4 questions fiscales consignées dans DECISIONS-FISCALES.md
         - ✅/⬜ Tickets support B2Brouter résolus (marge cas n°33, Flux 10.2/10.4)
         - ✅/⬜ Compte B2Brouter PRODUCTION créé, tax_report_setting configuré
         - ✅/⬜ Accès ODBC à la base Pervasive de production (lecture seule) vérifié
         - ✅/⬜ Service installé sur le serveur CMP, API accessible depuis les postes comptables
         - ✅/⬜ Sauvegarde quotidienne (base + coffre) configurée et testée
      2. Protocole de premier envoi réel supervisé : période limitée (--max), vérification
         document par document avant et après, contrôle des tax reports DGFiP générés.
      3. Protocole de retour arrière si problème (les documents émis ne peuvent pas être
         « retirés » — procédure d'avoir/correction).
      Cet item documente et prépare ; l'exécution réelle de la bascule est la gate humaine.
    acceptance:
      - "Checklist complète avec l'état réel de chaque prérequis"
      - "Protocole de premier envoi supervisé rédigé"
      - "Protocole de retour arrière rédigé"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_PROD_CMP:
    type: gate
    executor: human
    title: "Gate finale : CMP en production"
    description: |
      Validation humaine finale : le déploiement CMP est en production réelle.
      La table TVA est validée par l'expert-comptable, le premier envoi réel supervisé a
      réussi, les tax reports DGFiP sont générés et archivés.
      C'est l'aboutissement de l'obligation légale du CMP (échéance septembre 2026).
    acceptance:
      - "CMP04 est done et tous les prérequis de la checklist sont cochés"
      - "Premier envoi réel supervisé réussi avec tax report DGFiP archivé"
      - "PR finale revue et mergée dans main"
