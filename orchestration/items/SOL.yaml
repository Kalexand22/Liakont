# Lot SOL — Socle : plateforme (.NET 10, socle Stratum vendored) + agent (.NET Framework 4.8)
# Réfs : blueprint.md v2 (§4 structure), docs/conception/F12-Architecture-Plateforme-Agent.md,
#        tasks/analyse-impact-pivot-plateforme.md (§5-6 : ce que Stratum fournit, décision vendoring)
# Préalable à tout le reste : sans solutions compilables, verify-fast ne peut pas tourner.
#
# DÉCISIONS 2026-06-03 : le code plateforme vit dans CE repo avec le socle Stratum COPIÉ
# (vendored) depuis C:\Source\Stratum ; nommage Liakont.* pour les projets Liakont,
# les projets vendored gardent leurs noms Stratum.* (provenance + re-convergence NuGet future).

items:
  SOL01:
    title: "Plateforme : vendoring du socle Stratum + Liakont.Host compilable"
    description: |
      Créer la solution plateforme src/Liakont.sln selon blueprint.md §4 :
      1. VENDORING du socle Stratum (copie depuis C:\Source\Stratum, en gardant les noms
         de projets/namespaces Stratum.*) :
         - src/Common/Abstractions/   (Stratum.Common.Abstractions)
         - src/Common/Infrastructure/ (Stratum.Common.Infrastructure — Dapper, tenancy, outbox, DbUp)
         - src/Common/UI/             (Stratum.Common.UI — Radzen, composants, thème)
         - src/Common/Testing/        (Stratum.Common.Testing)
         - src/Modules/Identity/      (Stratum.Modules.Identity — auth/RBAC)
         - src/Modules/Party/Contracts/ (Stratum.Modules.Party.Contracts UNIQUEMENT — décision
           D1 du 2026-06-03 : Identity.Application le référence en dur (ProjectReference) ;
           Party.Contracts ne dépend que de Common.Abstractions, copie minime. Ne PAS copier
           Domain/Application/Infrastructure/Web de Party.)
         - src/Modules/Job/           (Stratum.Modules.Job — ordonnanceur)
         - src/Modules/Notification/  (Stratum.Modules.Notification — emails, clés API)
         - src/Modules/Audit/         (Stratum.Modules.Audit)
         Ne PAS copier les autres modules métier de l'ERP (Party hors Contracts, Sales, Finance,
         Reservation, Resource, Company, Workflow, FormEngine, Sequence, ReferenceData, Tax,
         Config, Showcase) — Liakont n'en a pas besoin et ils tirent des dépendances inter-modules.
         ADAPTATIONS À CONSIGNER dans la provenance (constats review 2026-06-03) :
         - Module Notification : NEUTRALISER les migrations V009/V010 (seeds de templates et
           règles de routage « réservation » — données métier ERP, pas du socle générique)
         - ADR copiés : DÉDUPLIQUER le numéro 0010 (deux ADR Stratum portent ce numéro) et
           faire pointer toute référence multi-tenancy vers l'ADR database-per-tenant (0011)
      2. docs/architecture/provenance-socle-stratum.md : commit source Stratum copié, date,
         liste des dossiers copiés, modifications locales (les neutralisations ci-dessus).
         RÈGLE : toute modification ultérieure d'un fichier Stratum.* DOIT être consignée ici.
      3. src/Host/Liakont.Host/ : copie ADAPTÉE de Stratum.Host —
         - AppBootstrap n'enregistre QUE les modules vendored (Identity, Job, Notification, Audit)
         - Endpoints/NavSectionProviders des modules ERP retirés
         - Titre/branding « Liakont » (le branding par instance complet arrive avec BRD01)
         - Realm Keycloak de dev adapté (realm liakont-dev)
      4. Seed Keycloak + permissions applicatives Liakont (consommées par API/WEB/SUP/OPS) :
         - Permissions : liakont.read, liakont.actions, liakont.settings, liakont.supervision
         - Rôles standard : lecture (read), opérateur (read+actions), paramétrage (read+actions+
           settings), superviseur (toutes) — matrice permissions→rôles documentée
         - Seed du realm de dev (realm liakont-dev : client, client roles, un utilisateur de
           test par rôle) + mécanique de mapping utilisateur→tenant (réutilise le pattern
           Identity/tenancy du socle ; le mapping concret par client final arrive avec OPS03)
         - ABSTRACTION D'IdP (décision D10 du 2026-06-03 — NE PAS figer l'auth sur Keycloak) :
           l'authentification OIDC et le provisioning utilisateur/rôle du module Identity sont
           consommés DERRIÈRE une couche d'abstraction (Keycloak = UNE implémentation, pas un
           couplage en dur — aucun appel Keycloak-spécifique hors de cette couche). Le realm
           liakont-dev reste l'implémentation de dev/V1. But : pouvoir basculer vers un IdP
           in-process léger (OpenIddict) sans rouvrir le code métier.
         - SPIKE D'EMPREINTE (déliverable, time-boxé) : mesurer Keycloak 26 heap-borné vs
           OpenIddict in-process (RAM plancher, démarrage, surface d'ops), consigné dans un ADR.
           La DÉCISION FINALE de l'IdP est prise sur MESURE ; elle peut être finalisée en début
           de segment plateforme sans re-figer l'auth (le seam le permet). La topologie du
           retenu (par instance vs mutualisé) reste tranchée à l'ADR OPS01.
      5. Directory.Packages.props + Directory.Build.props copiés/adaptés de Stratum
         (versions de packages centralisées).
      6. La solution compile (dotnet build src/Liakont.sln) et le Host démarre en mode dev
         (PostgreSQL + Keycloak via docker-compose de dev copié/adapté de Stratum).
      7. ADR-0001 : pivot d'architecture — plateforme .NET 10 sur socle Stratum vendored
         + agent net48 ; renvoie vers tasks/decisions.md et l'analyse d'impact.
      IMPORTANT : aucune logique métier Liakont — uniquement le socle qui compile et démarre.
      STRATÉGIE DE VOLUME (~50 000 LOC à copier) : la copie brute des fichiers est SCRIPTÉE
      (robocopy/Copy-Item, pas de réécriture LLM fichier par fichier) ; la session LLM ne
      produit que les adaptations (Host, csproj, neutralisations, provenance, ADR, seed).
      PRÉREQUIS : Docker disponible (docker-compose dev + Testcontainers pour les tests du socle).
      PÉRIMÈTRE DE REVIEW : la review porte sur l'ADAPTATION (Liakont.Host, csproj, provenance,
      ADR), PAS sur le code Stratum copié tel quel (déjà reviewé dans son repo d'origine).
      Un fichier Stratum.* modifié pendant la copie = à consigner dans la provenance = reviewé.
    acceptance:
      - "src/Liakont.sln compile via dotnet build"
      - "Liakont.Host démarre en mode dev (PostgreSQL + Keycloak docker-compose)"
      - "Seuls les modules Identity/Party.Contracts/Job/Notification/Audit sont vendored (aucun autre module ERP)"
      - "Migrations Notification V009/V010 (seeds réservation) neutralisées + consignées dans la provenance"
      - "ADR Stratum copiés sans collision de numéro (0010 dédupliqué)"
      - "Permissions liakont.* + rôles standard + seed realm dev Keycloak en place (matrice documentée)"
      - "Auth Identity consommée derrière une abstraction d'IdP (Keycloak = une implémentation ; aucun couplage Keycloak hors de la couche d'auth) — décision D10"
      - "Spike d'empreinte Keycloak vs OpenIddict consigné dans un ADR (décision IdP prise sur mesure, non figée)"
      - "provenance-socle-stratum.md créé : commit source, date, dossiers copiés, modifications locales"
      - "Les tests du socle vendored (Common + modules copiés) passent"
      - "ADR-0001 rédigé dans docs/adr/"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SOL02:
    title: "Agent : solution net48 + Liakont.Agent.Contracts (netstandard2.0)"
    description: |
      Créer la solution agent et l'assembly de contrat partagée selon blueprint.md §4 et F12 §2 :
      1. src/Contracts/Liakont.Agent.Contracts/ (netstandard2.0) : projet de DTOs PURS
         du contrat agent ↔ plateforme — référencé par les DEUX solutions :
         - placeholder des DTOs (les vrais types arrivent avec PIV01)
         - AUCUNE logique, AUCUNE dépendance autre que le BCL (règle vérifiable par test
           d'architecture : aucune PackageReference)
      2. agent/Liakont.Agent.sln + projets SDK-style ciblant net48 :
         - agent/src/Liakont.Agent/              (service Windows — coquille ServiceBase)
         - agent/src/Liakont.Agent.Core/         (IExtractor, file locale, client HTTP, config)
         - agent/src/Liakont.Agent.Adapters.EncheresV6/  (plug-in source #1 — vide)
         - agent/src/Liakont.Agent.Cli/          (diagnostic)
         - agent/tests/Liakont.Agent.Core.Tests/ (xUnit net48)
         - agent/tests/Liakont.Agent.Adapters.EncheresV6.Tests/
      3. agent/Directory.Build.props : TargetFramework net48, LangVersion latest,
         Platforms x86+x64, TreatWarningsAsErrors true, packages centralisés
         (Newtonsoft.Json, System.Data.SQLite, xUnit).
      4. Règles de références (frontières blueprint §6) :
         - Liakont.Agent.Core référence Liakont.Agent.Contracts (cross-solution, chemin relatif)
         - Les adaptateurs référencent UNIQUEMENT Liakont.Agent.Core (+ Contracts)
         - AUCUN projet agent ne référence un projet de la plateforme (src/Host, src/Modules, src/Common)
      5. Chaque projet contient une classe placeholder dans le bon namespace.
      6. Dossiers config/exemples/ et deployments/ avec README mis à jour pour la nouvelle
         architecture (paramétrage de tenant en seed).
      IMPORTANT : aucune logique métier — uniquement le squelette compilable des deux côtés.
    acceptance:
      - "agent/Liakont.Agent.sln compile via dotnet build en Debug x86 et x64"
      - "Liakont.Agent.Contracts est netstandard2.0, zéro PackageReference, référencé par les deux solutions"
      - "Les règles de références sont en place (agent ne référence jamais la plateforme)"
      - "Namespaces Liakont.Agent.* pour l'agent"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SOL03:
    title: "CI double build + outillage de vérification branché sur les solutions réelles"
    description: |
      Brancher l'outillage de vérification et la CI sur les deux solutions :
      1. Vérifier/ajuster tools/verify-fast.ps1 : build plateforme (dotnet build src/Liakont.sln)
         + build agent (dotnet build agent/Liakont.Agent.sln -p:Platform=x86) + tests unitaires
         des deux côtés + tests d'architecture (NetArchTest). Doit échouer (exit != 0) si un
         build ou un test échoue — pas de faux verts.
         + Contrôle de provenance : tout fichier Stratum.* modifié (vs le commit source consigné)
         doit figurer dans provenance-socle-stratum.md, sinon verify-fast échoue.
      2. Vérifier/ajuster tools/run-tests.ps1 : suite complète plateforme (unit + integration
         Testcontainers PostgreSQL + contrats) + suite agent (x86 ET x64). Exclut Category=Staging,
         Category=Sandbox, Category=E2E. Les E2E sont une suite séparée exécutée par
         tools/run-e2e.ps1 (livré par SOL05) — décision D3 du 2026-06-03.
         GARDE-FOU : run-tests compte les suites/tests exécutés et ÉCHOUE si zéro suite a tourné
         (hors mode bootstrap explicite) — un PASS sans aucun test exécuté est un faux vert.
      3. CI GitHub Actions (.github/workflows/ci.yml) : sur push/PR —
         - job plateforme : restore + build + tests (avec service PostgreSQL pour l'intégration)
         - job agent : restore + build x86 ET x64 + tests
         Un step qui échoue fait échouer le pipeline (pas de continue-on-error).
         Les E2E (run-e2e.ps1) tournent dans un job dédié (ou sont explicitement documentés
         comme hors CI avec leur commande locale — choix documenté, pas de demi-mesure).
      4. Mettre à jour docs/architecture/definition-of-done.md avec les commandes réelles.
      NOTE : les scripts ont été pré-adaptés lors de la préparation v6 (garde bootstrap) —
      cet item les branche sur les solutions réelles et les teste en conditions réelles.
    acceptance:
      - "verify-fast.ps1 échoue réellement quand un test échoue (testé en cassant un test volontairement)"
      - "verify-fast.ps1 échoue sur modification Stratum.* non consignée dans la provenance (testé)"
      - "run-tests.ps1 couvre les deux solutions (agent x86 et x64) avec résumé compact + .run-tests.log"
      - "run-tests.ps1 échoue si zéro suite exécutée (hors bootstrap explicite) — testé"
      - "ci.yml : 2 jobs (plateforme + agent x86/x64), échec d'un step = échec du pipeline"
      - "Le sort des E2E en CI est explicite (job dédié ou exclusion documentée)"
      - "definition-of-done.md à jour avec les commandes réelles"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SOL04:
    title: "Documentation d'architecture du repo"
    description: |
      Rédiger les documents de conventions dans docs/architecture/ :
      1. repo-standards.md : conventions C# (.editorconfig appliqué — celui du socle Stratum),
         nommage (Liakont.* vs Stratum.* vendored), structure des dossiers (src/ plateforme,
         agent/, deploy/, deployments/), conventions de commit, règles de PR.
      2. module-rules.md : les frontières du blueprint.md §6 —
         - inter-modules : uniquement via Contracts (NetArchTest)
         - Transmission ne référence jamais un plug-in PA ; plug-in → Transmission.Contracts only
         - l'agent ne référence jamais la plateforme ; AUCUNE logique métier dans l'agent
         - toute requête métier est tenant-scopée (règle CLAUDE.md n°9)
         - socle vendored : modification = consignation dans la provenance
         - montants en decimal, jamais float ; tout champ absent = null
         - aucune donnée client dans le code
      3. testing-strategy.md : pyramide de tests (architecture NetArchTest, unit, integration
         Testcontainers PostgreSQL, contrat agent golden files, contrat PA, E2E Playwright
         exécutés par tools/run-e2e.ps1 — suite séparée, voir SOL05, agent net48, suites
         staging/sandbox séparées jamais en CI), conventions de nommage, catégories xUnit.
      4. Obligation documentaire par module (héritée des ModuleIsolationTests du socle vendored) :
         CHAQUE dossier sous src/Modules/ doit contenir MODULE.md, INVARIANTS.md et SCENARIOS.md,
         sinon les tests d'architecture échouent. À documenter dans module-rules.md — tout item
         qui crée un module (PIV05, TRK01, TVA01, VAL01, PAA01…) doit livrer ces trois fichiers.
      Source : blueprint.md v2 + docs/conception/F12 + le socle Stratum vendored (ses
      docs/architecture/ servent de base pour les conventions héritées).
    acceptance:
      - "repo-standards.md, module-rules.md, testing-strategy.md rédigés en français"
      - "Les règles de frontière (modules, agent/plateforme, tenant-scoping, vendoring) sont explicites et vérifiables"
      - "L'obligation MODULE.md/INVARIANTS.md/SCENARIOS.md par module est documentée dans module-rules.md"
      - "Aucune règle inventée : tout est traçable vers blueprint.md, F12 ou les décisions"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SOL05:
    title: "Harness de tests E2E (Testcontainers PostgreSQL + Keycloak + Playwright) + run-e2e.ps1"
    description: |
      Créer l'infrastructure de tests E2E de la plateforme — prérequis de TOUS les items
      blazor-page-item (WEB01-09, SUP02, OPS03). Décision D3 du 2026-06-03 : les E2E sont une
      suite SÉPARÉE, exécutée par un script dédié, jamais par run-tests.ps1.
      1. tests/Liakont.Tests.E2E/ : projet xUnit (Category=E2E) adapté du harness Stratum
         (tests/Stratum.Tests.E2E — hors périmètre du vendoring SOL01 qui ne copie que src/) :
         - Factory de test qui démarre PostgreSQL + Keycloak via Testcontainers
           (équivalent de KeycloakE2EWebFactory adapté au realm Liakont)
         - Fixture de realm : realm liakont-dev + utilisateurs de test par rôle (seed SOL01)
         - Page Object Model de base : login Keycloak, navigation shell
         - Installation des navigateurs Playwright (playwright install) intégrée au setup
      2. tools/run-e2e.ps1 : démarre l'infra (Testcontainers via le projet de test), exécute
         dotnet test --filter Category=E2E, échoue si les prérequis manquent (Docker absent,
         navigateurs non installés) avec un message explicite — JAMAIS de skip silencieux.
      3. Un test E2E de preuve : login + affichage du shell Liakont.Host (sera enrichi par
         chaque item blazor-page-item).
      4. Documentation dans testing-strategy.md (SOL04) : quand/comment lancer run-e2e.ps1,
         prérequis, lien avec le blueprint blazor-page-item.
      Provenance : le harness adapté de Stratum.Tests.E2E est consigné dans
      provenance-socle-stratum.md (adaptation, pas copie brute).
    acceptance:
      - "tests/Liakont.Tests.E2E compile et le test de preuve (login + shell) passe via tools/run-e2e.ps1"
      - "run-e2e.ps1 échoue avec message explicite si Docker ou les navigateurs Playwright manquent"
      - "Les tests E2E sont Category=E2E, exclus de run-tests.ps1 et de verify-fast.ps1"
      - "Harness consigné dans provenance-socle-stratum.md"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SOL06:
    title: "Mécanique de jobs multi-tenant (extension Liakont du module Job vendored)"
    description: |
      Le module Job du socle Stratum crée un scope SANS résolution de tenant (constat review
      2026-06-03 : aucune référence à ITenantContext dans le module, tables dans la base système).
      Avec database-per-tenant, un job ne peut ni s'exécuter dans la base d'un tenant ni itérer
      sur les tenants sans mécanique supplémentaire. Quatre items en dépendent : TRK06 (ancrage
      quotidien par tenant), PIP01/PIP03 (jobs planifiés par tenant), SUP01 (job d'évaluation
      de tous les tenants). Cet item spécifie et implémente cette mécanique UNE SEULE FOIS.
      1. src/Common/ ou src/Modules/ (choix par ADR — critère : réutilisable par tous les
         modules sans dépendance circulaire) : TenantJobRunner —
         - handler de job (côté base système) qui liste les tenants actifs (catalogue d'instance)
         - pour chaque tenant : crée un scope avec la connexion basculée vers la base du tenant
           (réutilise la tenancy de Stratum.Common.Infrastructure)
         - isolation des échecs : l'échec du tenant N n'empêche pas le traitement du tenant N+1 ;
           chaque échec est journalisé avec le TenantId
      2. Patron d'utilisation documenté : un module déclare un ITenantJob (Execute(tenantContext)),
         TenantJobRunner l'exécute pour chaque tenant selon la planification du module.
      3. Tests d'intégration (Testcontainers PostgreSQL, 2 bases tenant) : exécution sur 2 tenants,
         isolation des échecs, jamais de fuite de connexion entre tenants.
      RÈGLE : les items TRK06/PIP01/PIP03/SUP01 RÉFÉRENCENT cette mécanique — aucun item ne
      réinvente sa propre boucle multi-tenant.
    acceptance:
      - "TenantJobRunner exécute un ITenantJob pour chaque tenant actif, connexion basculée par tenant"
      - "Échec d'un tenant isolé (les autres continuent), journalisé avec TenantId"
      - "Tests d'intégration sur 2 bases tenant (exécution, isolation des échecs, pas de fuite de connexion)"
      - "Patron ITenantJob documenté (consommé par TRK06, PIP01, PIP03, SUP01)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_SOCLE:
    type: gate
    executor: claude
    blueprint: auto-gate-item
    title: "Gate (auto) : socle plateforme + agent intégré"
    description: |
      Gate d'INTÉGRATION AUTOMATIQUE (executor claude, blueprint auto-gate-item) : la
      vérification du socle est entièrement automatisée (compilation des deux solutions, Host
      qui démarre, harness E2E, mécanique de jobs multi-tenant, conventions) — un test humain
      n'y révélerait rien de structurel qui ne soit déjà prouvé par verify + tests + E2E. La
      gate enchaîne verify-fast + run-tests + review d'intégration (diff complet vs main), puis
      merge la branche dans main. Échec/conflit non trivial = blocked (repris par un humain).
      Cette gate débloque le segment core-foundation.
      Points de vigilance (vérifiés par la review d'intégration) : provenance du socle complète,
      aucun module ERP embarqué (hors Party.Contracts — décision D1), frontières agent/plateforme.
    acceptance:
      - "Tous les items SOL sont done"
      - "verify-fast + run-tests verts sur feat/socle-v6 (deux solutions)"
      - "Le test E2E de preuve passe via tools/run-e2e.ps1"
      - "Review d'intégration (codex-review -Base main) clean ou P2 acceptés justifiés"
      - "Segment feat/socle-v6 intégré automatiquement dans main (Step 5c) — pas de PR humaine"
