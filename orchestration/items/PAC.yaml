# Lot PAC — Client API Plateforme Agréée / B2Brouter (F05)
# Spec : docs/conception/F05-Client-API-B2Brouter.md
# Faits validés en staging (ne PAS redécouvrir) : auth X-B2B-API-Key, version 2026-03-02,
# api-staging.b2brouter.net, erreurs silencieuses HTTP 200 + errors[].

items:
  PAC01:
    title: "Interface IPaClient + DTOs (abstraction multi-PA)"
    description: |
      Définir l'abstraction PA dans Gateway.Core/PaClient/ selon F05 :
      1. IPaClient :
         - Task<PaSendResult> SendDocumentAsync(PivotDocument doc, bool sendAfterImport = true)
         - Task<PaDocumentStatus> GetDocumentStatusAsync(string paDocumentId)
         - Task<IReadOnlyList<PaTaxReport>> ListTaxReportsAsync(DateTime? since = null)
         - Task<PaTaxReport> GetTaxReportAsync(string taxReportId)
         - Task<PaAccountInfo> GetAccountInfoAsync()
         - Task<PaTaxReportSetting> GetTaxReportSettingAsync()
         - Task EnsureTaxReportSettingAsync(PaTaxReportSettingRequest request)
      2. DTOs : PaSendResult, PaDocumentStatus, PaTaxReport, PaAccountInfo, PaTaxReportSetting,
         PaTaxReportSettingRequest, PaError.
      3. Aucune référence à B2Brouter dans les noms/types de l'abstraction : l'interface doit
         pouvoir accueillir Iopole, Seqino ou une autre PA (décision F05 : abstraire dès V1).
      Le reste du Core ne connaît QUE IPaClient — jamais d'URL, de JSON propriétaire ni de détail HTTP.
    acceptance:
      - "IPaClient et DTOs dans Conformat.Gateway.Core.PaClient, sans référence à B2Brouter"
      - "Tout le surface API de F05 couvert (send, status, tax reports, settings)"
      - "Aucun type HTTP (HttpClient, HttpResponse) dans l'interface publique"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PAC02:
    title: "B2BrouterClient : auth, transformation pivot → JSON, envoi"
    description: |
      Implémenter le client B2Brouter dans Gateway.Core/PaClient/B2Brouter/ selon F05 :
      1. B2BrouterClient : IPaClient implémenté sur l'API eDocExchange :
         - Auth : header X-B2B-API-Key (clé statique)
         - Versioning : header X-B2B-API-Version (minimum 2026-03-02)
         - URLs : staging https://api-staging.b2brouter.net (PAS app-staging),
           production https://api.b2brouter.net — configurables
         - Envoi : POST /accounts/{accountId}/invoices.json avec send_after_import: true
      2. Transformation PivotDocument → JSON B2Brouter (DTO propriétaire interne au dossier B2Brouter) :
         modèle 2 lignes marge validé en staging, is_credit_note + amended_number/date pour avoirs.
      3. HttpClient statique par configuration (pas de using par appel),
         TLS : ServicePointManager.SecurityProtocol = Tls12 | Tls13 (net48).
      4. Multi-compte : un B2BrouterClient = un compte (clé API, account id, URL).
    acceptance:
      - "B2BrouterClient implémente IPaClient avec les faits staging de F05 (URLs, headers, version)"
      - "Transformation pivot → JSON B2Brouter testée sur les fixtures (facture 20%, marge, avoir)"
      - "HttpClient statique + TLS 1.2/1.3 configuré"
      - "Tests unitaires de transformation sans appel réseau (handler HTTP mocké)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PAC03:
    title: "Gestion d'erreurs 3 familles + idempotence"
    description: |
      Implémenter la gestion d'erreurs dans B2BrouterClient selon F05 :
      1. Réseau/5xx/timeout : retry automatique 3 fois, backoff exponentiel (5s, 30s, 2min).
         Au-delà → PaSendResult en TechnicalError, re-tentable au prochain run.
      2. HTTP 4xx : pas de retry. Résultat Rejected avec détail. 401 → exception fatale de
         configuration (bloque le run entier, code retour 2 du CLI).
      3. Erreur silencieuse (HTTP 200 + errors[] non vide) : pas de retry auto, résultat
         RejectedByPa avec errors[] détaillé. (Cas piégeux validé staging : VATEX manquant.)
         TOUJOURS inspecter errors[] même sur 200.
      4. Idempotence : le numéro de document = clé d'unicité PA. Avant tout POST, vérifier via
         le Tracking (TRK03). En cas de timeout sur POST : relire GET liste factures avant retenter.
      5. Pas de resend : aucun endpoint de renvoi → recréer une facture avec un numéro unique.
    acceptance:
      - "Les 3 familles d'erreurs traitées distinctement avec les politiques de retry de F05"
      - "errors[] inspecté systématiquement même sur HTTP 200"
      - "Timeout POST → relecture GET avant nouvelle tentative (testé avec handler mocké)"
      - "401 → exception de configuration fatale"
      - "Tests : retry backoff, 4xx sans retry, 200+errors[], timeout puis relecture"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PAC04:
    title: "Tax reports DGFiP + tax_report_settings"
    description: |
      Implémenter la récupération des tax reports selon F05 :
      1. ListTaxReportsAsync / GetTaxReportAsync : GET /accounts/{id}/tax_reports.json,
         GET /tax_reports/{id}.json — le champ xml_base64 n'est disponible qu'après génération
         (~02:00) : gérer l'absence proprement (rapport pas encore généré ≠ erreur).
      2. Tax report settings : GET/POST/PATCH /accounts/{id}/tax_report_settings[/dgfip].json —
         champs requis : naf_code, start_date, type_operation, enterprise_size.
         Réglage au niveau SIREN (scheme 0002), pas SIRET.
      3. EnsureTaxReportSettingAsync : créer le réglage s'il n'existe pas, vérifier sinon.
      4. Archivage : les XML récupérés sont remis au Tracking (TaxReport.xml_base64).
    acceptance:
      - "Tax reports récupérés et archivés via le Tracking"
      - "xml_base64 absent géré comme « pas encore généré », pas comme erreur"
      - "EnsureTaxReportSettingAsync idempotent (create si absent, verify sinon)"
      - "Tests avec handler mocké : liste, détail avec/sans XML, settings create/verify"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PAC05:
    title: "FakePaClient + suite de tests staging"
    description: |
      Implémenter les outils de test PA :
      1. FakePaClient : IPaClient en mémoire pour les tests du pipeline et de la console —
         configurable (réponses succès/rejet/erreur silencieuse/timeout), journalise les appels.
      2. Suite de tests d'intégration staging B2Brouter dans tests/Gateway.Staging.Tests/ :
         envoi d'une facture fixture sur le compte staging, lecture du statut, des tax reports.
         Cette suite N'EST JAMAIS exécutée en CI ni par verify-fast (clé API requise) — elle est
         lancée manuellement avec une config locale (variable d'env B2BROUTER_STAGING_KEY).
      3. Documenter dans testing-strategy.md comment lancer la suite staging.
    acceptance:
      - "FakePaClient couvre succès, rejet, erreur silencieuse, timeout"
      - "Suite staging séparée, exclue de verify-fast et de la CI, documentée"
      - "Tests du FakePaClient lui-même (il fait partie du contrat de test)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_PA_CLIENT:
    type: gate
    executor: human
    title: "Gate : client PA validé"
    description: |
      Validation humaine du client PA : abstraction IPaClient, implémentation B2Brouter,
      gestion d'erreurs, tax reports. Idéalement accompagnée d'un test staging réel réussi
      (facture fixture envoyée et tax report récupéré).
    acceptance:
      - "Tous les items PAC sont done"
      - "PR du segment feat/pa-client revue et mergée dans main"
      - "Un envoi staging réel a été effectué avec succès (manuel)"
