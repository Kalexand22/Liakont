# Lot VAL — Contrôles qualité pré-envoi (F04) — module Validation
# Spec : docs/conception/F04-Controles-Qualite-Validation.md
# Principe : détecter AVANT envoi tout ce qui serait rejeté par la PA.
# Un contrôle bloquant échoue = document reste Blocked, jamais envoyé.
# Le module Validation s'exécute sur la PLATEFORME (jamais dans l'agent — règle blueprint §2.5).

items:
  VAL01:
    title: "Framework de validation (résultats, sévérités, messages opérateur)"
    description: |
      Implémenter le socle de validation dans src/Modules/Validation/ selon F04 :
      1. ValidationResult : IsValid, Issues (IReadOnlyList<ValidationIssue>).
      2. ValidationIssue : Code (ex. DOC_TOTAL_MISMATCH), Severity (Blocking/Warning),
         MessageOperateur (français, zéro jargon technique, cite le n° de document et l'action
         corrective), DetailTechnique.
      3. IDocumentRule : interface d'une règle — Validate(document reçu + contexte tenant) →
         IEnumerable<ValidationIssue>.
      4. ValidationPipeline : exécute toutes les règles enregistrées, agrège le résultat.
         Une règle qui lève une exception = Blocking issue RULE_CRASHED (jamais de règle silencieuse).
      5. Les issues sont persistées avec le document (module Documents) pour affichage
         dans la console (onglet Contrôles WEB03).
      Exemples de messages (F04) :
      - DOC_TOTAL_MISMATCH → « Le total du bordereau (1 162,80 €) ne correspond pas à la somme
        des lignes (1 160,00 €). Vérifiez le bordereau n° 2019 dans Enchères SVV. »
    acceptance:
      - "ValidationResult, ValidationIssue, IDocumentRule, ValidationPipeline dans Conformat.Modules.Validation"
      - "Messages opérateur en français avec n° de document et action corrective"
      - "Une règle qui crash produit une issue Blocking, jamais un passage silencieux"
      - "Tests du pipeline : agrégation, règle qui crash, document sans issue"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  VAL02:
    title: "Contrôles d'identité : SIREN/SIRET Luhn, TVA intracommunautaire, pays"
    description: |
      Implémenter les règles d'identité dans src/Modules/Validation/ selon F04 :
      1. SirenValidator : 9 chiffres + algorithme de Luhn. Exception connue : La Poste (356000000).
      2. SiretValidator : 14 chiffres + Luhn.
      3. TvaIntracommunautaireValidator : format FR + clé (2 car.) + SIREN,
         clé = (12 + 3 × (SIREN mod 97)) mod 97.
      4. CountryCodeValidator : ISO 3166-1 alpha-2.
      5. Règles documents : SUPPLIER_SIREN_MISSING (Blocking), SUPPLIER_SIREN_INVALID (Blocking),
         BUYER_SIREN_INVALID (Blocking si présent), BUYER_COUNTRY_INVALID (Blocking).
         NOTE v6 : le SIREN émetteur vient du PROFIL DU TENANT (CFG02), pas du document —
         la règle vérifie la cohérence document ↔ profil tenant.
      Ces validateurs élémentaires (Luhn) sont aussi consommés par CFG02 (validation du profil).
    acceptance:
      - "Luhn SIREN/SIRET implémenté avec l'exception La Poste"
      - "Clé TVA intracommunautaire calculée selon la formule officielle"
      - "Cohérence SIREN document ↔ profil tenant vérifiée"
      - "Tests : SIREN valides/invalides connus, SIRET, clé TVA FR, La Poste, incohérence document/tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  VAL03:
    title: "Contrôles de cohérence document : totaux, BR-CO-15, unicité, devise"
    description: |
      Implémenter les règles de cohérence dans src/Modules/Validation/ selon F04 :
      1. LineTotalsRule : Σ lignes HT = Total HT, Σ lignes TVA = Total TVA (tolérance zéro,
         arrondi commercial half-up 2 décimales).
      2. ArithmeticRule (BR-CO-15, fatale EN 16931) : HT + TVA = TTC.
      3. SourceTotalsRule (F04 §3.2) : les totaux calculés par la plateforme = les totaux bruts
         du document source (PivotTotalsDto.totaux source bruts). Un écart = Blocking — soit le
         mapping a altéré un montant, soit la source est incohérente : dans les deux cas,
         ne jamais envoyer un montant différent de ce que le logiciel source a facturé.
      4. StructureRule : au moins 1 ligne, date plausible (pas dans le futur, pas avant 2000),
         devise ISO 4217.
      5. UniquenessRule : numéro de document non déjà émis dans le tenant (interroge le module
         Documents via une interface IIssuedDocumentLookup — l'implémentation réelle arrive
         avec TRK03, ici un fake suffit).
    acceptance:
      - "BR-CO-15 (HT+TVA=TTC) implémentée comme règle Blocking"
      - "Réconciliation des totaux lignes/document sans tolérance, en decimal, après arrondi commercial half-up 2 décimales"
      - "SourceTotalsRule : écart plateforme/source = Blocking"
      - "UniquenessRule derrière une interface, testée avec un fake"
      - "Tests : document cohérent, écart d'arrondi, TTC incohérent, écart vs totaux source, doublon de numéro"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  VAL04:
    title: "Contrôles TVA et avoirs"
    description: |
      Implémenter les règles TVA et avoirs dans src/Modules/Validation/ selon F04 et F07 :
      1. MappingCoverageRule : chaque ligne a un régime source mappé (utilise TVA03).
      2. VatexRequiredRule : catégorie E + taux 0 → code VATEX présent.
         (Validé en staging B2Brouter : l'absence de VATEX = blocage silencieux côté PA —
         c'est exactement ce qu'on veut attraper AVANT envoi.)
      3. CategoryRateConsistencyRule (F04 §3.4 AMENDÉE 2026-06-02) : cohérence catégorie/taux
         en BLOCKING (décision utilisateur) :
         - catégorie S → taux > 0
         - catégories E, Z, AE, G, K, O → taux = 0
         Une incohérence = erreur de mapping ou donnée source fausse → jamais envoyé.
      4. CreditNoteRules (F07) : référence facture d'origine présente, facture connue du module
         Documents ET déjà émise, montants positifs (règle fatale EN 16931 — jamais de montants
         négatifs).
      5. Avoir orphelin (original hors plateforme) = Blocking « facture d'origine inconnue » —
         jamais de référence fabriquée. Le traitement manuel de l'avoir orphelin (action
         opérateur resolve-manually) est exposé par l'API (API02) et la console (WEB03).
    acceptance:
      - "VatexRequiredRule bloque tout E+0% sans VATEX"
      - "CategoryRateConsistencyRule en BLOCKING (S→taux>0, E/Z/AE/G/K/O→taux=0)"
      - "Avoirs : montants positifs obligatoires, référence d'origine vérifiée"
      - "Avoir orphelin bloqué avec message explicite"
      - "Tests : E sans VATEX, S avec taux 0, E avec taux 20, avoir valide, avoir orphelin, avoir à montants négatifs"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  VAL05:
    title: "Garde-fou B2B/B2C : détection acheteur professionnel"
    description: |
      Implémenter le garde-fou F08 dans src/Modules/Validation/ :
      1. CompanyHintDetector : heuristique de détection d'acheteur professionnel —
         EXACTEMENT celle de F07-F08 §A.4, ni plus ni moins (liste de formes juridiques et
         seuil de déclenchement repris de la spec, jamais étendus sans amendement de la spec) :
         - raison sociale renseignée (champ societe) → indice fort
         - n° TVA intracommunautaire présent → indice fort
         - forme juridique détectée par regex (liste DE LA SPEC F07-F08) → indice moyen
         - le montant seul n'est JAMAIS un critère
         IsCompanyHint = true si au moins un indice fort OU l'indice de forme juridique
         (la spec ne définit qu'un seul indice moyen — un seuil « deux indices moyens »
         serait inatteignable).
      2. BuyerLooksProfessionalRule : si IsCompanyHint → Blocking BUYER_LOOKS_PROFESSIONAL avec
         message : « L'acheteur "<nom>" semble être un professionnel. Une facture électronique B2B
         est requise (non gérée automatiquement en V1). Traitez ce bordereau manuellement ou
         confirmez qu'il s'agit d'un particulier. »
      3. Le verdict opérateur (« confirmer B2C » / « traiter manuellement ») est exposé par
         l'endpoint verdict (API02) et la console (WEB03) — ici on expose l'issue et la
         mécanique de verdict journalisable.
      Contexte (F08) : déclarer en e-reporting B2C une vente B2B prive l'acheteur pro de sa facture
      déductible = manquement à l'obligation e-invoicing. Le garde-fou est la protection V1.
    acceptance:
      - "CompanyHintDetector implémente EXACTEMENT l'heuristique et la liste de formes juridiques de F07-F08 (aucune forme ajoutée, aucun seuil inventé)"
      - "Le montant n'intervient jamais dans la détection"
      - "BUYER_LOOKS_PROFESSIONAL est Blocking avec le message opérateur de F04/F08"
      - "Tests : particulier, SARL en raison sociale, n° TVA présent, nom ambigu"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
