# Lot PKG — Packaging du produit final
# Segment : deploiement-toolkit. Le packaging assemble TOUT ce qui a été construit :
# moteur + Service + console + CLI + les plug-ins dont la gate est passée.
# (Ex-CFG03 — renommé lors du déplacement du lot CFG vers core-foundation, review v4.)
# Décision 2026-06-02 : le package final inclut B2Brouter + EncheresV6 + Fake.
# Super PDP rejoint le package dès que GATE_PA_SUPERPDP passe, sans bloquer la release
# (« on ne bloque rien parce qu'1 PA n'est pas prêt »).

items:
  PKG01:
    title: "Packaging + documentation d'installation"
    description: |
      Implémenter le packaging selon la spec F12 (CFG01) :
      1. tools/package.ps1 : build Release x86 + x64, assemblage du zip autoportant
         (Gateway.Service, Gateway.App, Gateway.Cli, plug-ins inclus : Fake + B2Brouter +
         EncheresV6 + Super PDP si sa gate est passée, dépendances, config.example.json,
         table TVA exemple, doc installation).
      2. docs/installation.md : prérequis, installation du Service (serveur) pas à pas,
         installation de la console (postes), configuration, mise en service (checklist F12),
         dépannage des erreurs courantes (ODBC absent, .NET 4.8 absent, port API bloqué,
         droits Windows).
      3. Dépendances natives par plateforme : System.Data.SQLite requiert SQLite.Interop.dll
         DISTINCT par plateforme — le zip x86 embarque l'interop x86, le zip x64 l'interop x64
         (sinon échec runtime « Unable to load DLL 'SQLite.Interop.dll' »). Vérifié par le test
         d'extraction (point 4) sur les DEUX zips.
      4. Le zip produit est testé : extraction sur dossier propre + check-config + run --dry-run
         sur fixtures + console connectée fonctionnent — pour x86 ET x64.
      5. Le contenu du package est PILOTÉ par l'état des gates : le script liste les plug-ins
         à inclure depuis un manifest de packaging (packaging.json) — ajouter Super PDP plus tard
         = ajouter une ligne, pas modifier le script.
    acceptance:
      - "package.ps1 produit un zip autoportant x86 et x64"
      - "Le package inclut les plug-ins Fake, B2Brouter et EncheresV6 (+ Super PDP si disponible)"
      - "SQLite.Interop.dll de la bonne plateforme présent dans chaque zip (testé sur les deux)"
      - "Liste des plug-ins packagés pilotée par packaging.json, pas codée en dur"
      - "docs/installation.md exécutable par un intégrateur (cible : partenaire Niveau 2)"
      - "Les zips x86 et x64 extraits passent check-config + dry-run + connexion console"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
