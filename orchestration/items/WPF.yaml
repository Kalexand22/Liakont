# Lot WPF — Console d'administration WPF multi-postes (F10 adapté à l'architecture API)
# Spec : docs/conception/F10-Console-Admin-WPF.md
# Décision 2026-06-02 : la console est CLIENTE DE L'API du Service (Gateway.ApiClient).
# Elle ne référence JAMAIS Gateway.Core, les plug-ins ni la base de données.
# Elle peut tourner sur n'importe quel poste du réseau (multi-utilisateurs).
# Philosophie : simple, lisible, zéro jargon technique, 100 % français.

items:
  WPF01:
    title: "Squelette Gateway.App : MVVM, navigation, thème, connexion API"
    description: |
      Initialiser la console dans src/Gateway.App/ selon F10 :
      1. MVVM minimal SANS framework (pas de Prism) : ViewModelBase (INotifyPropertyChanged),
         RelayCommand (~50 lignes), navigation par ContentControl + DataTemplate.
      2. Shell : fenêtre principale, menu latéral (Documents, Encaissements, Journal,
         Paramétrage, Configuration — et Réconciliation, visible uniquement si l'adaptateur
         configuré déclare la capacité pool de PDF), barre d'état (serveur connecté,
         dernier run, état du service).
      3. Thème MahApps.Metro.
      4. Connexion à l'API : adresse du serveur dans la config locale de la console
         (serveur + port), authentification Windows transparente (Gateway.ApiClient),
         écran de connexion/diagnostic si le serveur est injoignable (« Le service Conformat
         sur SRV01:8475 ne répond pas — vérifiez que le service est démarré »).
      5. RÈGLE ABSOLUE : le projet Gateway.App ne référence QUE Gateway.Api + Gateway.ApiClient.
         Aucune référence à Core, aux plug-ins, à SQLite.
      Langue : français uniquement. Aucun texte anglais visible par l'opérateur.
    acceptance:
      - "ViewModelBase + RelayCommand maison, aucune dépendance MVVM externe"
      - "Shell avec navigation entre les 4 sections (placeholders acceptés à ce stade)"
      - "Connexion API avec auth Windows + écran de diagnostic si serveur injoignable"
      - "Gateway.App ne référence ni Core, ni plug-ins, ni SQLite (vérifié dans le csproj)"
      - "Tous les libellés en français"
      - "Tests unitaires : ViewModelBase, RelayCommand, navigation, état de connexion"
      - "Checklist smoke créée (docs/architecture/smoke-checklists/)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF02:
    title: "Écran Documents (vue centrale, via API)"
    description: |
      Implémenter l'écran principal selon F10, alimenté par GET /documents :
      1. Liste des documents : n°, date, acheteur, montant, type (bordereau/avoir), état avec
         icône (✅ Émis, 🛑 Bloqué, ⏳ À envoyer, ❌ Rejeté, ⚠️ Erreur technique, ↪ Remplacé).
      2. Filtres : période (défaut mois courant), état, type, texte libre (n°, acheteur) —
         mappés sur les paramètres de l'API.
      3. Compteurs permanents : synthèse par état au-dessus de la liste.
      4. Boutons : [Voir] (détail — WPF03), [▶ Envoyer la sélection], [▶▶ Tout envoyer]
         (actions branchées en WPF05 — ici désactivées avec tooltip explicatif).
      5. Rafraîchissement : bouton manuel + timer optionnel 60s.
      6. DocumentsViewModel testé avec un ApiClient mocké : chargement, filtres, compteurs,
         formatage français des états, erreur API.
    acceptance:
      - "Liste avec colonnes et états français de F10, alimentée par l'API"
      - "Filtres période/état/type/texte fonctionnels (côté API)"
      - "Compteurs par état mis à jour avec les filtres"
      - "Tests ViewModel avec ApiClient mocké : filtrage, compteurs, formatage, erreur API"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF03:
    title: "Écran détail document (Contenu / Contrôles / Historique / Archive, via API)"
    description: |
      Implémenter le détail document selon F10, alimenté par GET /documents/{id} :
      1. Onglet Contenu : en-tête (n°, date, acheteur, totaux) + lignes (libellé, montants,
         régime TVA source → catégorie/VATEX résultante). Blocages mis en évidence.
      2. Onglet Contrôles : liste des contrôles passés/échoués (F04) — ✅/🛑/⚠️, message
         opérateur, action corrective si disponible. Pour BUYER_LOOKS_PROFESSIONAL : boutons
         de verdict « Confirmer particulier (B2C) » / « Traiter manuellement (B2B) » →
         POST /documents/{id}/verdict (l'identité Windows de l'opérateur est journalisée côté serveur).
      2bis. Actions de résolution (droits « actions » requis) :
         - Document bloqué après correction (source corrigée, table complétée) : bouton
           [Revérifier maintenant] → POST /documents/{id}/recheck → résultat affiché immédiatement
         - Document bloqué non transmissible (ex. avoir orphelin) : bouton [Traiter manuellement
           hors passerelle...] → saisie du motif obligatoire → POST /documents/{id}/resolve-manually
         - Document rejeté par la PA : bouton [Lier au document de remplacement...] → sélecteur
           du nouveau document (extrait du logiciel source au run suivant la correction) →
           POST /documents/{id}/supersede → l'écran affiche le lien ancien ⇄ nouveau
      3. Onglet Historique : chronologie complète (détecté, envoyé, réponse PA, tax report,
         changements d'état, verdicts opérateur avec leur auteur, résolutions manuelles avec motif,
         renvois avec lien vers le document remplacé).
      4. Onglet Archive : référence du paquet d'archive, état d'intégrité de la chaîne,
         bouton [Exporter pour contrôle fiscal] → GET /documents/{id}/audit-export.
      5. DocumentDetailViewModel testé avec ApiClient mocké.
    acceptance:
      - "4 onglets conformes (Contenu, Contrôles, Historique, Archive)"
      - "Verdict opérateur B2C/B2B envoyé via l'API"
      - "Actions revérifier / résolution manuelle (motif obligatoire) / lien de remplacement branchées sur l'API"
      - "Export audit téléchargé via l'API"
      - "Tests ViewModel avec ApiClient mocké : onglets, verdict, recheck, résolution manuelle, remplacement, export"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF04:
    title: "Écrans Journal (runs) et Configuration (lecture seule, via API)"
    description: |
      Implémenter les écrans secondaires selon F10 :
      1. Journal (GET /runs) : liste des runs (planifiés + manuels + secours CLI) — date, durée,
         documents traités/envoyés/bloqués/rejetés, déclencheur. Répond à « ça a tourné cette nuit ? ».
      2. Configuration (GET /configuration, LECTURE SEULE) :
         - identité émetteur (SIREN, raison sociale)
         - connexion source (chaîne masquée, indicateur ✅/❌ d'accès)
         - plateforme(s) agréée(s) configurée(s) : nom, compte, environnement (staging/prod)
           et **capacités déclarées** (B2C ✅, Paiements ⏳ en attente, B2B ⬜ phase 2...)
         - table de mapping TVA : résumé seulement (version, validateur, état de validation —
           ⚠️ visible si « NON VALIDÉE » ou table d'exemple) + lien « Ouvrir le paramétrage
           comptable » vers l'écran d'édition (WPF07)
         - provider de stockage, planification, état du coffre d'archive
      3. Aucune édition ICI : la config TECHNIQUE s'édite dans les fichiers côté serveur
         (auditabilité). Le paramétrage COMPTABLE (table TVA), lui, s'édite dans l'écran
         dédié WPF07 (décision 2026-06-02).
    acceptance:
      - "Journal des runs avec compteurs et déclencheur"
      - "Configuration affichée en lecture seule, secrets masqués"
      - "Capacités du PA affichées (l'opérateur voit ce que sa plateforme sait faire)"
      - "État de validation de la table TVA bien visible (alerte si non validée)"
      - "Tests ViewModel avec ApiClient mocké"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF05:
    title: "Actions d'envoi (via API)"
    description: |
      Brancher les actions d'envoi selon F10 :
      1. [▶ Envoyer la sélection] : POST /documents/{id}/send pour chaque document sélectionné.
      2. [▶▶ Tout envoyer] : appel préalable avec confirm=false → affichage du récapitulatif
         (nombre de documents + montant total + mention « action irréversible ») → confirmation
         opérateur → POST définitif.
      3. Déclenchement d'un run manuel : bouton « Lancer un traitement maintenant »
         → POST /runs/trigger (utile pour la démo et les rattrapages).
      4. Gestion des droits : si l'utilisateur Windows n'a que le droit lecture, les boutons
         d'action sont masqués (l'API renvoie les droits dans /health ou /configuration).
      5. Gestion des erreurs d'action : messages français exploitables (« Le document n° 2019
         n'a pas pu être envoyé : ... »).
    acceptance:
      - "Envoi sélection et tout-envoyer via l'API avec confirmation"
      - "Run manuel déclenchable depuis la console"
      - "Droits lecture/action respectés (boutons masqués si lecture seule)"
      - "Tests ViewModel avec ApiClient mocké : confirmation, droits, erreurs"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF06:
    title: "Écran Encaissements (e-reporting paiement, via API)"
    description: |
      Implémenter l'écran Encaissements selon F10, alimenté par GET /payments :
      1. Agrégats jour×taux (PaymentAggregate) avec leur état de transmission.
      2. L'état affiché dépend de la capacité du PA configuré :
         - PA avec capacité paiements : états de transmission réels (transmis/en attente/rejeté)
         - PA sans capacité : bandeau « En attente : la plateforme <nom> ne supporte pas encore
           la transmission des paiements — les agrégats sont prêts et partiront automatiquement
           dès l'activation » (argument démo : notre produit est prêt avant la PA)
      3. PaymentsViewModel testé avec ApiClient mocké dans les deux états de capacité.
    acceptance:
      - "Agrégats jour×taux affichés depuis l'API"
      - "Affichage adapté à la capacité du PA (les 2 états testés)"
      - "Tests ViewModel avec ApiClient mocké"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF07:
    title: "Écran Paramétrage comptable (table TVA éditable, via API)"
    description: |
      Implémenter l'écran de paramétrage comptable (décision 2026-06-02 : le paramétrage
      COMPTABLE s'édite depuis la console ; la config technique reste en fichiers serveur),
      alimenté par les endpoints /configuration/tva-mapping (API04) :
      1. Vue de la table de mapping TVA : règles (code régime source, libellé, part, catégorie,
         taux, VATEX), état de validation bien visible (✅ Validée par X le Y / ⚠️ NON VALIDÉE).
      2. Édition (droits « paramétrage » requis — boutons masqués sinon) :
         - ajouter/modifier/supprimer une règle : formulaire avec listes FERMÉES des catégories
           UNCL5305 et des codes VATEX autorisés — jamais de saisie libre sur ces champs
         - intégration MappingCoverageReport (TVA03) : les régimes source détectés non mappés
           apparaissent en haut « À compléter » avec bouton [Créer la règle] pré-rempli
         - bandeau permanent après toute modification : « Table modifiée — NON VALIDÉE.
           Les envois sont suspendus jusqu'à validation par l'expert-comptable. »
         - bouton [Marquer comme validée] avec confirmation (saisie du nom du validateur)
      3. Historique des modifications (changelog) affiché en bas d'écran : qui, quand, quoi.
      4. ParametrageViewModel testé avec ApiClient mocké : édition, droits, invalidation,
         régimes à compléter, validation.
    acceptance:
      - "Table TVA affichée avec état de validation permanent"
      - "Édition complète des règles avec listes fermées (UNCL5305, VATEX)"
      - "Régimes non mappés affichés « À compléter » avec création de règle pré-remplie"
      - "Toute modification affiche le bandeau NON VALIDÉE"
      - "Droits paramétrage respectés (édition masquée sinon)"
      - "Changelog visible"
      - "Tests ViewModel avec ApiClient mocké"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  WPF08:
    title: "Écran Réconciliation des PDF (via API)"
    description: |
      Implémenter l'écran de réconciliation PDF ↔ documents (TRK08 / API04) :
      1. Trois listes alimentées par GET /reconciliation :
         - Propositions à confirmer (confiance moyenne) : PDF + document candidat + raison du
           rapprochement (« même date et même montant ») → [Confirmer] / [Rejeter]
         - PDF orphelins : aucun document correspondant trouvé → [Lier manuellement...]
           (sélecteur de document avec recherche)
         - Documents sans PDF : documents émis dont l'archive n'a pas de bordereau-source.pdf
      2. Aperçu du PDF (GET /reconciliation/{id}/pdf) pour décider en connaissance de cause.
         ADR REQUIS : WPF/net48 n'a pas de visionneuse PDF native — choix entre contrôle
         WebBrowser (Adobe Reader installé), composant tiers (= ADR de dépendance), ou
         ouverture dans le lecteur PDF par défaut du poste (zéro dépendance, recommandé en V1).
      3. Compteur dans le menu latéral : nombre d'éléments en attente de réconciliation.
      4. Cet écran n'apparaît QUE si l'adaptateur configuré déclare ProvidesUnlinkedDocumentPool
         (capacité absente = pas d'écran, pas de bruit pour les déploiements non concernés).
      5. ReconciliationViewModel testé avec ApiClient mocké : les 3 listes, confirmation, rejet,
         lien manuel, écran masqué sans capacité.
    acceptance:
      - "Les 3 listes alimentées par GET /reconciliation"
      - "Confirmation/rejet/lien manuel branchés sur l'API"
      - "Aperçu PDF intégré"
      - "Écran masqué si la capacité pool n'est pas déclarée"
      - "Compteur d'attente visible dans le menu"
      - "Tests ViewModel avec ApiClient mocké"
      - "Checklist smoke mise à jour"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_CONSOLE_ADMIN:
    type: gate
    executor: human
    title: "Gate : console d'administration validée"
    description: |
      Validation humaine de la console WPF multi-postes. C'est la gate « démo » côté visuel :
      chaque écran doit être présentable. Revue sur machine avec les checklists smoke déroulées,
      console connectée à un Service réel tournant sur fixtures, IDÉALEMENT depuis deux postes
      en même temps (preuve du multi-utilisateurs). Inclut le scénario paramétrage comptable
      (régime non mappé → complétion → revalidation) et la réconciliation PDF.
    acceptance:
      - "Tous les items WPF sont done"
      - "Toutes les checklists smoke déroulées avec succès"
      - "Démonstration multi-postes effectuée (2 consoles connectées au même service)"
      - "PR du segment feat/console-admin revue et mergée dans main"
