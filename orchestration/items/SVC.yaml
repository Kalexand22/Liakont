# Lot SVC — Gateway.Service : l'hôte central (F11 adapté à l'architecture API)
# Spec : docs/conception/F11-CLI-Mode-Automatique.md
# Décision 2026-06-02 : le Service est l'hôte NOMINAL du produit (plus une alternative au CLI).
# Il héberge : l'ordonnanceur + le pipeline + l'API HTTP + le seul accès au Tracking.

items:
  SVC01:
    title: "Gateway.Service : service Windows + ordonnanceur interne"
    description: |
      Implémenter le service dans src/Gateway.Service/ :
      1. ServiceBase + hôte d'exécution : démarre l'ordonnanceur + le pipeline et détient le
         SEUL accès au Tracking (principe mono-écrivain). L'hébergement de l'API HTTP est
         PRÉPARÉ ici (point d'extension IApiHost no-op) mais son implémentation réelle arrive
         avec API01 — SVC01 ne dépend pas du lot API.
      2. Ordonnanceur interne configuré par la section schedule de la config :
         {"times": ["03:00"], "catchUpOnStart": true, "heartbeatMinutes": 15}
         - times : heures de déclenchement quotidien du pipeline complet
         - catchUpOnStart : si la machine était éteinte à l'heure prévue, exécuter au démarrage
      3. Battement de cœur : écriture périodique de last-run-status.json (+ exposé sur /health)
         → une supervision externe détecte un service figé.
      4. Mode console (debug) : Gateway.Service.exe --console pour lancer l'hôte en interactif
         (développement et diagnostic).
      5. Aucune logique métier : le service orchestre PipelineRunner + API, rien d'autre.
    acceptance:
      - "Le service démarre l'ordonnanceur + le pipeline planifié + le point d'extension API (no-op à ce stade)"
      - "Ordonnanceur : déclenchement aux heures configurées + catchUpOnStart"
      - "Heartbeat périodique (fichier + /health)"
      - "Mode --console fonctionnel pour le debug"
      - "Tests : calcul du prochain déclenchement, catch-up, heartbeat (timer abstrait/mockable)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SVC02:
    title: "Self-install/uninstall + montre morte + arrêt propre + journalisation"
    description: |
      Compléter le service selon F11 :
      1. Gateway.Service.exe install / uninstall : auto-installation du service Windows,
         nom de service dérivé du chemin de config (multi-config sur la même machine =
         plusieurs instances de service, chacune avec son port API).
      2. Détection « montre morte » : si le dernier run réussi date de plus de 48h alors
         qu'un run était planifié → notification (SVC03) + ERROR dans le log + état dégradé
         visible sur /health.
      3. Arrêt propre : si un run est en cours lors d'un Stop, le run se termine (timeout
         configurable) avant l'arrêt — jamais d'interruption au milieu d'un envoi.
      4. Journalisation fichiers : un log par run (logs\<date>_<heure>_run.log, format
         horodaté lisible, n° de document grep-able), rotation 90 jours.
         Le Tracking et le coffre d'archive ne sont JAMAIS purgés.
    acceptance:
      - "install/uninstall fonctionnels, multi-config = multi-instances"
      - "Montre morte > 48h détectée, notifiée et visible sur /health"
      - "Arrêt propre attend la fin du run en cours"
      - "Logs par run avec rotation 90 jours"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SVC03:
    title: "Notifications SMTP"
    description: |
      Implémenter les notifications selon F11 :
      1. Échec de run (erreur fatale) : mail immédiat « La transmission du <date> n'a pas pu
         s'exécuter : <raison> ».
      2. Run partiel (blocages/rejets nouveaux) : mail récapitulatif — liste des documents
         + motifs + consigne « ouvrir la console ».
      3. Montre morte (SVC02) : mail d'alerte.
      4. Run OK : pas de mail. Option NotifyOnSuccess: true pour les premières semaines.
      5. SMTP simple (System.Net.Mail, net48) : hôte, port, credentials (chiffrés DPAPI),
         from/to dans la config. Échec d'envoi du mail = WARN dans le log, jamais un échec du run.
    acceptance:
      - "Les 4 scénarios de notification implémentés"
      - "NotifyOnSuccess configurable, défaut false"
      - "Un échec SMTP ne fait jamais échouer le run (testé)"
      - "Tests avec transport SMTP factice : contenu des mails, déclenchement par scénario"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
