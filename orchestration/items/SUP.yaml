# Lot SUP — Supervision proactive (dead-man's switch, alertes, dashboard)
# Spec : docs/conception/F12-Architecture-Plateforme-Agent.md §5
# LE différenciateur opérationnel du pivot : c'est la plateforme qui détecte l'absence
# (panne silencieuse), pas l'agent qui signale sa présence. L'e-reporting a des échéances
# légales — une panne silencieuse = client en non-conformité sans le savoir.
#
# UI (SUP02 dashboard) : même règle non négociable que le lot WEB — bâtir sur le design-system
# Stratum (DeclaredListPage + ColumnRegistry, gabarit AdminAgents.razor), parité fonctionnelle,
# PAS de grille maison. Voir l'en-tête de orchestration/items/WEB.yaml.

items:
  # SUP01 re-découpé en SUP01a/b (2026-06-07, manifest v13) : le module Supervision entier (scaffold +
  # job + moteur + 8 règles + entité) était trop gros → bloqué « mal dimensionné » par le runner.
  # SUP01a = infrastructure (scaffold + entité Alert + dead-man's-switch + moteur) ; SUP01b = les 8 règles.
  SUP01a:
    title: "Module Supervision : scaffold + entité Alert + dead-man's-switch (job + moteur)"
    description: |
      Bootstrap du module de supervision (src/Modules/Supervision/, pattern Stratum) selon F12 §5 —
      l'infrastructure que SUP01b (les règles) viendra peupler :
      1. Scaffold du module Supervision (Domain/Application/Infrastructure/Web, pattern Stratum).
      2. Entité Alert : tenant, règle, gravité, déclenchée le, résolue le (auto-résolution quand la
         condition disparaît), acquittée par (opérateur). Persistance + requêtes (consommées par SUP02).
      3. Dead-man's-switch : job planifié (toutes les 15 min) qui parcourt TOUS les tenants via la
         mécanique multi-tenant du socle (TenantJobRunner/ITenantJob de SOL06, JAMAIS de boucle maison) —
         le SEUL endroit du produit autorisé à faire des requêtes cross-tenant, en lecture (blueprint §7
         règle 3). Moteur de règles (interface IAlertRule + dispatch) + mécanique anti-bruit /
         auto-résolution : une alerte active ne se re-déclenche pas ; elle se résout et peut se
         re-déclencher après résolution. PAS de règle concrète ici (au plus une règle exemple triviale
         pour prouver le moteur) — les 8 règles sont SUP01b.
      4. Tests d'intégration : câblage du module, cycle de vie d'une Alert (déclenchement/résolution/
         acquittement), le job parcourt plusieurs tenants, anti-bruit + auto-résolution du moteur.
    acceptance:
      - "Module Supervision scaffoldé (pattern Stratum) + entité Alert (persistance + requêtes)"
      - "Job dead-man's-switch via TenantJobRunner (SOL06) — seul code cross-tenant (en lecture), vérifié en review"
      - "Moteur de règles (IAlertRule) + anti-bruit / auto-résolution testés (sans les 8 règles concrètes)"
      - "Tests d'intégration : cycle de vie Alert, job multi-tenants, anti-bruit"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # SUP01b re-découpé (décision opérateur 2026-06-08, après blocage 2026-06-07 session
  # orch-20260607T225558Z) : « les 8 règles » était inlivrable d'un bloc — 5 des 8 règles n'ont AUCUN
  # producteur de données persisté, et 5/8 créent une circularité cross-segment
  # (SUP01b → OPS04/OPS07 [segment toolkit, APRÈS GATE_CONSOLE_WEB] → GATE_CONSOLE_WEB → SUP03 → SUP01b).
  # On garde ici les 3 règles CONSTRUCTIBLES MAINTENANT (données déjà persistées + tenant-scopées) ; les
  # 5 restantes partent en SUP01c (fast-follow GELÉ, hors périmètre de la gate console-web).
  SUP01b:
    title: "Les 3 règles d'alerte constructibles (données déjà persistées) — seuils par défaut + surcharge tenant"
    description: |
      Sur le moteur d'SUP01a (IAlertRule + dispatch + anti-bruit / auto-résolution), implémenter les
      3 SEULES règles d'alerte dont la source de données est DÉJÀ persistée et requêtable de façon
      tenant-scopée aujourd'hui (vérifié sur pièce au blocage 2026-06-07). Seuils par défaut F12 §5.2,
      surchargés par les seuils du tenant (CFG02) :
      - Agent muet (aucun heartbeat) > 24 h → 🔴 Critique.
        Source : dernier heartbeat par agent (`Agent.LastSeenAtUtc`, registre système Ingestion,
        colonne `last_seen_at`) via une lecture tenant-scopée — exposer la lecture « last-seen » si elle
        ne l'est pas encore par un Contract d'Ingestion (jamais de requête maison cross-tenant : seul le
        job dead-man's-switch de SUP01a balaie les tenants, en lecture — blueprint §7).
      - Documents bloqués non traités > 5 jours → 🟠 Avertissement.
        Source : documents en état `Blocked` (module Documents, `IDocumentQueries`) — l'âge se dérive de
        `DocumentSummaryDto.LastUpdateUtc` (temps passé dans l'état). Ajouter au besoin une lecture d'âge
        dédiée par état au Contract Documents plutôt que de paginer toute la file.
      - Rejets PA non traités > 2 jours → 🔴 Critique.
        Source : documents en état `RejectedByPa` (même Contract Documents), même dérivation d'âge.
      Chaque règle se branche sur le moteur SUP01a (anti-bruit / auto-résolution déjà fournis) : une
      alerte active ne se re-déclenche pas ; elle se résout quand la condition disparaît et peut se
      re-déclencher après résolution. Aucune source de données fabriquée (une supervision qui prétend
      surveiller ce qu'elle ne surveille pas est précisément la panne silencieuse que SUP existe pour
      détecter) : si une règle exige un producteur inexistant, elle est en SUP01c, pas ici.
      Les 5 autres règles (run manqué, file de push, SIREN/tax_report_setting PA, version d'agent
      obsolète, échéance déclarative J-3) sont en SUP01c (fast-follow gelé, producteurs manquants).
    acceptance:
      - "Les 3 règles constructibles implémentées (agent muet, documents bloqués, rejets PA), branchées sur le moteur SUP01a"
      - "Seuils par défaut F12 §5.2 + surcharge par tenant (CFG02), testés par règle"
      - "Aucune source de données fabriquée : chaque règle lit une donnée DÉJÀ persistée et tenant-scopée (last-seen agent ; états Blocked / RejectedByPa des documents) — vérifié en review"
      - "Auto-résolution + anti-bruit vérifiés par règle (réutilise le moteur SUP01a)"
      - "Lectures tenant-scopées par construction : aucune requête cross-tenant hors du job dead-man's-switch de SUP01a (NetArchTest / review)"
      - "Tests d'intégration : chaque règle (déclenchement / auto-résolution), multi-tenants, seuils par tenant"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SUP01c:
    title: "Règles d'alerte fast-follow (producteurs de données requis) — GELÉ"
    description: |
      FAST-FOLLOW de SUP01b, HORS périmètre de GATE_CONSOLE_WEB. Marqué `blocked` dans state.yaml :
      les 5 règles restantes n'ont AUCUN producteur de données persisté aujourd'hui, et leurs producteurs
      vivent dans le segment toolkit (OPS04/OPS07), APRÈS GATE_CONSOLE_WEB. Les laisser dans SUP01b créait
      une circularité cross-segment (SUP01b → OPS07 → GATE_CONSOLE_WEB → SUP03 → SUP01b) qui rend l'item
      structurellement insatisfiable, quel que soit l'ordre. On casse la circularité en SORTANT ces règles
      du périmètre de la gate console-web. NE PAS réclamer ni coder tant que chaque producteur ci-dessous
      n'existe pas (faux-vert : une règle de supervision sans source réelle prétend surveiller ce qu'elle
      ne surveille pas — exactement la panne silencieuse que SUP existe pour détecter).
      PRÉREQUIS DE DÉBLOCAGE (un par règle — un-block partiel possible règle par règle dès que SON
      producteur est livré et exposé par un Contract) :
        - Run d'extraction manqué (heartbeat OK mais pas de run) > 36 h → 🔴 Critique.
          PRODUCTEUR MANQUANT : la télémétrie de run (LastRunStartedUtc / LastRunCompletedUtc /
          LastRunOutcome de HeartbeatRequestDto) est DROPPÉE à l'endpoint heartbeat (jamais persistée).
          Requiert un item Ingestion qui persiste le dernier run par agent et l'expose (segment toolkit,
          cf. OPS04).
        - File de push en erreur (signalée par le heartbeat) > seuil (défaut F12 §5.2 : > 50 éléments
          ou > 6 h) → 🟠 Avertissement.
          PRODUCTEUR MANQUANT : PushQueueDepth / PushQueueErrorCount de HeartbeatRequestDto, eux
          aussi droppés à l'endpoint. Même item Ingestion de persistance de la télémétrie heartbeat (OPS04).
        - SIREN non publié / tax_report_setting inactif côté PA → 🟠 Avertissement.
          PRODUCTEUR MANQUANT : IPaClient.GetTaxReportSettingAsync est un appel LIVE ; aucun état PA
          persisté requêtable par un job batch multi-tenant. Requiert un diagnostic PA persisté (job qui
          interroge périodiquement la PA par tenant et stocke un état requêtable — données PAB03, F04 §3.1).
        - Version d'agent obsolète (< N-1) → 🟠 Avertissement.
          PRODUCTEUR MANQUANT : Agent.LastAgentVersion ne porte que la version COURANTE ; aucune baseline
          « dernière version de flotte » n'existe. Requiert le registre de versions OPS07 livré et exposé.
          ⚠️ C'est cette règle qui créait la circularité (OPS07 ∈ toolkit, après GATE_CONSOLE_WEB) : la
          sortir de SUP01b la rompt.
        - Échéance de période déclarative proche (J-3) avec documents non transmis → 🔴 Critique.
          GELÉ sur ARBITRAGE FISCAL D-a (même blocage que PIP03b) : FiscalSettings.ReportingFrequency
          est une chaîne OPAQUE (INV-TENANTSETTINGS-008, énumération NON tranchée — « CFG02 ne l'interprète
          jamais »). Calculer une échéance à partir d'une cadence non sourcée = inventer une règle fiscale
          (CLAUDE.md n°2). Tant que D-a n'est pas tranchée (cadence sourcée + énum figée, fenêtrage/échéance
          J+X livrés par PIP03b), SEUL le fail-safe est codable : null/cadence non interprétable = pas de
          calcul d'échéance, pas d'alerte (JAMAIS de cadence devinée).
      CONTENU une fois débloqué (par règle, dès que son producteur existe) : implémenter la règle sur le
      moteur SUP01a (anti-bruit / auto-résolution déjà fournis), seuils par défaut F12 §5.2 + surcharge
      tenant (CFG02), lecture tenant-scopée du producteur, tests d'intégration par règle + multi-tenants.
    acceptance:
      - "GELÉ : aucune règle codée tant que SON producteur de données n'existe pas et n'est pas exposé par un Contract (un-block possible règle par règle)"
      - "Run manqué + file de push : débloquées seulement après l'item Ingestion qui persiste la télémétrie heartbeat (run + queue) — segment toolkit, cf. OPS04"
      - "SIREN / tax_report_setting PA : débloquée seulement après un diagnostic PA persisté requêtable (données PAB03, F04 §3.1)"
      - "Version d'agent obsolète : débloquée seulement après le registre de versions OPS07 ; la circularité SUP01c → OPS07 → GATE_CONSOLE_WEB est rompue (SUP01c hors périmètre de la gate)"
      - "Échéance J-3 : GELÉE sur l'arbitrage fiscal D-a (cadence sourcée + énum figée, cf. PIP03b) — seul le fail-safe null = pas d'alerte est codable, aucune cadence devinée"
      - "Chaque règle livrée se branche sur le moteur SUP01a (anti-bruit / auto-résolution), lit une donnée réelle tenant-scopée, et a ses tests d'intégration (déclenchement / auto-résolution, multi-tenants, seuils par tenant)"
      - "Aucune source de données fabriquée, aucune règle fiscale inventée (CLAUDE.md n°2)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SUP02:
    title: "Dashboard de supervision (opérateur d'instance)"
    description: |
      Implémenter la page de supervision (rôle opérateur d'instance — celui qui opère la
      plateforme : l'éditeur ou IT Innovations) :
      1. Vue d'ensemble de TOUS les tenants de l'instance : par tenant — état de l'agent
         (dernier heartbeat, version, taille de file), compteurs de documents (bloqués,
         rejetés, en attente), alertes actives, échéance déclarative la plus proche.
      2. Tri/filtre : tenants en alerte d'abord, recherche par nom.
      3. Détail d'un tenant : historique des heartbeats, historique des alertes, lien vers
         la console du tenant.
      4. Acquittement d'alerte : marquer une alerte comme prise en charge (journalisé).
      5. Permission dédiée : liakont.supervision (distinct des permissions tenant —
         un comptable d'un tenant ne voit JAMAIS ce dashboard ni les autres tenants).
      6. Tests bUnit : vue d'ensemble, tri par alerte, acquittement, permissions.
         E2E Playwright : parcours supervision (alerte visible → détail → acquittement).
    acceptance:
      - "Vue d'ensemble multi-tenants avec alertes, état agents, compteurs"
      - "Acquittement d'alerte journalisé"
      - "Permission liakont.supervision : un utilisateur tenant ne voit jamais ce dashboard (testé)"
      - "Tests bUnit + E2E Playwright"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  SUP03:
    title: "Notifications email d'alerte (+ transport SMTP réel)"
    description: |
      Implémenter l'envoi des alertes par email via le module Notification du socle Stratum.
      ATTENTION (constat review 2026-06-03) : le socle Stratum fournit le PIPELINE de
      notification (templates, queue, retry) mais son seul transport est un STUB qui ne fait
      que logger (StubEmailTransport) — aucun package SMTP dans Directory.Packages.props.
      Cet item livre donc AUSSI le transport réel :
      0. Implémentation d'un IEmailTransport SMTP réel (configuration SMTP au niveau instance
         — F12 §6.1) + ADR de dépendance (MailKit ou équivalent — règle blueprint §5 : tout
         nouveau package = ADR). Le StubEmailTransport reste le transport des tests.
      1. Destinataires (F12 §5.3) :
         - Opérateur de l'instance : TOUTES les alertes (email configuré au niveau instance)
         - Contact du tenant (si configuré dans le profil CFG02 et si l'option est activée) :
           alertes 🔴 Critiques uniquement
      2. Contenu : français, actionnable — « L'agent du client <tenant> ne répond plus depuis
         le <date heure>. Dernier état connu : ... Vérifiez que le serveur est allumé et que
         le service Liakont Agent est démarré. »
      3. Anti-spam : une alerte = un email au déclenchement (pas de répétition), un email de
         résolution optionnel. Récapitulatif quotidien optionnel (digest des alertes actives).
      4. Échec d'envoi SMTP = journalisé, ré-essayé par le job suivant — jamais une exception
         qui casse l'évaluation des règles.
      5. Tests : contenu des emails (transport mocké), destinataires selon gravité/config,
         anti-spam, digest, échec SMTP non bloquant.
    acceptance:
      - "IEmailTransport SMTP réel implémenté (config d'instance) + ADR de dépendance rédigé"
      - "Emails envoyés au déclenchement : opérateur (tout) + contact tenant (critiques, si activé)"
      - "Contenu français actionnable avec le contexte du problème"
      - "Anti-spam : pas de répétition, digest quotidien optionnel"
      - "Échec SMTP non bloquant (testé)"
      - "Tests avec transport mocké"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  GATE_CONSOLE_WEB:
    type: gate
    executor: human
    title: "Gate : console web + supervision validées"
    description: |
      Validation humaine de la console web complète. C'est la gate « démo » côté visuel :
      chaque page doit être présentable. Revue sur instance de dev avec les parcours E2E
      Playwright verts, console connectée à un pipeline réel tournant sur fixtures (agent
      de dev + plug-in Fake), depuis DEUX comptes utilisateurs de rôles différents (preuve
      des permissions). Inclut le scénario paramétrage comptable (régime non mappé →
      complétion → revalidation), la réconciliation PDF, et le dashboard de supervision
      avec une alerte d'agent muet simulée.
    acceptance:
      - "Tous les items API, WEB, SUP sont done"
      - "Tous les parcours E2E Playwright passent"
      - "Démonstration : deux rôles différents, pages et permissions correctes"
      - "Alerte d'agent muet simulée et visible dans le dashboard + email reçu"
      - "PR du segment feat/console-web revue et mergée dans main"
