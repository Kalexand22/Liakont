  PIP03b:
    title: "E-reporting de paiement — fenêtrage de période, Mixte et envoi réel (FAST-FOLLOW, GELÉ)"
    description: |
      FAST-FOLLOW de PIP03a, HORS chemin critique (PAS une dépendance de GATE_PIPELINE). Marqué `blocked`
      dans state.yaml : un-block = décisions opérateur/expert-comptable (D-a, D-b) + capacité PA externe.
      NE PAS réclamer ni coder tant que les sources fiscales ne sont pas figées — CLAUDE.md n°2.
      PRÉREQUIS DE DÉBLOCAGE (à trancher avec l'expert-comptable, puis re-confirmer sur source primaire) :
        - D-a (cadence) : reportingFrequency stocke-t-il le RÉGIME ({RéelNormalMensuel, RéelNormalTrimestriel,
          RéelSimplifié, FranchiseEnBase}, d'où dériver fréquence+délai via F09 §2) OU directement la
          FRÉQUENCE ({Décadaire, Mensuelle, Bimestrielle}) ? Réconcilier D4 (« trimestrielle ») vs F09 §2
          (« bimestrielle ») et RE-CONFIRMER la table cadence sur la fiche DGFiP primaire / décret n°2022-1299
          (aujourd'hui 🔶 non re-vérifiée). Figer l'énumération CFG02 (F12-A §3.3/§9 #1). Définir les bornes
          exactes de chaque période.
        - D-b (Mixte) : SOURCER le découpage part frais/adjudication (extension du pivot, ADR-0004/F03 §2.3)
          OU acter formellement « V1 = documents mono-catégorie uniquement, Mixte hors périmètre ».
      CONTENU une fois débloqué :
      1. FENÊTRAGE : grouper les agrégats jour×taux (PIP03a) en PÉRIODES déclaratives selon la cadence D-a
         (décade/mois/bimestre) + calcul de l'échéance J+X (alimente l'alerte SUP01 J-3 et l'affichage WEB01).
      2. MIXTE : selon D-b, ventiler la part frais des documents Mixte (ou les garder suspendus si Mixte
         reste hors V1).
      3. CONTRAT : enrichir PaymentReportPeriod (Transmission.Contracts) avec les lignes agrégées F09 §5.3
         {Date, Rate, TotalCollectedTaxableBase, TotalCollectedVat} — met à jour tous les plug-ins PA
         (B2Brouter, Fake, Stub).
      4. ENVOI RÉEL (décision D2 : V1 = Flux 10.4 domestique uniquement ; 10.2 non alimenté, aucune règle de
         dérivation domestique/international inventée) : IPaClient.SendPaymentReportAsync piloté par la
         capacité (Flux 10.4), suivi des états, journalisation PaymentAggregateEvent (TRK04). ⚠️ Côté
         B2Brouter le statut « Encaissée » / CDAR 212 est annoncé « planned for a future release » (F09 §3-4)
         → l'envoi réel reste TESTÉ AVEC FAKE jusqu'à ce que la capacité soit disponible ; les agrégats en
         attente partent automatiquement dès l'activation, AUCUN autre changement.
      5. DÉCLARATION NÉANT (F09 §5.4, décision ouverte) : période sans encaissement = par défaut ne rien
         transmettre + signaler à l'opérateur ; si une déclaration « néant » s'avère obligatoire (à confirmer
         DGFiP/PA), amender — jamais de transmission inventée en attendant.
    acceptance:
      - "BLOQUÉ tant que D-a (cadence sourcée + énum figée) et D-b (Mixte sourcé ou hors V1) ne sont pas tranchées — ne pas coder avant"
      - "Fenêtrage des agrégats en périodes déclaratives selon la cadence sourcée (décade/mois/bimestre) + échéance J+X (alimente SUP01/WEB01)"
      - "Mixte traité selon D-b (ventilation part frais sourcée) ou explicitement hors V1"
      - "PaymentReportPeriod enrichi des lignes F09 §5.3 ; tous les plug-ins PA mis à jour"
      - "Envoi réel via IPaClient.SendPaymentReportAsync piloté par la capacité (V1 = Flux 10.4) ; testé avec Fake ; transmission auto dès que B2Brouter expose « Encaissée »"
      - "Période sans encaissement : rien transmis + signalement opérateur (décision néant documentée, ouverte)"
      - "Montants en decimal, aucun float ; aucun flag PRODUIT ; pipeline ne référence aucun plug-in PA concret (NetArchTest)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP04:
    title: "Rectificatifs e-reporting (flux RE annule-et-remplace)"
    description: |
      Implémenter les rectificatifs d'e-reporting selon F07 §corrections :
      Contexte : quand une donnée déjà transmise en e-reporting (Flux 10.3 B2C ou 10.2/10.4
      paiements) doit être corrigée (avoir tardif, erreur détectée, altération source), la
      correction ne passe PAS par un montant négatif isolé : la DGFiP attend un flux
      rectificatif type RE qui ANNULE ET REMPLACE l'ensemble des données agrégées de la
      période concernée (par SIREN + période).
      PÉRIMÈTRE (re-découpage PIP03 2026-06-06) : PIP04 construit le MÉCANISME RE (builder + idempotence +
      capacité + historique append-only) sur l'infrastructure d'agrégation de PIP03a. Les rectificatifs de
      PAIEMENT (10.4) ne portent de données réelles qu'une fois PIP03b actif (fenêtrage + envoi) ; le
      mécanique RE des e-reporting B2C (10.3) et la correction sur avoir/altération source restent V1.
      1. RectificationBuilder : pour une période déjà transmise, reconstruire l'agrégat complet
         corrigé (toutes les données de la période, pas seulement le delta).
      2. Transmission du rectificatif via IPaClient (capacité SupportsReportRectification —
         PAA01) ; PA sans capacité = rectificatif en attente, comme les autres capacités.
      3. Suivi : la période rectifiée garde son historique complet (transmission initiale +
         chaque rectificatif) dans PaymentAggregateEvent / TaxReport — append-only, l'ancien
         état n'est jamais effacé.
      4. Idempotence : re-déclencher un rectificatif identique ne crée pas de doublon
         (comparaison de hash du contenu rectifié).
      5. Déclencheurs : avoir sur période déjà déclarée (PIP02), correction manuelle opérateur
         (via API/console), altération source détectée (TRK03).
    acceptance:
      - "RectificationBuilder reconstruit l'agrégat complet de la période (annule-et-remplace, pas un delta)"
      - "Capacité SupportsReportRectification utilisée, comportement en attente si absente"
      - "Historique complet conservé (initial + rectificatifs), append-only"
      - "Idempotence des rectificatifs (testé : double déclenchement = une seule transmission)"
      - "Tests : avoir sur période déclarée, rectificatif manuel, PA sans capacité, idempotence"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

