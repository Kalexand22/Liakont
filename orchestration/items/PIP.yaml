# Lot PIP — Pipeline de traitement de la plateforme (F11 amendée + F07 + F09)
# Specs : docs/conception/F11 (amendée 2026-06-03 : exécution répartie agent/plateforme),
#         F07-F08-Avoirs-Frontiere-B2B-B2C.md, F09-E-Reporting-Paiement.md, F12 §4 ;
#         docs/adr/ADR-0012 (acquittement agent en deux temps : PIP01 porte le point de statut
#         agent + l'affinage du dédoublonnage côté plateforme — voir PIP01 point 7) ;
#         docs/adr/ADR-0014 (staging durable du contenu pivot à l'intake : PIP00 est le prérequis
#         de PIP01 — la plateforme détient le contenu, l'agent redevient un filet de sécurité)
# Le pipeline tourne sur la PLATEFORME : déclenché par les événements d'ingestion
# (DocumentReceived) + des jobs planifiés (module Job du socle). L'extraction n'en fait
# plus partie (c'est l'agent). Il parle aux PA via IPaClient + capacités — JAMAIS à un
# PA concret. Tout est tenant-scopé.
#
# DÉPENDANCE INTER-SEGMENT À ARBITRER (révélée par ADR-0012) : la garantie « aucune perte
# sur coupure réseau » démontrée à GATE_AGENT (segment `agent`) repose sur le point de statut
# GET /documents/status, porté ici par PIP01 (segment `pipeline`). Or le manifest ne fait PAS
# dépendre `agent` de `pipeline`. À trancher par l'opérateur : (a) avancer le seul point de
# statut + l'affinage du dédoublonnage dans un item du segment core-foundation/agent, ou
# (b) ajouter une dépendance de gate, ou (c) assumer que la démo AGENT précède le no-loss réel.
#
# CRITICITÉ ALLÉGÉE PAR ADR-0014 (décision opérateur 2026-06-05) : avec le staging plateforme à
# l'intake (PIP00), le CONTENU du document est désormais détenu DURABLEMENT par la plateforme,
# donc la file locale de l'agent redevient un FILET DE SÉCURITÉ et n'est plus le détenteur unique.
# Le « no perte » de bout en bout ne dépend plus de l'agent restant en ligne. Le point de statut
# reste porté par PIP01 (réconciliation), mais le risque structurel de la dépendance ci-dessus est
# fortement réduit. PIP00 (prérequis, manifest prio 4990) précède PIP01.

items:
  PIP00:
    title: "Staging durable du contenu pivot à l'intake (ADR-0014)"
    description: |
      Prérequis de PIP01 (ADR-0014, amende ADR-0012). Le pipeline (CHECK/SEND) exige le pivot
      COMPLET (lignes, ventilation TVA ligne par ligne, parties), or l'intake ne persiste
      aujourd'hui que métadonnées + payload_hash : le contenu n'est durable nulle part avant
      l'émission. PIP00 fait de la PLATEFORME le détenteur durable du contenu pendant le
      traitement (l'agent redevient un filet de sécurité), sans aucune logique métier dans l'agent.
      1. Magasin de staging — abstraction à capacités IPayloadStagingStore (V1 FileSystem ;
         S3-compatible fast-follow comme le coffre), NON-WORM / PURGEABLE (capacité DISTINCTE de
         IArchiveStore qui, lui, reste WORM/immuable). Stocke le PivotDocumentDto sérialisé
         (sérialisation canonique ADR-0007), CHIFFRÉ AU REPOS, TENANT-SCOPÉ, clé
         (tenant_id, source_reference, payload_hash) / document_id. Accédé via Contracts par
         Ingestion (write) et Pipeline (read) — aucun accès cross-module Domain/Infra, aucun
         `if (store is …)`.
      2. Intake (IngestDocumentBatchHandler) : ÉCRIRE ET FLUSHER le blob de staging AVANT de
         commiter l'inscription au registre received_documents + l'événement outbox
         DocumentReceivedV1 — invariant d'ORDRE, PAS d'atomicité (aucune transaction distribuée
         XA/2PC entre un blob store et Postgres ; ne PAS écrire « même unité de cohérence »). Un
         DocumentReceivedV1 n'est ainsi JAMAIS publié sans contenu déjà stagé. Crash entre
         l'écriture du blob et le commit = au pire un blob ORPHELIN (purgeable, ré-écrit
         idempotemment au renvoi de l'agent), jamais un événement sans contenu. Le contenu N'EST
         PLUS jeté ; seul le rangement Detected reste best-effort post-commit (inchangé).
         Idempotent sur la clé.
      3. Lecture au traitement : API interne (Contracts) pour que le pipeline relise le pivot par
         document_id/payload_hash, AVEC re-vérification du payload_hash à la lecture (intégrité —
         toute altération détectée par l'empreinte existante ; pas de WORM sur le staging). Une
         entrée ABSENTE est traitée comme « pas encore stagé / retry » (transitoire), JAMAIS
         comme terminal/perdu.
      4. Purge : l'entrée n'est purgée QUE lorsque le contenu est PROUVÉ préservé ailleurs —
         concrètement quand le paquet d'archive WORM existe EFFECTIVEMENT (IArchiveStore.ExistsAsync),
         PAS sur la simple étiquette d'état Issued : la transition Issued puis l'écriture WORM (TRK05)
         ne sont pas atomiques, purger sur l'état seul détruirait le contenu avant qu'il soit dans le
         coffre (et l'agent a déjà purgé son filet). CONSERVÉE pour tous les autres états —
         Detected/ReadyToSend/Blocked/Sending/TechnicalError ET RejectedByPa (refusé par la PA :
         contenu encore nécessaire à la correction/resoumission, PAS archivé en WORM par le SEND).
         Un document définitivement abandonné par l'opérateur (annulation explicite) est purgé par
         cette action DÉLIBÉRÉE, jamais par un balayage d'état. Purge LÉGITIME : magasin transitoire
         de TRAITEMENT, NI table d'audit NI coffre WORM (append-only/WORM inchangés).
    acceptance:
      - "IPayloadStagingStore : abstraction à capacités, V1 FileSystem, purgeable (distincte du coffre WORM IArchiveStore) — aucun `if (store is …)` (NetArchTest sur la frontière)"
      - "Pivot complet sérialisé (canonique ADR-0007), chiffré au repos, tenant-scopé — round-trip write→read fidèle, decimal préservés, aucun float (testé)"
      - "Ordre d'intake : blob de staging écrit+flushé AVANT le commit registre+outbox — un DocumentReceivedV1 n'est jamais publié sans contenu stagé (testé : crash simulé entre écriture blob et commit = jamais d'événement sans contenu ; rollback = blob orphelin purgeable, pas d'événement)"
      - "Entrée de staging absente au CHECK = traitée comme retry transitoire, jamais comme terminal/perdu (testé)"
      - "Relecture re-vérifie le payload_hash : un contenu altéré est rejeté à la lecture (testé)"
      - "Purge subordonnée à la présence EFFECTIVE du paquet WORM (IArchiveStore.ExistsAsync), jamais à l'étiquette Issued seule (testé : entre transition Issued et écriture TRK05 = staging conservé) ; purge sinon uniquement sur abandon opérateur explicite"
      - "CONSERVATION à Detected/ReadyToSend/Blocked/Sending/TechnicalError ET RejectedByPa (testé chaque état — Detected = premier état où le contenu doit survivre avant tout CHECK ; RejectedByPa = pas archivé en WORM, contenu requis pour correction/resoumission)"
      - "Isolation tenant : un tenant ne lit jamais le staging d'un autre (testé 2 tenants)"
      - "Accès uniquement via Contracts (Ingestion write, Pipeline read) — aucun accès cross-module Domain/Infra (NetArchTest)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP01:
    title: "Pipeline check → send → sync (événements + jobs)"
    description: |
      Implémenter le pipeline dans src/Modules/Pipeline/ (ou réparti dans les modules
      Documents/Transmission avec un orchestrateur — choix d'implémentation à justifier
      au plan, critère : respecter les frontières de modules via Contracts) :
      1. CHECK (déclenché par l'événement DocumentReceived de l'ingestion, via outbox) :
         document Detected → RELECTURE du pivot COMPLET depuis le magasin de staging (PIP00,
         clé document_id/payload_hash, re-vérif du hash) → mapping TVA (TVA02, table du tenant)
         → ValidationPipeline (VAL) → OK : ReadyToSend ; KO : Blocked avec motifs persistés.
         Le pipeline ne suppose JAMAIS le contenu « déjà là » : il le lit depuis le staging.
         GARDE-FOU PRODUCTION : si le compte PA actif du tenant est en environnement
         « production » et que la table de mapping TVA n'est PAS validée (validatedBy absent,
         table modifiée non revalidée, ou table d'exemple), TOUS les documents restent Blocked
         avec le motif « Table TVA non validée — validation expert-comptable requise ».
         Le mode staging/démo n'est pas concerné.
      2. SEND (job planifié par tenant — mécanique TenantJobRunner/ITenantJob de SOL06, jamais
         de boucle multi-tenant maison — + déclenchable par API02 send/send-all) :
         documents ReadyToSend → résolution du plug-in PA du tenant → PRE-SEND → envoi :
         - PRE-SEND : avant tout retry d'un document TechnicalError, ET pour tout document
           resté en état Sending (crash au milieu d'un envoi), vérifier côté PA
           (GetPotentiallySentDocuments TRK03 + IPaClient.GetDocumentStatusAsync) qu'un envoi
           précédent dont la réponse s'est perdue n'a pas réussi — si la PA connaît le
           document : transition vers Issued SANS renvoyer (anti-doublon inter-traitement).
           Les documents en Sending sont repris dès le PREMIER cycle après redémarrage de
           la plateforme (pas d'attente d'un déclencheur externe).
         - DIAGNOSTIC PA (F04 §3.1, piège staging connu « Transport not available ») : avant
           l'envoi, vérifier que le SIREN du tenant est publié côté PA et que le
           tax_report_setting est actif (PAB03 Get/EnsureTaxReportSetting) — si non :
           alerte Warning + documents maintenus en ReadyToSend avec motif explicite
           (« SIREN non publié côté <PA> — aucun envoi possible »), jamais d'envoi à l'aveugle.
         - ENVOI : pivot relu depuis le staging (PIP00) → IPaClient.SendDocumentAsync → succès :
           Issued + création du paquet d'archive TRK05, PUIS — une fois le paquet WORM CONFIRMÉ
           présent (IArchiveStore.ExistsAsync) — purge de l'entrée de staging ; errors[] :
           RejectedByPa (staging CONSERVÉ : pas en WORM, contenu nécessaire à la correction) ;
           réseau : TechnicalError.
      3. SYNC (job planifié) : pour chaque document Issued du tenant :
         - tax report manquant → ListTaxReportsAsync → archivage xml_base64
           (si le PA déclare SupportsTaxReportRetrieval)
         - facture PA manquante dans l'archive → GetGeneratedDocumentAsync →
           addendum d'archive (si SupportsDocumentRetrieval)
      4. RunLog par tenant : chaque exécution (check/send/sync, déclencheur, compteurs, durée)
         est journalisée — consommée par GET /runs (API01) et la page Traitements (WEB04).
      5. Dry-run : un mode « tout sauf les écritures PA » pour la démo et la recette
         (vérifié par le journal d'appels du plug-in Fake).
      6. Concurrence : le module Job garantit qu'un seul job send/sync par tenant tourne à
         la fois (pas de mutex système — c'est le job scheduler qui sérialise).
      7. ACQUITTEMENT AGENT EN DEUX TEMPS — côté plateforme (ADR-0012, amende F12 §3.3/§4.1).
         Le CHECK est le consommateur DURABLE de l'événement DocumentReceived ; c'est donc ici
         que vit l'état « terminal » que l'agent réconcilie :
         - exposer GET /api/agent/v1/documents/status (lecture seule, tenant-scopé, clé
           (source_reference, payload_hash)) qui rapporte à l'agent : Processed = déterminé par
           l'ÉTAT DURABLE du Document (Detected et au-delà, Issued INCLUS) — le contenu a été stagé
           (PIP00) AVANT l'événement (invariant happened-before), ce N'EST PAS un contrôle de
           présence vive du staging (purgé à Issued) : un document déjà Issued répond TOUJOURS
           Processed, jamais Pending. Rejected = payload non conforme à l'intake (DISTINCT de l'état
           pipeline RejectedByPa) ; Pending = reçu mais pas encore confirmé / inconnu.
         - CONTRAT HTTP DU STATUT — hygiène sémantique du 404 (robustesse de contrat, PAS le
           mécanisme anti-perte) : sur la route EXISTANTE, une clé (source_reference, payload_hash)
           inconnue répond 200 + Pending, JAMAIS 404 ; le 404 reste réservé à une route absente.
           404 = point non déployé ; 200 = route montée, l'information métier étant portée par le
           statut (Processed/Rejected/Pending), pas par le code HTTP. NB IMPORTANT : l'agent déjà
           livré traite 404 et 200+Pending À L'IDENTIQUE (les deux → renvoi) — ce n'est donc PAS
           cette règle qui ferme la perte ni la boucle de renvoi, c'est le re-rangement idempotent
           du dédoublonnage ci-dessous. Cette règle est de l'hygiène de contrat : elle évite qu'un
           futur agent (ou un diagnostic) confonde « clé pas encore connue » et « endpoint pas
           déployé ». Ne pas sous-investir le re-rangement en croyant que le 200+Pending suffit.
         - AFFINER le dédoublonnage de l'ingestion (IngestDocumentBatchHandler, marqueurs
           TODO(ADR-0012)) : un renvoi d'un document REÇU MAIS NON RANGÉ doit RE-TENTER le
           rangement (idempotent sur DocumentId/payload_hash), au lieu d'être écarté en
           `duplicate`. C'est ce qui ferme la perte silencieuse côté plateforme, et NE PAS
           rendre l'intake best-effort bloquant (ré-introduirait le risque d'orphelin, prérequis
           TRK02). DÉPENDANCE INTER-SEGMENT : la garantie « aucune perte sur coupure » démontrée
           à GATE_AGENT repose sur ce point de statut — voir l'en-tête de lot.
    acceptance:
      - "CHECK déclenché par événement d'ingestion : mapping + validation → ReadyToSend/Blocked"
      - "Contenu lu depuis le staging PIP00 au CHECK ET au SEND (pivot complet relu, payload_hash re-vérifié) — le pipeline ne suppose jamais le contenu « déjà là » (testé)"
      - "Purge du staging subordonnée à la présence EFFECTIVE du paquet WORM (IArchiveStore.ExistsAsync), jamais à l'étiquette Issued seule — testé : balayage entre transition Issued et écriture TRK05 = staging conservé ; RejectedByPa = staging conservé (pas en WORM)"
      - "Point de statut agent GET /documents/status (ADR-0012/ADR-0014) : Processed déterminé par l'état durable du Document (Issued inclus, staging purgé) — un Issued répond toujours Processed jamais Pending (testé) ; Rejected/Pending par (source_reference, payload_hash), tenant-scopé, lecture seule"
      - "Contrat 404 du point de statut (élaboration PIP01 ; sémantique Pending/inconnu d'ADR-0012, le mapping HTTP n'est PAS dans l'ADR) : clé inconnue sur la route existante = 200 + Pending, jamais 404 (404 réservé à une route absente) — hygiène de contrat, pas la garantie no-loss (testé : GET d'une clé jamais vue répond 200/Pending, pas 404)"
      - "Dédoublonnage affiné (ADR-0012) : un renvoi d'un document reçu mais non rangé RE-TENTE le rangement (idempotent), jamais écarté en duplicate (testé : intake échoué puis renvoi = document rangé, pas perdu)"
      - "Garde-fou production : table TVA non validée + compte PA production = tout reste Blocked (testé)"
      - "PRE-SEND : anti-doublon inter-traitement (timeout au traitement N, vérification PA au N+1 — testé)"
      - "Reprise après crash : documents restés en Sending repris et vérifiés côté PA dès le premier cycle après redémarrage (testé)"
      - "Diagnostic SIREN publié / tax_report_setting actif avant envoi : non publié = alerte + aucun envoi (testé)"
      - "Jobs par tenant via TenantJobRunner (SOL06) — aucune boucle multi-tenant locale"
      - "SYNC récupère tax reports + facture PA vers l'archive selon les capacités (testé avec/sans capacités)"
      - "Dry-run n'effectue aucune écriture PA (vérifié par le journal du plug-in Fake)"
      - "Le pipeline ne référence JAMAIS un plug-in PA concret (NetArchTest)"
      - "Un seul job send/sync par tenant à la fois (testé)"
      - "RunLog par tenant écrit pour chaque exécution"
      - "Tests d'intégration de bout en bout : golden files PIV03 → ingestion → check → send (Fake) → sync → archive"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP02:
    title: "Pipeline des avoirs (F07)"
    description: |
      Implémenter le traitement des avoirs selon F07 :
      1. Ordre de traitement chronologique : un avoir n'est envoyé qu'après sa facture d'origine.
         - facture d'origine trouvée dans le tenant + déjà émise → CreditNoteRef renseigné → envoi
         - facture trouvée mais PAS encore émise → traiter l'original d'abord (réordonnancement)
         - facture introuvable → Blocked « facture d'origine inconnue » (avoir orphelin)
      2. Cas limites : avoir partiel (lignes de la part annulée), avoir groupé (CreditNoteRefs
         multi-références), avoir orphelin (bloqué, pas de référence fabriquée — résolution
         par l'opérateur via resolve-manually API02).
      3. Le mapping TVA d'un avoir est identique à celui de l'original, montants positifs
         (le type 381 porte la sémantique crédit).
      4. Si le PA ne déclare pas SupportsCreditNotes : les avoirs restent en ReadyToSend avec
         le statut « en attente : capacité avoirs non disponible chez <PA> » — jamais perdus,
         jamais bloquants pour le reste du traitement.
    acceptance:
      - "Avoir envoyé seulement après émission de sa facture d'origine"
      - "Réordonnancement automatique quand l'original est dans le même traitement"
      - "Avoir orphelin bloqué, jamais envoyé"
      - "PA sans capacité avoirs : mise en attente propre, pas de blocage du traitement"
      - "Tests : avoir simple, avoir groupé, avoir orphelin, avoir avant facture, PA sans capacité"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP03:
    title: "E-reporting de paiement (F09) — complet, piloté par les capacités PA"
    description: |
      Implémenter l'e-reporting de paiement selon F09 (modules Payments + Pipeline).
      LE PRODUIT EST COMPLET : agrégation, persistence ET envoi sont implémentés.
      C'est la capacité du PA configuré qui détermine si l'envoi part réellement.
      1. PaymentAggregator : Payments du tenant (poussés par l'agent — PIV01/TRK04) →
         PaymentReportPeriod agrégés par jour × taux TVA (l'obligation DGFiP est un agrégé
         jour×taux au niveau SIREN, pas un lettrage ligne à ligne). Job planifié par tenant
         (mécanique TenantJobRunner/ITenantJob de SOL06).
      2. Règle d'imputation de la part frais (prestation de services) : la MÉTHODE est un
         PARAMÈTRE, pas une règle codée en dur — F09 §5.2 présente deux options (prorata
         HT frais / HT total du bordereau lié ; agrégation jour×taux DGFiP-conforme) et la
         décision n'est PAS tranchée (décision ouverte F09).
         Comportement V1 : méthode d'imputation = paramètre de tenant (valeurs : Prorata |
         AgregationJourTaux | null). Tant que la méthode n'est pas renseignée ET validée
         (même workflow que la table TVA), les transmissions de paiement concernées sont
         SUSPENDUES avec le motif « Méthode d'imputation des frais non validée — consultez
         votre expert-comptable ». JAMAIS de prorata appliqué par défaut.
      3. PARAMÉTRAGE FISCAL DU TENANT (CFG02 — ces décisions appartiennent à l'expert-comptable
         du client, le produit doit supporter les deux réponses) :
         - vatOnDebits (bool?) : si le client a opté pour la TVA sur les débits, l'exigibilité
           est à la facturation → PAS d'e-reporting de paiement pour les prestations de services
           concernées. Le moteur calcule quand même les agrégats (traçabilité) mais les marque
           « non requis — TVA sur les débits ».
         - operationCategory : détermine quelle part des documents déclenche l'e-reporting
           de paiement.
         Paramètres null = agrégats calculés mais transmission suspendue avec le motif
         « Décision fiscale en attente (TVA sur les débits / catégorie d'opération /
         fréquence déclarative) — consultez votre expert-comptable ».
         La fréquence déclarative (reportingFrequency CFG02, source F09 §2) détermine le
         découpage des périodes de transmission — null = pas de période calculable =
         transmission suspendue (décision D4).
      4. Cas limites : paiement partiel (imputé à sa date), trop-perçu/remboursement (montant
         négatif dans l'agrégat de la période), règlement sans rattachement bordereau (alerte Warning).
         PÉRIODE SANS ENCAISSEMENT (« déclaration néant ») : comportement par défaut sûr —
         ne rien transmettre + signaler la période vide à l'opérateur. DÉCISION OUVERTE
         (à confirmer DGFiP/PA via les fiches officielles) : une déclaration « néant » est-elle
         obligatoire ? Si oui, ce comportement sera amendé (F09) — jamais de transmission
         inventée en attendant.
      5. ENVOI — décision D2 du 2026-06-03 : le produit V1 ne produit QUE le Flux 10.4
         (e-reporting de paiement domestique). Le Flux 10.2 (international) est une capacité
         déclarée par PAA01 mais NON alimentée par le pipeline : aucune règle sourcée ne permet
         de dériver domestique/international d'un paiement (F09 ne tranche pas), et le B2B
         international est en phase 2. Envoi piloté par la capacité du PA :
         - PA avec la capacité Flux 10.4 → IPaClient.SendPaymentReportAsync, suivi des états,
           journalisation PaymentAggregateEvent (TRK04)
         - PA sans la capacité → les agrégats sont calculés, persistés et affichés avec l'état
           « En attente : la plateforme <nom> ne supporte pas encore la transmission des
           paiements ». Dès que le plug-in déclarera la capacité, les agrégats en attente
           partiront au traitement suivant — AUCUN autre changement.
      6. Tests avec le plug-in Fake dans les deux configurations de capacité ET les
         combinaisons de paramétrage fiscal.
    acceptance:
      - "Agrégation jour×taux conforme F09, sans données nominatives"
      - "Méthode d'imputation des frais = paramètre de tenant validé, JAMAIS de prorata par défaut (testé : méthode null = transmission suspendue)"
      - "Montants agrégés en decimal, aucun float/double"
      - "Paramètres fiscaux du tenant (vatOnDebits, operationCategory, reportingFrequency) pilotent l'e-reporting — jamais de valeur en dur"
      - "Paramètres fiscaux non renseignés = transmission suspendue avec message explicite (testé)"
      - "V1 = Flux 10.4 uniquement (décision D2) ; aucune transmission 10.2, aucune règle de dérivation domestique/international inventée"
      - "Période sans encaissement : rien n'est transmis + signalement opérateur (décision néant ouverte, documentée)"
      - "Envoi réel via IPaClient quand la capacité est déclarée (testé avec le plug-in Fake)"
      - "Capacité absente : agrégats persistés en attente, transmission automatique dès activation"
      - "Aucun flag de configuration PRODUIT — capacités PA + paramétrage fiscal du tenant uniquement"
      - "Tests : agrégation multi-jours/multi-taux, paiement partiel, remboursement, période vide, les 2 modes de capacité, TVA sur débits oui/non/inconnu, méthode d'imputation null/renseignée"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP04:
    title: "Rectificatifs e-reporting (flux RE annule-et-remplace)"
    description: |
      Implémenter les rectificatifs d'e-reporting selon F07 §corrections :
      Contexte : quand une donnée déjà transmise en e-reporting (Flux 10.3 B2C ou 10.2/10.4
      paiements) doit être corrigée (avoir tardif, erreur détectée, altération source), la
      correction ne passe PAS par un montant négatif isolé : la DGFiP attend un flux
      rectificatif type RE qui ANNULE ET REMPLACE l'ensemble des données agrégées de la
      période concernée (par SIREN + période).
      1. RectificationBuilder : pour une période déjà transmise, reconstruire l'agrégat complet
         corrigé (toutes les données de la période, pas seulement le delta).
      2. Transmission du rectificatif via IPaClient (capacité SupportsReportRectification —
         PAA01) ; PA sans capacité = rectificatif en attente, comme les autres capacités.
      3. Suivi : la période rectifiée garde son historique complet (transmission initiale +
         chaque rectificatif) dans PaymentAggregateEvent / TaxReport — append-only, l'ancien
         état n'est jamais effacé.
      4. Idempotence : re-déclencher un rectificatif identique ne crée pas de doublon
         (comparaison de hash du contenu rectifié).
      5. Déclencheurs : avoir sur période déjà déclarée (PIP02), correction manuelle opérateur
         (via API/console), altération source détectée (TRK03).
    acceptance:
      - "RectificationBuilder reconstruit l'agrégat complet de la période (annule-et-remplace, pas un delta)"
      - "Capacité SupportsReportRectification utilisée, comportement en attente si absente"
      - "Historique complet conservé (initial + rectificatifs), append-only"
