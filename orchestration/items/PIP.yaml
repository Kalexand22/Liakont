# Lot PIP — Pipeline de traitement de la plateforme (F11 amendée + F07 + F09)
# Specs : docs/conception/F11 (amendée 2026-06-03 : exécution répartie agent/plateforme),
#         F07-F08-Avoirs-Frontiere-B2B-B2C.md, F09-E-Reporting-Paiement.md, F12 §4 ;
#         docs/adr/ADR-0012 (acquittement agent en deux temps : PIP01d porte le point de statut
#         agent + l'affinage du dédoublonnage côté plateforme — voir PIP01d) ;
#         docs/adr/ADR-0014 (staging durable du contenu pivot à l'intake : PIP00 est le prérequis
#         du pipeline — la plateforme détient le contenu, l'agent redevient un filet de sécurité)
# Le pipeline tourne sur la PLATEFORME : déclenché par les événements d'ingestion
# (DocumentReceived) + des jobs planifiés (module Job du socle). L'extraction n'en fait
# plus partie (c'est l'agent). Il parle aux PA via IPaClient + capacités — JAMAIS à un
# PA concret. Tout est tenant-scopé.
#
# DÉPENDANCE INTER-SEGMENT À ARBITRER (révélée par ADR-0012) : la garantie « aucune perte
# sur coupure réseau » démontrée à GATE_AGENT (segment `agent`) repose sur le point de statut
# GET /documents/status, porté ici par PIP01d (segment `pipeline`). Or le manifest ne fait PAS
# dépendre `agent` de `pipeline`. À trancher par l'opérateur : (a) avancer le seul point de
# statut + l'affinage du dédoublonnage dans un item du segment core-foundation/agent, ou
# (b) ajouter une dépendance de gate, ou (c) assumer que la démo AGENT précède le no-loss réel.
#
# CRITICITÉ ALLÉGÉE PAR ADR-0014 (décision opérateur 2026-06-05) : avec le staging plateforme à
# l'intake (PIP00), le CONTENU du document est désormais détenu DURABLEMENT par la plateforme,
# donc la file locale de l'agent redevient un FILET DE SÉCURITÉ et n'est plus le détenteur unique.
# Le « no perte » de bout en bout ne dépend plus de l'agent restant en ligne. Le point de statut
# reste porté par PIP01d (réconciliation), mais le risque structurel de la dépendance ci-dessus est
# fortement réduit. PIP00 (prérequis, manifest prio 4990) précède le pipeline.
#
# PIP01 RE-DÉCOUPÉ en PIP01a-d (2026-06-05) : item trop gros pour une session (nouveau module
# Pipeline + points d'entrée Contracts dans 5 modules + CHECK/SEND/SYNC ; pas de merge partiel).
# PIP01a = fondations (scaffold + lecteur canonique + contrats manquants), PIP01b = CHECK,
# PIP01c = SEND, PIP01d = SYNC + point de statut agent + affinage dédoublonnage.

items:
  PIP00:
    title: "Staging durable du contenu pivot à l'intake (ADR-0014)"
    description: |
      Prérequis du pipeline (ADR-0014, amende ADR-0012). Le pipeline (CHECK/SEND) exige le pivot
      COMPLET (lignes, ventilation TVA ligne par ligne, parties), or l'intake ne persiste
      aujourd'hui que métadonnées + payload_hash : le contenu n'est durable nulle part avant
      l'émission. PIP00 fait de la PLATEFORME le détenteur durable du contenu pendant le
      traitement (l'agent redevient un filet de sécurité), sans aucune logique métier dans l'agent.
      1. Magasin de staging — abstraction à capacités IPayloadStagingStore (V1 FileSystem ;
         S3-compatible fast-follow comme le coffre), NON-WORM / PURGEABLE (capacité DISTINCTE de
         IArchiveStore qui, lui, reste WORM/immuable). Stocke le PivotDocumentDto sérialisé
         (sérialisation canonique ADR-0007), CHIFFRÉ AU REPOS, TENANT-SCOPÉ, clé
         (tenant_id, source_reference, payload_hash) / document_id. Accédé via Contracts par
         Ingestion (write) et Pipeline (read) — aucun accès cross-module Domain/Infra, aucun
         `if (store is …)`.
      2. Intake (IngestDocumentBatchHandler) : ÉCRIRE ET FLUSHER le blob de staging AVANT de
         commiter l'inscription au registre received_documents + l'événement outbox
         DocumentReceivedV1 — invariant d'ORDRE, PAS d'atomicité (aucune transaction distribuée
         XA/2PC entre un blob store et Postgres ; ne PAS écrire « même unité de cohérence »). Un
         DocumentReceivedV1 n'est ainsi JAMAIS publié sans contenu déjà stagé. Crash entre
         l'écriture du blob et le commit = au pire un blob ORPHELIN (purgeable, ré-écrit
         idempotemment au renvoi de l'agent), jamais un événement sans contenu. Le contenu N'EST
         PLUS jeté ; seul le rangement Detected reste best-effort post-commit (inchangé).
         Idempotent sur la clé.
      3. Lecture au traitement : API interne (Contracts) pour que le pipeline relise le pivot par
         document_id/payload_hash, AVEC re-vérification du payload_hash à la lecture (intégrité —
         toute altération détectée par l'empreinte existante ; pas de WORM sur le staging). Une
         entrée ABSENTE est traitée comme « pas encore stagé / retry » (transitoire), JAMAIS
         comme terminal/perdu.
      4. Purge : l'entrée n'est purgée QUE lorsque le contenu est PROUVÉ préservé ailleurs —
         concrètement quand le paquet d'archive WORM existe EFFECTIVEMENT (IArchiveStore.ExistsAsync),
         PAS sur la simple étiquette d'état Issued : la transition Issued puis l'écriture WORM (TRK05)
         ne sont pas atomiques, purger sur l'état seul détruirait le contenu avant qu'il soit dans le
         coffre (et l'agent a déjà purgé son filet). CONSERVÉE pour tous les autres états —
         Detected/ReadyToSend/Blocked/Sending/TechnicalError ET RejectedByPa (refusé par la PA :
         contenu encore nécessaire à la correction/resoumission, PAS archivé en WORM par le SEND).
         Un document définitivement abandonné par l'opérateur (annulation explicite) est purgé par
         cette action DÉLIBÉRÉE, jamais par un balayage d'état. Purge LÉGITIME : magasin transitoire
         de TRAITEMENT, NI table d'audit NI coffre WORM (append-only/WORM inchangés).
    acceptance:
      - "IPayloadStagingStore : abstraction à capacités, V1 FileSystem, purgeable (distincte du coffre WORM IArchiveStore) — aucun `if (store is …)` (NetArchTest sur la frontière)"
      - "Pivot complet sérialisé (canonique ADR-0007), chiffré au repos, tenant-scopé — round-trip write→read fidèle, decimal préservés, aucun float (testé)"
      - "Ordre d'intake : blob de staging écrit+flushé AVANT le commit registre+outbox — un DocumentReceivedV1 n'est jamais publié sans contenu stagé (testé : crash simulé entre écriture blob et commit = jamais d'événement sans contenu ; rollback = blob orphelin purgeable, pas d'événement)"
      - "Entrée de staging absente au CHECK = traitée comme retry transitoire, jamais comme terminal/perdu (testé)"
      - "Relecture re-vérifie le payload_hash : un contenu altéré est rejeté à la lecture (testé)"
      - "Purge subordonnée à la présence EFFECTIVE du paquet WORM (IArchiveStore.ExistsAsync), jamais à l'étiquette Issued seule (testé : entre transition Issued et écriture TRK05 = staging conservé) ; purge sinon uniquement sur abandon opérateur explicite"
      - "CONSERVATION à Detected/ReadyToSend/Blocked/Sending/TechnicalError ET RejectedByPa (testé chaque état — Detected = premier état où le contenu doit survivre avant tout CHECK ; RejectedByPa = pas archivé en WORM, contenu requis pour correction/resoumission)"
      - "Isolation tenant : un tenant ne lit jamais le staging d'un autre (testé 2 tenants)"
      - "Accès uniquement via Contracts (Ingestion write, Pipeline read) — aucun accès cross-module Domain/Infra (NetArchTest)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP01a:
    title: "Pipeline — fondations : module + lecteur canonique + points d'entrée Contracts"
    description: |
      Prérequis structurel du pipeline (PIP01 re-découpé). AUCUN comportement pipeline ici :
      seulement le scaffold + les briques manquantes que CHECK/SEND/SYNC consommeront via Contracts
      (frontière P1 : un module n'accède à un autre que par ses Contracts — NetArchTest l'impose).
      1. Module src/Modules/Pipeline/ : scaffold 4 couches (Contracts/Domain/Application/
         Infrastructure) + Tests.Unit + Tests.Integration + MODULE/INVARIANTS/SCENARIOS, gabarits
         identiques à un module métier (réf. Documents). Enregistrement DI + migrations DbUp
         (EmbeddedResource) : la table pipeline.run_logs est CRÉÉE ici (écrite par PIP01b+).
      2. PivotCanonicalJsonReader (DANS le module Pipeline — PAS dans Liakont.Agent.Contracts qui est
         BCL-only/zéro package) : désérialise le JSON canonique ADR-0007 du staging vers
         PivotDocumentDto. Lecteur EXPLICITE (parse JsonDocument + constructeurs immuables, AUCUNE
         réflexion), miroir de CanonicalJson.WriteDocument. NE PAS re-sérialiser pour ré-hacher (la
         re-vérif du hash est faite par IPayloadStagingStore.ReadAsync sur la string brute).
      3. Points d'entrée Contracts manquants (chacun = impl + enregistrement DI + tests, DANS SON
         module — pas dans Pipeline) :
         - Validation : IValidationService.ValidateAsync(DocumentValidationContext) wrappant
           ValidationPipeline (+ Infrastructure + registration, absentes aujourd'hui) ;
         - TvaMapping : ITvaMappingService mappant un PivotDocumentDto LIGNE PAR LIGNE
           (PivotLineDto.SourceRegimeCodes) → {catégories/VATEX/taux par ligne, IsValidated de la
           table, motif de blocage} wrappant TvaMapper ;
         - Documents : IDocumentLifecycle (BlockAsync, MarkReadyToSendAsync(id, mappingVersion),
           BeginSendingAsync, MarkIssuedAsync, MarkRejectedByPaAsync, MarkTechnicalErrorAsync)
           wrappant l'UoW interne ; + transition Domain posant Document.MappingVersion au passage
           ReadyToSend ; + requête de statut FindStatusBySourceReferenceAndPayloadHashAsync ;
         - TenantSettings : résolution du companyId de l'unique société du tenant courant
           (ITenantSettingsQueries.GetCurrentCompanyId(ct) : Guid?) — sinon impossible d'appeler
           GetPaAccounts/GetFiscalSettings depuis un job tenant sans lire la table d'un autre module
           en SQL brut (violation P1).
      Aucune règle fiscale inventée : le mapping/validation restent dans LEURS modules ; ces services
      ne font qu'exposer en Contracts ce qui existe déjà en Domain.
    acceptance:
      - "Module Pipeline scaffoldé (4 couches + 2 projets de test + MODULE/INVARIANTS/SCENARIOS), enregistré, migration pipeline.run_logs prête"
      - "PivotCanonicalJsonReader : round-trip Serialize(Read(json)) == json octet par octet sur les golden files de DOCUMENT UNIQUE de tests/fixtures/contrat-v1/ (factures/avoirs ; PAS heartbeat.json ni batch-mixte.json, qui ne sont pas des PivotDocument uniques) — testé, decimals à échelle préservée, enums par nom"
      - "IValidationService / ITvaMappingService / IDocumentLifecycle / GetCurrentCompanyId / FindStatusBySourceReferenceAndPayloadHash : chacun impl + DI + tests unitaires, exposé en Contracts de SON module"
      - "ITvaMappingService mappe ligne par ligne (PivotLineDto.SourceRegimeCodes) et remonte IsValidated de la table"
      - "Aucun comportement pipeline (pas de CHECK/SEND/SYNC) ; aucune règle fiscale inventée"
      - "Frontières : Pipeline ne touche les autres modules que par Contracts (NetArchTest)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP01b:
    title: "Pipeline — CHECK (événement DocumentReceived → ReadyToSend/Blocked)"
    description: |
      CHECK : consommateur DURABLE de l'événement DocumentReceivedV1 (via outbox).
      1. Consumer IIntegrationEventConsumer<DocumentReceivedV1> (patron SourceAlterationDetectedConsumer,
         dispatché par OutboxWorker + InMemoryEventDispatcher). Le worker dispatche en scope SYSTÈME →
         résoudre le tenant par slug via payload.TenantId (TenantSlugConnectionFactoryAdapter).
      2. Flux : IPayloadStagingStore.ReadAsync(key) (re-vérif hash ; StagedPayloadNotFound = retry
         TRANSITOIRE, JAMAIS terminal — ADR-0014) → PivotCanonicalJsonReader.Read → ITvaMappingService
         (mapping + IsValidated) → enrichir le pivot (catégories/VATEX par ligne, reconstruire un
         PivotDocumentDto immuable) → IValidationService.ValidateAsync →
         OK : IDocumentLifecycle.MarkReadyToSendAsync(id, mappingVersion) ;
         KO : BlockAsync(id, motifs) — motifs persistés dans le DocumentEvent d'audit (append-only).
      3. GARDE-FOU PRODUCTION : si le compte PA actif du tenant est en environnement « production »
         (PaAccount.Environment) ET la table de mapping TVA n'est PAS validée (IsValidated == false,
         table d'exemple, ou modifiée non revalidée), TOUS les documents restent Blocked avec le motif
         « Table TVA non validée — validation expert-comptable requise ». Le mode staging/démo n'est
         pas concerné. NE JAMAIS affaiblir cette validation Blocking (P1).
      4. RunLog (Check) écrit à chaque exécution.
    acceptance:
      - "CHECK déclenché par DocumentReceivedV1 (outbox) : staging relu (hash re-vérifié) → mapping → validation → ReadyToSend/Blocked"
      - "Contenu lu depuis le staging (PIP00) ; StagedPayloadNotFound = retry transitoire, jamais terminal (testé)"
      - "Garde-fou production : table TVA non validée + compte PA production = tout reste Blocked (testé)"
      - "Motifs de blocage persistés dans le DocumentEvent (append-only) ; tenant-scopé"
      - "RunLog (Check) écrit par exécution"
      - "Aucune règle fiscale inventée ; frontières via Contracts (NetArchTest)"
      - "Tests d'intégration CHECK (Testcontainer Postgres)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP01c:
    title: "Pipeline — SEND (job par tenant, PRE-SEND anti-doublon, envoi PA)"
    description: |
      SEND : job planifié PAR TENANT (mécanique TenantJobRunner/ITenantJob de SOL06, JAMAIS de boucle
      multi-tenant maison) + déclenchable par API02 (send/send-all).
      1. SendTenantJob (ITenantJob) + fan-out (IJobHandler) + trigger. « Un seul job send/sync par
         tenant à la fois » = garanti par l'ordonnanceur (pas de mutex maison). Planification cron =
         geste opérateur.
      2. PRE-SEND anti-doublon : pour tout document resté Sending (crash) ET avant tout retry d'un
         TechnicalError → GetPotentiallySentDocumentsAsync (TRK03) + IPaClient.GetDocumentStatusAsync →
         si la PA connaît le document : MarkIssuedAsync SANS renvoyer (anti-doublon inter-traitement).
         Les Sending sont repris dès le 1er cycle après redémarrage (pas d'attente d'un déclencheur).
      3. Diagnostic PA (F04 §3.1, piège « Transport not available ») : avant envoi, vérifier SIREN
         publié + tax_report_setting actif (IPaClient Get/EnsureTaxReportSetting) ; si non : alerte
         Warning + documents maintenus ReadyToSend avec motif explicite, JAMAIS d'envoi à l'aveugle.
      4. ENVOI : pivot relu depuis le staging (PIP00) → résolution du plug-in PA du tenant →
         IPaClient.SendDocumentAsync → succès : MarkIssuedAsync + IArchiveService.
         ArchiveIssuedDocumentAsync (TRK05) PUIS — paquet WORM CONFIRMÉ présent
         (IArchiveStore.ExistsAsync) — purge du staging (subordonnée au WORM, JAMAIS à l'étiquette
         Issued seule, ADR-0014) ; errors[] → MarkRejectedByPaAsync (staging CONSERVÉ — pas en WORM) ;
         réseau → MarkTechnicalErrorAsync.
      5. Dry-run : « tout sauf écritures PA », vérifié par le journal d'appels du FakePaClient.
      6. RunLog (Send) écrit à chaque exécution. Le pipeline ne référence JAMAIS un plug-in PA concret
         (NetArchTest) ; comportement piloté par les capacités, jamais par if (pa is ...).
    acceptance:
      - "SEND par tenant via TenantJobRunner (SOL06) — aucune boucle multi-tenant locale ; un seul job send/sync par tenant (testé)"
      - "PRE-SEND : anti-doublon inter-traitement (timeout au N, vérification PA au N+1) ; reprise des Sending dès le 1er cycle après redémarrage (testé)"
      - "Diagnostic SIREN publié / tax_report_setting actif : non publié = Warning + aucun envoi (testé)"
      - "Envoi : pivot relu du staging → IPaClient.SendDocumentAsync → Issued + archive TRK05 ; RejectedByPa (staging conservé) ; TechnicalError (testé avec FakePaClient)"
      - "Purge du staging subordonnée à la présence EFFECTIVE du paquet WORM (IArchiveStore.ExistsAsync), jamais à l'étiquette Issued (testé : entre transition Issued et écriture TRK05 = staging conservé)"
      - "Dry-run n'effectue aucune écriture PA (journal FakePaClient)"
      - "Montants en decimal, aucun float ; le pipeline ne référence aucun plug-in PA concret (NetArchTest)"
      - "RunLog (Send) écrit ; tenant-scopé"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP01d:
    title: "Pipeline — SYNC + point de statut agent + affinage dédoublonnage (ADR-0012/0014)"
    description: |
      Dernier maillon du pipeline cœur.
      1. SYNC (ITenantJob planifié) : pour chaque Issued du tenant → tax report manquant →
         IPaClient.ListTaxReportsAsync → IArchiveService.AddAddendumAsync (xml_base64) SI
         PaCapabilities.SupportsTaxReportRetrieval ; facture PA manquante → GetGeneratedDocumentAsync →
         addendum SI SupportsDocumentRetrieval. Piloté par capacités, jamais par if (pa is ...).
      2. POINT DE STATUT AGENT (ADR-0012/0014) : GET /api/agent/v1/documents/status (Host AgentApi,
         auth + tenant par AgentApiAuthenticationFilter), clé (source_reference, payload_hash), lecture
         seule, tenant-scopé. Sémantique : Processed = un Document existe pour la clé (Detected ET
         AU-DELÀ, Issued INCLUS — invariant happened-before : le staging a été écrit AVANT l'événement ;
         PAS un contrôle de présence vive du staging, purgé à Issued → un Issued répond TOUJOURS
         Processed, jamais Pending) ; Pending = clé inconnue / reçue non confirmée. CONTRAT 404 : clé
         inconnue sur la route EXISTANTE = 200 + Pending, JAMAIS 404 (404 réservé à une route absente)
         — hygiène de contrat, PAS le mécanisme anti-perte. Rejected = payload non conforme à l'intake :
         l'agent l'apprend par le 400 SYNCHRONE au push (l'intake ne persiste rien pour un rejet), PAS
         par le point de statut ; la valeur Rejected reste dans le DTO (forward-compat). NE PAS inventer
         une persistance d'intake-rejet sans la sourcer.
      3. AFFINAGE DÉDOUBLONNAGE (TODO(ADR-0012), IngestDocumentBatchHandler) : un renvoi d'un document
         REÇU MAIS NON RANGÉ (received_documents existe, Document absent) doit RE-TENTER le rangement
         (idempotent sur DocumentId/payload_hash) au lieu d'être écarté en `duplicate`. C'est CE point
         qui ferme la perte silencieuse côté plateforme. NE PAS rendre l'intake best-effort bloquant
         (ré-introduirait le risque d'orphelin — prérequis TRK02). Distinguer Duplicate (déjà rangé,
         terminal) vs RetryRanging (reçu non rangé).
      4. RunLog (Sync) écrit à chaque exécution.
      5. TEST E2E de bout en bout (Pipeline/Tests.Integration, Testcontainer Postgres, 2 tenants =
         2 bases, câblage direct staging + Documents + ITvaMappingService + IValidationService +
         IArchiveService + FakePaClient) : golden files contrat-v1 → ingestion → CHECK → SEND (Fake) →
         SYNC → archive.
    acceptance:
      - "SYNC récupère tax reports + facture PA vers l'archive selon les capacités (testé avec/sans capacités)"
      - "Point de statut GET /documents/status : Processed = état durable du Document (Issued inclus, staging purgé) — un Issued répond toujours Processed jamais Pending (testé) ; tenant-scopé, lecture seule"
      - "Contrat 404 : clé inconnue sur la route existante = 200 + Pending, jamais 404 (404 réservé à une route absente) — hygiène de contrat, pas la garantie no-loss (testé)"
      - "Dédoublonnage affiné (ADR-0012) : un renvoi d'un document reçu mais non rangé RE-TENTE le rangement (idempotent), jamais écarté en duplicate (testé : intake échoué puis renvoi = document rangé, pas perdu)"
      - "Intake non rendu bloquant (risque d'orphelin évité) ; DocumentEvent / registre received_documents restent append-only"
      - "RunLog (Sync) écrit ; le pipeline ne référence aucun plug-in PA concret (NetArchTest)"
      - "Test E2E : golden files PIV03 → ingestion → check → send Fake → sync → archive, 2 tenants (vert)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIP02:
    title: "Pipeline des avoirs (F07)"
    description: |
      Implémenter le traitement des avoirs selon F07 :
      1. Ordre de traitement chronologique : un avoir n'est envoyé qu'après sa facture d'origine.
         - facture d'origine trouvée dans le tenant + déjà émise → CreditNoteRef renseigné → envoi
         - facture trouvée mais PAS encore émise → traiter l'original d'abord (réordonnancement)
         - facture introuvable → Blocked « facture d'origine inconnue » (avoir orphelin)
      2. Cas limites : avoir partiel (lignes de la part annulée), avoir groupé (CreditNoteRefs
         multi-références), avoir orphelin (bloqué, pas de référence fabriquée — résolution
         par l'opérateur via resolve-manually API02).
      3. Le mapping TVA d'un avoir est identique à celui de l'original, montants positifs
         (le type 381 porte la sémantique crédit).
      4. Si le PA ne déclare pas SupportsCreditNotes : les avoirs restent en ReadyToSend avec
         le statut « en attente : capacité avoirs non disponible chez <PA> » — jamais perdus,
         jamais bloquants pour le reste du traitement.
    acceptance:
      - "Avoir envoyé seulement après émission de sa facture d'origine"
      - "Réordonnancement automatique quand l'original est dans le même traitement"
      - "Avoir orphelin bloqué, jamais envoyé"
      - "PA sans capacité avoirs : mise en attente propre, pas de blocage du traitement"
      - "Tests : avoir simple, avoir groupé, avoir orphelin, avoir avant facture, PA sans capacité"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  # PIP03 re-découpé en PIP03a/PIP03b (2026-06-06, décision opérateur, après blocage fiscal de PIP03 —
  # session-log orch-20260606-050619-s55900_PIP03.md). PIP03 exigeait des règles fiscales NON SOURCÉES
  # (cadence reportingFrequency : F12-A §3.3/§9 « à trancher » ; découpage Mixte frais/adjudication :
  # ADR-0004/F03 §2.3, non sourcé) + une décision d'archi (ventilation TVA purgée au staging après Issued,
  # non requêtable à l'heure du job — ADR-0015). CLAUDE.md n°2 : ne jamais deviner. Découplé pour ne pas
  # geler tout l'aval (console-web/toolkit/CMP) derrière des décisions fiscales. Le découpage suit le
  # scénario (b) de F09 §4 : « on développe l'extraction + l'agrégation en V1, seul l'ENVOI est conditionné ».
  #   PIP03a = agrégation + snapshot requêtable + sémantique de suspension (générique, AUCUNE règle inventée,
  #            SUR le chemin critique) ; PIP03b = fenêtrage de période + Mixte + envoi réel (fast-follow GELÉ
  #            sur D-a/D-b sourcées + capacité B2Brouter « Encaissée », HORS chemin critique).

  PIP03a:
    title: "E-reporting de paiement — agrégation requêtable + suspension (générique, ADR-0015)"
    description: |
      Partie CONSTRUCTIBLE et 100 % GÉNÉRIQUE de l'e-reporting de paiement (F09) : aucune règle fiscale
      inventée, aucune donnée client dans le code. Construit l'extraction/agrégation que F09 §4 scénario (b)
      demande de livrer en V1 quoi qu'il arrive — l'ENVOI (fenêtrage de période + Mixte) est PIP03b.
      1. CAPTURE DE LA VENTILATION (ADR-0015, résout le trou d'archi) : au CHECK (PIP01b), persister un
         SNAPSHOT de la ventilation TVA SOURCÉE du document (lignes {Rate, TaxableBase HT, VatAmount} en
         decimal + mapping_version + operationCategory) dans une table tenant-scopée, requêtable,
         APPEND-ONLY, DISTINCTE du staging (purgé après Issued, ADR-0014) et du coffre WORM (immuable). Le
         snapshot ne porte QUE la sortie du mapping validé (aucune dérivation) et SURVIT à la purge du
         staging → l'agrégation post-émission peut décomposer un paiement par taux à partir de données
         requêtables. Écriture additive et idempotente (clé document_id + mapping_version).
      2. PaymentAggregator : Payments du tenant (poussés par l'agent — PIV01/TRK04) agrégés par JOUR × TAUX
         de TVA (l'obligation DGFiP est un agrégé jour×taux au niveau SIREN, pas un lettrage ligne à ligne),
         à partir du snapshot ADR-0015. Job planifié PAR TENANT (mécanique TenantJobRunner/ITenantJob de
         SOL06, JAMAIS de boucle multi-tenant maison). Le FENÊTRAGE en période déclarative (décade/mois/
         bimestre) N'EST PAS fait ici (exige la cadence D-a non tranchée) → PIP03b.
      3. CHAMP FeeImputationMethod (ajout à FiscalSettings/CFG02) : Prorata | AgregationJourTaux | null.
         La MÉTHODE est un paramètre (F09 §5.2, deux options non tranchées), JAMAIS une règle codée. Null =
         agrégation des paiements concernés SUSPENDUE avec le motif « Méthode d'imputation des frais non
         renseignée — consultez votre expert-comptable ». JAMAIS de prorata par défaut. (V1 : la nullabilité
         suffit, même mécanique de sûreté que les autres paramètres fiscaux — INV-TENANTSETTINGS ; un
         workflow de validation dédié « validated_by/date » comme la table TVA n'est PAS requis ici, et serait
         de toute façon indistinguable tant que D-b n'est pas tranchée.)
      4. PARAMÉTRAGE FISCAL DU TENANT (F12-A §3 — décisions de l'expert-comptable, le produit supporte les
         deux réponses, JAMAIS de valeur devinée ; `null = suspension`) :
         - vatOnDebits (bool?) : true ⇒ exigibilité à la facturation ⇒ PAS d'e-reporting de paiement dû ;
           le moteur calcule quand même les agrégats (traçabilité) et les marque « non requis — TVA sur les
           débits ». false ⇒ e-reporting dû. null ⇒ suspension.
         - operationCategory : Mixte ⇒ part frais soumise à l'e-reporting de paiement, MAIS le découpage
           frais/adjudication n'est PAS sourcé (D-b) ⇒ pour PIP03a un document Mixte est SUSPENDU (motif
           explicite). Seuls les documents MONO-CATÉGORIE (la ventilation par taux du snapshot est
           directement utilisable) sont agrégés en PIP03a.
         - reportingFrequency : consommé par le FENÊTRAGE (PIP03b) ; null ⇒ pas d'échéance + suspension.
         Tout paramètre null = agrégats calculés mais transmission suspendue + message opérateur explicite
         (n° de tenant + action corrective, CLAUDE.md n°12).
      5. CAS LIMITES (agrégat jour) : paiement partiel (imputé à sa date), trop-perçu/remboursement (montant
         négatif dans l'agrégat du jour), règlement sans rattachement bordereau (alerte Warning).
      6. CAPACITÉ PA ABSENTE : les agrégats sont calculés, persistés et affichés « En attente : la plateforme
         <nom> ne supporte pas encore la transmission des paiements ». Aucun envoi ici (l'envoi réel est
         PIP03b). Piloté par les capacités déclarées, JAMAIS par if (pa is ...).
      7. Tests avec le plug-in Fake (les deux modes de capacité) ET les combinaisons de paramétrage fiscal.
      AUCUN ENVOI, AUCUN FENÊTRAGE DE PÉRIODE ICI (PIP03b). Montants en decimal, aucun float. Frontières via
      Contracts (NetArchTest). Le pipeline ne référence aucun plug-in PA concret.
    acceptance:
