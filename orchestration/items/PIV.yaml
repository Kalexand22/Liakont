# Lot PIV — Modèle pivot & contrat d'extraction (F01-F02)
# Spec : docs/conception/F01-F02-Modele-Pivot-Contrat-Extraction.md
# Le pivot est la représentation interne neutre des documents, alignée EN 16931.

items:
  PIV01:
    title: "Modèle pivot : documents, lignes, taxes, tiers, totaux"
    description: |
      Implémenter le modèle pivot dans Gateway.Core/Pivot/ selon F01-F02 :
      1. PivotDocument : type (Invoice/CreditNote), numéro, date, devise, émetteur (PivotParty),
         destinataire (PivotParty), lignes (List<PivotLine>), totaux (PivotTotals),
         OperationCategory (LivraisonBiens/PrestationServices/Mixte), SourceReference,
         CreditNoteRefs (List<string> — multi-références pour avoirs groupés), SourceData (JSON brut).
      2. PivotLine : description, montant HT, quantité, régime TVA source brut (string),
         taxe calculée (PivotLineTax), SourceData.
      3. PivotLineTax : catégorie UNCL5305 (S/AA/AAA/Z/E/AE/G/K/O), taux %, montant TVA,
         code VATEX (nullable), MappingTrace (référence règle appliquée).
      4. PivotParty : nom, SIREN, SIRET, n° TVA intracommunautaire, adresse, pays ISO 3166-1 alpha-2,
         IsCompanyHint (bool — heuristique professionnel).
      5. PivotTotals : total HT, total TVA, total TTC, totaux source bruts.
      Règles non négociables (F01) :
      - Tous les montants en decimal, arrondis 2 décimales (half-up), originaux conservés dans SourceData
      - Le pivot ne calcule RIEN : il porte les montants calculés par la source
      - Tout champ absent = null, jamais de valeur devinée
      - Types immutables (readonly), constructeurs validants
    acceptance:
      - "PivotDocument, PivotLine, PivotLineTax, PivotParty, PivotTotals dans Conformat.Gateway.Core.Pivot"
      - "Montants en decimal partout, aucun float/double"
      - "Catégories TVA = enum ou type contraint UNCL5305"
      - "Tests unitaires : construction, immutabilité, arrondis"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIV02:
    title: "Modèle pivot paiements (e-reporting)"
    description: |
      Implémenter les types de paiement dans Gateway.Core/Pivot/ selon F09 :
      1. PivotPayment : PaymentDate, Amount (decimal), Method, RelatedDocumentNumber, SourceReference.
      2. PaymentReportPeriod : Date, Rate (taux TVA), TotalCollectedTaxableBase, TotalCollectedVat, State.
         C'est l'agrégat jour×taux exigé par la DGFiP (Flux 10.4) — pas de données nominatives.
      Mêmes règles que PIV01 : decimal, immutabilité, null si absent.
    acceptance:
      - "PivotPayment et PaymentReportPeriod dans Conformat.Gateway.Core.Pivot"
      - "Aucune donnée nominative client dans PaymentReportPeriod"
      - "Tests unitaires de construction et d'arrondi"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIV03:
    title: "Contrat d'extraction IExtractor + pièces jointes source"
    description: |
      Définir le contrat universel des adaptateurs dans Gateway.Core/Pivot/ selon F02 :
      1. IExtractor :
         - HealthCheckResult CheckHealth()
         - IEnumerable<PivotDocument> ExtractDocuments(DateTime from, DateTime to)  (streaming, [from, to[)
         - IEnumerable<PivotPayment> ExtractPayments(DateTime from, DateTime to)
         - IReadOnlyList<SourceTaxRegime> ListSourceTaxRegimes()
         - ExtractorCapabilities Capabilities { get; }
         - IReadOnlyList<SourceAttachment> GetAttachments(string sourceReference)
           (vide si la capacité n'est pas déclarée)
      2. ExtractorCapabilities : ProvidesSourceDocuments (bool) — l'adaptateur sait-il fournir
         les documents émis par le logiciel source (bordereaux PDF) ?
         Même principe que PaCapabilities : capacité déclarée, comportement adapté, jamais d'exception.
      3. SourceAttachment : FileName, MimeType, Content (byte[]), Origin (description de la
         provenance : table/blob ou chemin fichier). Destiné au coffre d'archive (TRK06).
      4. HealthCheckResult : IsHealthy, Message (français opérateur), Details.
      5. SourceTaxRegime : code source brut, libellé source, occurrences.
      Le contrat est LA frontière produit/adaptateur : le Core ne connaît jamais le schéma source.
    acceptance:
      - "IExtractor, ExtractorCapabilities, SourceAttachment, HealthCheckResult, SourceTaxRegime dans Conformat.Gateway.Core.Pivot"
      - "Extraction en streaming (IEnumerable, pas de List matérialisée)"
      - "Capacité ProvidesSourceDocuments : adaptateur sans capacité = liste vide, jamais d'exception"
      - "Aucune référence à un schéma source spécifique dans le Core"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIV04:
    title: "Sérialisation JSON canonique + hash anti-doublon"
    description: |
      Implémenter dans Gateway.Core/Pivot/ :
      1. Sérialisation JSON canonique du pivot (Newtonsoft.Json) : ordre des propriétés stable,
         culture invariante, dates ISO 8601, decimals sans perte.
      2. PayloadHasher : SHA-256 du JSON canonique → string hex. Utilisé pour l'anti-doublon (F06)
         et la détection d'altération de la donnée source après envoi.
      3. Round-trip sans perte : désérialiser(sérialiser(doc)) == doc.
    acceptance:
      - "Sérialisation canonique stable (deux sérialisations du même objet = même string)"
      - "PayloadHasher produit un SHA-256 hex de 64 caractères"
      - "Test de round-trip sans perte sur un document complet (avoir + lignes + taxes)"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"

  PIV05:
    title: "FixtureExtractor générique + jeu de fixtures"
    description: |
      Implémenter un IExtractor qui rejoue des fixtures JSON (F02 — mode dev sans licence) :
      1. FixtureExtractor : charge un dossier de fixtures JSON (documents, paiements, régimes TVA)
         et les sert via IExtractor. Aucune dépendance ODBC.
      2. Jeu de fixtures de test dans tests/fixtures/ : au moins 5 bordereaux représentatifs
         (cas normal 20%, cas marge E+VATEX-EU-J, avoir lié, acheteur professionnel,
         document avec encaissements), construits à partir des exemples de docs/conception/.
      3. Tests : FixtureExtractor lit les fixtures et produit des PivotDocument valides.
      Le FixtureExtractor sert : dev sans licence Pervasive, démos hors site, tests unitaires.
    acceptance:
      - "FixtureExtractor implémente IExtractor sans dépendance ODBC"
      - "Au moins 5 fixtures couvrant : 20% normal, marge/VATEX, avoir, pro B2B, encaissements"
      - "Tests verts sur le chargement et l'extraction des fixtures"
      - "verify-fast passes"
      - "codex-review clean or only accepted P2s"
