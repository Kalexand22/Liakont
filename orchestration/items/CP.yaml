  GATE_CHORUS_PRO:
    type: gate
    executor: human
    title: "Gate (humaine) : recette de l'adaptateur Chorus Pro (lot CP)"
    description: |
      Recette humaine du lot CP. Vérifie EN RÉEL (qualif PISTE / Chorus Pro sandbox) :
        - parcours dépôt deposerFluxFacture → PaSendState.Sending (JAMAIS Issued au dépôt) → consulterCR →
          Issued UNIQUEMENT sur Intégré ;
        - aucun re-POST sur timeout (pas de double dépôt) ;
        - secrets chiffrés au repos, AUCUN credential (cpro-account/Authorization) dans les logs ;
        - endpoints *.piste.gouv.fr ; constantes tracées dans docs/conception/F18 ;
        - capacités correctes (e-reporting = false → résultat typé).
      PRÉREQUIS : PR-PIPE (support PaSendState.Sending au pipeline) mergé pour l'envoi RÉEL/e2e ; sinon
      recette limitée au niveau plug-in (sandbox/mock), à documenter. Réf : tasks/plan-chorus-pro.md §6 DoD.
    acceptance:
      - "Parcours qualif dépôt→Sending→Intégré→Issued démontré en réel (ou sandbox plug-in si PR-PIPE non mergé, documenté)"
      - "Aucun double dépôt sur timeout ; aucun credential loggé ; secrets chiffrés"
      - "verify-fast + tests + codex-review verts sur l'ensemble du lot CP"
