# Liakont — Work Manifest (active items only)
# Archives : orchestration/archive/
# Détail des items : orchestration/items/<lot>.yaml
# Conventions : voir MANIFEST-CONVENTIONS.md dans ce répertoire
#
# Defaults (omettre quand la valeur correspond) :
#   type: work | executor: claude | blueprint: module-work-item

meta:
  project: liakont-gateway
  phase: 1
  # version 7 = backlog v6 (pivot plateforme+agent) corrigé après les reviews indépendantes
  # v6/v8 du 2026-06-03 (voir tasks/review-independante-v6-v8-reponses.md)
  # version 8 = + OPS08 (installateur GUI agent + profils intégrateur, F13)
  # version 9 = gates d'intégration AUTOMATIQUES (SOCLE, CORE_FOUNDATION, PA_FRAMEWORK,
  #   PIPELINE, ADAPTER_ENCHERESV6) : blueprint auto-gate-item, merge auto vers main sur vert
  #   (verify + tests + review d'intégration). Gates HUMAINES conservées là où un test réel
  #   peut révéler du structurel : AGENT, PA_B2BROUTER, PA_SUPERPDP, CONSOLE_WEB, TOOLKIT,
  #   DEMO_ISATECH, PROD_CMP. Le test ODBC réel EncheresV6 est porté par DEMO_ISATECH (serveur
  #   dédié), pas par ADAPTER (fixtures only).
  # version 10 = GATE_SOCLE repassée HUMAINE (cas PONCTUEL) : la review d'intégration -Base main
  #   du segment socle dépasse 1M tokens (tout le socle Stratum vendored dans le diff). Aucun
  #   segment ultérieur n'a autant à reviewer ; le socle vendored est considéré OK (reviewé à
  #   l'origine, hors périmètre CLAUDE.md/SOL01). La gate humaine valide l'ADAPTATION Liakont +
  #   merge. Auto-gates restantes : CORE_FOUNDATION, PA_FRAMEWORK, PIPELINE, ADAPTER_ENCHERESV6.
  # version 11 = FIN des gates AUTO (décision opérateur 2026-06-05) : toute gate de SEGMENT devient
  #   HUMAINE (executor: human). La gate « auto qui merge dans main » contredisait la barrière
  #   Claude Code ET la règle CLAUDE.md « human merge mandatory » → elle dégradait systématiquement
  #   en `blocked` à l'étape merge. Désormais : le runner fait les checks + ouvre la PR (la CI rejoue
  #   verify+tests sur la PR), l'humain merge, et tools/orch-reconcile-gates.ps1 bascule la gate à
  #   `done` sur PR mergée (protocol.md Step 1.4). GATE_PIPELINE + GATE_ADAPTER_ENCHERESV6 passent à
  #   executor: human. Le blueprint auto-gate-item n'est plus utilisé par aucune gate ENCORE ACTIVE :
  #   seules GATE_CORE_FOUNDATION et GATE_PA_FRAMEWORK le portent encore, mais elles sont déjà `done`
  #   (terminales, ne re-tourneront pas). Ne pas le câbler sur une nouvelle gate. GATE_SOCLE déjà humaine.
  # version 12 = re-découpage PIP03 (décision opérateur 2026-06-06, après blocage fiscal de PIP03). PIP03
  #   (e-reporting de paiement F09) exigeait des règles fiscales non sourcées (cadence reportingFrequency,
  #   découpage Mixte frais/adjudication) + une décision d'archi (capture de la ventilation purgée au
  #   staging) — il bloquait TOUT l'aval (console-web/toolkit/CMP). Découplé : PIP03a = partie constructible
  #   et 100% générique (ADR-0015 capture ventilation + agrégation mono-catégorie + suspension + chemin Fake),
  #   SUR le chemin critique ; PIP03b = fast-follow GELÉ (cadence sourcée D-a, Mixte sourcé D-b, envoi réel
  #   conditionné à la capacité B2Brouter « Encaissée »), HORS chemin critique (pas une dépendance de gate).
  # version 13 = re-découpage API01 et SUP01 (décision opérateur 2026-06-07, après blocage « mal dimensionné »
  #   du runner sur ces 2 bootstraps de console-web). API01 (harness HTTP + 3 projets Web en une session)
  #   → API01a (harness + Documents.Web), API01b (Pipeline + Payments.Web), API01c (TenantSettings.Web).
  #   SUP01 (module Supervision entier) → SUP01a (scaffold + entité Alert + dead-man's-switch), SUP01b (8 règles).
  #   Recâblage (les sous-items API ne fournissent plus TOUTES les lectures transitivement) :
  #   API04→[API01a,API01c] ; WEB01→[API01a,API01c] ; WEB04 +API01b ; WEB06 +API01b ; SUP02→SUP01a ; SUP03→SUP01b.
  # version 14 = pré-découpage proactif des items console-web « trop gros » (audit 2026-06-07, avant blocage runner) :
  #   API02 (7 actions, 2 modules) → API02a (envoi) / API02b (verdict+recheck) / API02c (resolve-manually+supersede) ;
  #   WEB03 (4 onglets + 5 actions) → WEB03a (lecture) / WEB03b (verdict+recheck) / WEB03c (résolution) ;
  #   WEB04 (2 pages) → WEB04a (journal) / WEB04b (paramétrage lecture) ; WEB07 (table TVA éditable) → WEB07a (vue+validation) / WEB07b (édition).
  #   Recâblage : WEB05→API02a ; WEB07a→[WEB04b,API04] ; GATE_CONSOLE_WEB → {WEB03b,WEB03c,WEB04a,WEB07b}.
  # version 15 = déblocage console-web (décisions opérateur 2026-06-08, 4 blocages résolus sans inventer de règle) :
  #   API01c → cœur /settings (capacités agent retirées) + API01d (fast-follow GELÉ : read-model capacités à sourcer) ;
  #   API02a → ADR-0016 job tenant-scope (TenantJobRunner SOL06, send-all tenant-courant, aucun fan-out cross-tenant) ;
  #   API05 → alignement F12 (invalidation immédiate, fenêtre de recouvrement retirée) ;
  #   SUP01b → 3 règles constructibles + SUP01c (fast-follow GELÉ : 5 règles sans producteur, rompt la circularité OPS07).
  #   API01d et SUP01c sont HORS gate (fast-follow gelés, comme PIP03b). Restent opérateur/externe : PAS02 (sandbox), PIP03b (fiscal).
  # version 16 = pré-découpage proactif des 3 bootstraps toolkit « trop gros » (audit 2026-06-07) :
  #   OPS01 (appliance from-scratch + restauration + ADR) → OPS01a (appliance) / OPS01b (sauvegarde+PRA) / OPS01c (ADR IdP) ;
  #   OPS06 (3 sous-systèmes) → OPS06a (export tenant) / OPS06b (migration instance) / OPS06c (fin de vie D7) ;
  #   OPS08 (installeur WinForms) → OPS08a (projet+moteur profil) / OPS08b (wizard GUI) / OPS08c (packaging multi-profils).
  #   Recâblage : OPS02→OPS01a ; DOC01→[OPS01a,OPS05] ; GATE_TOOLKIT → {OPS01c, OPS06b, OPS06c, OPS08c} (+ OPS03/04/07/BRD/DOC inchangés).
  # version 17 = nouvel item IDN01 (lot IDN, segment console-web) : pont rôle→permission sous OIDC
  #   (ADR-0017). Trou structurel révélé par le blocage de WEB05 (E2E opérateur : éléments
  #   permission-gated masqués car AUCUN claim "permission" n'est posé sous OIDC ; les E2E
  #   antérieurs passaient en super-admin, qui court-circuite la garde). IDN01 projette les rôles
  #   realm Keycloak → claims "permission" depuis la matrice §3 de identity-permissions-liakont.md
  #   (aucune règle inventée). Recâblage : WEB05 +IDN01 (déblocage réel) ; GATE_CONSOLE_WEB +IDN01
  #   (le segment n'est pas « done » tant que le permission-gating ne marche pas sous OIDC).
  # version 18 = lot FIX (recette humaine GATE_CONSOLE_WEB du 2026-06-10/11, 19 findings dans
  #   $ORCH_REPO/bug-inbox.jsonl) : FIX01a-d (provisioning OPS03 jamais câblé : profil tenant,
  #   table TVA, comptes PA, plug-in Fake), FIX02 (audit recheck), FIX03 (vertical enchères),
  #   FIX04-07 (P2 console/pipeline/dev-ex). Décisions opérateur D1-D7 inscrites dans items/FIX.yaml.
  #   Recâblage : GATE_CONSOLE_WEB += {FIX01a, FIX01b, FIX01c, FIX01d, FIX02, FIX03} (P1 bloquants
  #   de gate ; les P2 du lot restent hors gate).
  # version 19 = lot FIX2 (recette humaine run 2 du 2026-06-11, env vierge, 22 findings dans
  #   $ORCH_REPO/bug-inbox.jsonl) : FIX201 (P1 : publication SIREN/PA jamais câblée — l'envoi reste
  #   inexerçable), FIX202-FIX211 (P2 : feedback envoi, seed/bring-up dev, vocabulaire Composante +
  #   diff audit TVA, lignes visibles, refresh/export listes, actions en masse, exports archive,
  #   nav socle assainie, dispositif d'alerte visible, admin jobs utilisable), FIX212 (évolution :
  #   matrice de routage des alertes). Décisions opérateur E1-E8 inscrites dans items/FIX2.yaml.
  #   Recâblage : GATE_CONSOLE_WEB += {FIX201} (seul P1 ; les P2 restent hors gate).
  # version 20 = GATE_CONSOLE_WEB VALIDÉE (run 3 du 2026-06-11 : envoi bout-en-bout exercé, 0 P1,
  #   PR #38 mergée) + lot FIX3 dans un NOUVEAU segment console-polish (feat/console-polish, base
  #   main — la branche feat/console-web est consommée par le merge). Passe ergonomie post-gate :
  #   FIX301 (paramètres fiscaux éditables — e-reporting encaissements activable sans SQL),
  #   FIX302 (actions en masse : sélection servie, action globale, compteurs), FIX303 (section nav
  #   AUDIT masquée), FIX304 (seeds committés cohérents), FIX305 (acteur nommé dans l'audit),
  #   FIX306 (layout du shell). Décisions opérateur F1-F7 inscrites dans items/FIX3.yaml ; la
  #   « grande passe ergonomie » écran par écran est portée par la GATE humaine CONSOLE_POLISH
  #   (re-recette), pas par un item de dev — elle re-validera aussi les livrables FIX2 jamais vus
  #   à l'écran au run 3 (FIX205/206/208/211, témoin de vie, re-stage).
  # version 21 = lot EXT dans un NOUVEAU segment pivot-duedate (feat/pivot-duedate, base main,
  #   dépend de GATE_PA_SUPERPDP : le builder Super PDP modifié par le correctif 87c7bc0 arrive sur
  #   main par le merge de la PR #41). EXT01 : date d'échéance de paiement (EN 16931 BT-9) portée
  #   par le pivot de bout en bout — lève la limitation F14 §12 O11 (BR-CO-25 constatée en sandbox
  #   le 2026-06-12 : un montant dû positif exige BT-9/BT-20, que le pivot ne porte pas ; seules
  #   les factures soldées sont émissibles via Super PDP). Spec d'abord (F01-F02), contrat additif
  #   (hash canonique inchangé pour les documents sans échéance), adaptateur sans invention.
  #   Décision opérateur (Karl, 2026-06-12) inscrite en tête d'items/EXT.yaml.
  # version 22 = nouveau segment realm-unique + lot RLM (ADR-0021) : pivot vers un realm Keycloak
  #   UNIQUE partagé, isolation des tenants par claim company_id (recette OPS03 — un user de tenant
  #   provisionné ne pouvait pas se connecter). 5 items RLM01→05 + GATE_REALM_UNIQUE (humaine).
  #   Segment sur feat/tenant-provisioning (RLM bâtit sur le lot A OPS03, pas encore sur main) ;
  #   depends_on_gate GATE_CONSOLE_WEB. RLM05 (brokering SSO) = fast-follow HORS gate (creds opérateur).
  # version 23 = lot RLF (Realm-unique Follow-ups) : findings consignés à la recette de
  #   GATE_REALM_UNIQUE (2026-06-15), hors périmètre du correctif de gate (F1/F2/F6 livrés, PR #46).
  #   6 items RLF01→06 (seed dev tenant2, faux-vert migration socle, gating nav opérateur, super-admin
  #   cross-tenant [design], 2FA realm-level, câblage prod appliance). Backlog « à faire », non rattaché
  #   à un segment/gate (à planifier). Détails : tasks/recette-gate-realm-unique.md + items/RLF.yaml.
  # version 24 = PLANIFICATION du lot RLF : nouveau segment `realm-followup` (branche feat/realm-followup
  #   sur main), gate humaine GATE_REALM_FOLLOWUP (recette des 6 correctifs RLF), depends_on_gate
  #   GATE_REALM_UNIQUE. ⚠️ À SEEDER dans $ORCH_REPO/state.yaml APRÈS merge de cette PR (segment sur main
  #   d'abord) : RLF01→RLF06 ET GATE_REALM_FOLLOWUP en `pending` (une gate non seedée = traitée « done »
  #   → recette jamais ouverte), PLUS GATE_REALM_UNIQUE → `done` (orch-reconcile ne le fait pas : titre de
  #   PR #46 hors contrat). Transaction FIX3-style.
  # version 25 = nouveau segment `facturx` + lot FX (spec F16, ADR-0023) : génération Factur-X (PDF/A-3 +
  #   CII) côté plateforme + PA générique (email/dépôt fichier) = niveau « Essentiel ». FX02→FX07 + FXG,
  #   gate humaine GATE_FACTURX, depends_on_gate [GATE_PIPELINE, GATE_CONSOLE_WEB, GATE_PIVOT_DUEDATE].
  #   ⚠️ À SEEDER dans $ORCH_REPO/state.yaml APRÈS merge (FX02..FX07, FXG, GATE_FACTURX en `pending` ;
  #   FX02 éligible). Transaction RLF-style (slots null).
  version: 25
  host: multi_agent_v1

