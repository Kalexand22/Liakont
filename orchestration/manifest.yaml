  #   GATE_CONSOLE_WEB] (tous done ; code touché déjà sur main). ⚠️ À SEEDER dans $ORCH_REPO/state.yaml
  #   APRÈS merge : RD401→RD409 + GATE_REDLINE_ADR4 en `pending` (tous éligibles sauf RD403 qui dep RD401).
  #   Détails + verdicts : tasks/redline-adr-0004.md + items/RD4.yaml.
  # version 33 = merge du 3e redline parallèle (anticipé par v31) : segment `adr-redline` + lot RDL —
  #   findings CONFIRMÉS de la revue critique des ADR-0005/0006/0007 et descendance (Karl, 2026-06-19 ;
  #   vérification adversariale : 57 findings → 43 confirmés + 2 arbitrages, 12 réfutés). 13 items RDL01→RDL13
  #   + GATE_ADR_REDLINE (humaine). Bande 98xx (distincte de RDF 99xx et RD4 10000 ; ids/segment/gate distincts
  #   pour coexister, cf. v31). Segment sur feat/adr-redline (base main — fixes sur du code DÉJÀ sur main),
  #   pas de depends_on_gate. 2 P1 : RDL01 (enum canonique gardé/rejet + binding strict) ; RDL06 (4 fan-out
  #   Pipeline indispatchables : SyncAll/AggregatePaymentsAll/RectifyReportsAll en AddScoped au lieu
  #   d'AddJobHandler → SYNC/AGGREGATE/RECTIFY ne tournent JAMAIS). Dépendances internes : RDL03→RDL01,
  #   RDL04→RDL02, RDL05→RDL01, RDL07→RDL09, RDL08→RDL07 (RDL09 répare la contradiction baseline↔provenance
  #   AVANT que RDL07/RDL08 n'éditent TenantJobRunner.cs, épinglé). 2 arbitrages humains : RDL05 (NFC),
  #   RDL07 (run partiel). Détail + 12 réfutés : items/RDL.yaml + tasks/redline-adr-005-006-007.md.
  #   ⚠️ À SEEDER dans $ORCH_REPO/state.yaml APRÈS merge : RDL01→RDL13 + GATE_ADR_REDLINE en `pending`
  #   (RDL01, RDL02, RDL06, RDL09, RDL10, RDL11, RDL12, RDL13 éligibles — depends_on []).
  # version 36 (2026-06-22, geste opérateur interactif) = re-split B2C-09b + dé-couplage agnostique de la
  #   forme du payload « montant de marge » (cas DGFiP n°33), suite à l'audit du blocage de B2C-09b.
  #   Constats : (1) la 2e jambe de la formule sourcée `marge = frais acheteur + frais vendeur` (F03 §2.4,
  #   GATE_B2C_SOURCING done) n'a PAS de carrier pivot (seul SellerFees/B2C-08 existe) ; (2) la forme
  #   canonique n°33 était cadrée « à confirmer auprès de B2Brouter » = couplage PA concret dans un concern
  #   produit (violation n°8/16), re-sourcée SUR LE STANDARD (DGFiP n°33 / EN 16931 ; patch doc+commentaire
  #   landé sur feat/ereporting-b2c). Re-découpage : + B2C-08c (carrier frais acheteur générique, miroir
  #   B2C-08) ; B2C-09b devient le CALCUL seul (dep += B2C-08c) ; + B2C-09c = TRANSMISSION (dep B2C-09b +
  #   GATE_B2C_SHAPE_SOURCING) ; + B2C-05b = SOURCING forme canonique n°33 (docs-spec, agent-propose/humain-
  #   valide comme B2C-05) + GATE_B2C_SHAPE_SOURCING (intra-segment, SANS PR). GATE_EREPORTING_B2C : dep
  #   B2C09b→B2C09c (couvre transitivement B2C08c + GATE_B2C_SHAPE_SOURCING). B2C-08b reste blocked (retrait
  #   = décision séparée). NB : le champ version sautait 35 (commentaire RBF01 re-split sans bump du champ).
