# Liakont — Work Manifest (active items only)
# Archives : orchestration/archive/
# Détail des items : orchestration/items/<lot>.yaml
# Conventions : voir MANIFEST-CONVENTIONS.md dans ce répertoire
#
# Defaults (omettre quand la valeur correspond) :
#   type: work | executor: claude | blueprint: module-work-item

meta:
  project: liakont-gateway
  phase: 1
  # version 7 = backlog v6 (pivot plateforme+agent) corrigé après les reviews indépendantes
  # v6/v8 du 2026-06-03 (voir tasks/review-independante-v6-v8-reponses.md)
  # version 8 = + OPS08 (installateur GUI agent + profils intégrateur, F13)
  # version 9 = gates d'intégration AUTOMATIQUES (SOCLE, CORE_FOUNDATION, PA_FRAMEWORK,
  #   PIPELINE, ADAPTER_ENCHERESV6) : blueprint auto-gate-item, merge auto vers main sur vert
  #   (verify + tests + review d'intégration). Gates HUMAINES conservées là où un test réel
  #   peut révéler du structurel : AGENT, PA_B2BROUTER, PA_SUPERPDP, CONSOLE_WEB, TOOLKIT,
  #   DEMO_ISATECH, PROD_CMP. Le test ODBC réel EncheresV6 est porté par DEMO_ISATECH (serveur
  #   dédié), pas par ADAPTER (fixtures only).
  # version 10 = GATE_SOCLE repassée HUMAINE (cas PONCTUEL) : la review d'intégration -Base main
  #   du segment socle dépasse 1M tokens (tout le socle Stratum vendored dans le diff). Aucun
  #   segment ultérieur n'a autant à reviewer ; le socle vendored est considéré OK (reviewé à
  #   l'origine, hors périmètre CLAUDE.md/SOL01). La gate humaine valide l'ADAPTATION Liakont +
  #   merge. Auto-gates restantes : CORE_FOUNDATION, PA_FRAMEWORK, PIPELINE, ADAPTER_ENCHERESV6.
  version: 10
  host: multi_agent_v1

segments:
  socle:
    branch: feat/socle-v6
    base: main
    lots: [SOL]
    gate: GATE_SOCLE

  core-foundation:
    branch: feat/core-foundation
    base: main
    lots: [PIV, TVA, VAL, TRK, CFG]
    gate: GATE_CORE_FOUNDATION
    depends_on_gate: GATE_SOCLE

  pa-framework:
    branch: feat/pa-framework
    base: main
    lots: [PAA]
    gate: GATE_PA_FRAMEWORK
    depends_on_gate: GATE_CORE_FOUNDATION

  pa-b2brouter:
    branch: feat/pa-b2brouter
    base: main
    lots: [PAB]
    gate: GATE_PA_B2BROUTER
    depends_on_gate: GATE_PA_FRAMEWORK

  pa-superpdp:
    branch: feat/pa-superpdp
    base: main
    lots: [PAS]
    gate: GATE_PA_SUPERPDP
    depends_on_gate: GATE_PA_FRAMEWORK

  pipeline:
    branch: feat/pipeline
    base: main
    lots: [PIP]
    gate: GATE_PIPELINE
    depends_on_gate: GATE_PA_FRAMEWORK

  agent:
    branch: feat/agent
    base: main
    lots: [AGT]
    gate: GATE_AGENT
    depends_on_gate: GATE_CORE_FOUNDATION

  adapter-encheresv6:
    branch: feat/adapter-encheresv6
    base: main
    lots: [ADP]
    gate: GATE_ADAPTER_ENCHERESV6
    depends_on_gate: GATE_AGENT

  console-web:
    branch: feat/console-web
    base: main
    lots: [API, WEB, SUP]
    gate: GATE_CONSOLE_WEB
    depends_on_gate: [GATE_PIPELINE, GATE_AGENT]

  deploiement-toolkit:
    branch: feat/deploiement-toolkit
    base: main
    lots: [OPS, BRD, DOC]
    gate: GATE_TOOLKIT
    depends_on_gate: [GATE_CONSOLE_WEB, GATE_PA_B2BROUTER, GATE_ADAPTER_ENCHERESV6]

  deploiement-cmp:
    branch: feat/deploiement-cmp
    base: main
    lots: [CMP]
    gate: GATE_PROD_CMP
    depends_on_gate: [GATE_TOOLKIT, GATE_ADAPTER_ENCHERESV6, GATE_PA_B2BROUTER]

