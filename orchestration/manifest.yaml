# Conformat — Work Manifest (active items only)
# Archives : orchestration/archive/
# Détail des items : orchestration/items/<lot>.yaml
# Conventions : voir MANIFEST-CONVENTIONS.md dans ce répertoire
#
# Defaults (omettre quand la valeur correspond) :
#   type: work | executor: claude | blueprint: module-work-item

meta:
  project: conformat-gateway
  phase: 1
  version: 2
  host: multi_agent_v1

segments:
  socle:
    branch: feat/socle
    base: main
    lots: [SOL]
    gate: GATE_SOCLE

  core-foundation:
    branch: feat/core-foundation
    base: main
    lots: [PIV, TVA, VAL, TRK]
    gate: GATE_CORE_FOUNDATION
    depends_on_gate: GATE_SOCLE

  pa-framework:
    branch: feat/pa-framework
    base: main
    lots: [PAA]
    gate: GATE_PA_FRAMEWORK
    depends_on_gate: GATE_CORE_FOUNDATION

  pa-b2brouter:
    branch: feat/pa-b2brouter
    base: main
    lots: [PAB]
    gate: GATE_PA_B2BROUTER
    depends_on_gate: GATE_PA_FRAMEWORK

  pa-superpdp:
    branch: feat/pa-superpdp
    base: main
    lots: [PAS]
    gate: GATE_PA_SUPERPDP
    depends_on_gate: GATE_PA_FRAMEWORK

  pipeline:
    branch: feat/pipeline
    base: main
    lots: [PIP]
    gate: GATE_PIPELINE
    depends_on_gate: GATE_PA_FRAMEWORK

  service-api:
    branch: feat/service-api
    base: main
    lots: [SVC, API, CLI]
    gate: GATE_SERVICE_API
    depends_on_gate: GATE_PIPELINE

  adapter-encheresv6:
    branch: feat/adapter-encheresv6
    base: main
    lots: [ADP]
    gate: GATE_ADAPTER_ENCHERESV6
    depends_on_gate: GATE_CORE_FOUNDATION

  console-admin:
    branch: feat/console-admin
    base: main
    lots: [WPF]
    gate: GATE_CONSOLE_ADMIN
    depends_on_gate: GATE_SERVICE_API

  deploiement-toolkit:
    branch: feat/deploiement-toolkit
    base: main
    lots: [CFG, DOC]
    gate: GATE_TOOLKIT
    depends_on_gate: GATE_CONSOLE_ADMIN

  deploiement-cmp:
    branch: feat/deploiement-cmp
    base: main
    lots: [CMP]
    gate: GATE_PROD_CMP
    depends_on_gate: [GATE_TOOLKIT, GATE_ADAPTER_ENCHERESV6, GATE_PA_B2BROUTER]

items:
  # ── SOL ──
  - { id: SOL01, lot: SOL, priority: 1000, depends_on: [] }
