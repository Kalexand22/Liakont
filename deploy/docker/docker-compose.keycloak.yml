# Docker Compose for Keycloak dev environment (Liakont)
# Usage: docker compose -f docker-compose.keycloak.yml up -d
# Or use: tools/keycloak-dev.ps1 start
#
# AVERTISSEMENT : les valeurs par défaut ci-dessous (keycloak_dev_password, admin)
# sont des identifiants de DEV LOCAL uniquement. Ne JAMAIS utiliser ce fichier en
# production sans définir KC_DB_PASSWORD et KC_ADMIN_PASSWORD via l'environnement.

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: liakont-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev_password}
    volumes:
      - liakont-keycloak-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - liakont-keycloak

  keycloak:
    # Tag de PATCH précis (non flottant) — politique de version Keycloak : ADR-0020 (avenant).
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: liakont-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev_password}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/liakont-dev-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - liakont-keycloak

volumes:
  liakont-keycloak-db-data:

networks:
  liakont-keycloak:
    driver: bridge
